body:
  text: 東坡易傳卷八宋蘇軾撰繋辭傳下八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣繫辭焉而命之動在其中矣吉凶悔吝者生乎動者也有辭可繫未有非動者故雖括囊介石皆有為於世者也如必運行而後為動則吉凶悔吝未有不生於動者也剛柔者立本者也變通者趣時者也吉凶者貞勝者也貞正也一也老子曰王侯得一以為天下貞夫貞之於天下也豈求勝之哉故勝者貞之衰也有勝必有負而吉凶生矣天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也不以貞為觀者自大觀之則以為小自髙觀之則以為下不以貞為眀者意之所及則眀所不及則不眀故天地无異觀日月无異明者以其正且一也夫乾確然示人易矣夫坤隤然示人簡矣爻也者效此者也象也者像此者也剛而无心者其徳易其形確然柔而无心者其徳簡其形隤然論此者明八卦皆以徳發於中而形著於外也故爻效其德而象像其形非獨乾坤也爻象動乎内吉凶見乎外動者我也而吉凶自外應之功業見乎變未甞无功業也因變而見聖人之情見乎辭其性不可容言也天地之大徳曰生聖人之大寳曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義位之存亡寄乎民民之死生寄乎財故奪民財者害其生者也害其生者賊其位者也甚矣斯言之可畏也以是亡國者多矣夫理財者疏理其出入之道使不壅爾非取之也正辭者正名也孔子曰名不正則言不順言不順則事不成事不成則刑罰不中刑罰不中則民无所措手足故君子名之必可言也言之必可行也无道之世唯不正名故上有愧於民而民不直其上令之不行誅之不止其禍皆出於財故聖人之言理財必與正名俱曰理財正辭以此二者為一言猶醫之用毒必與其畏者俱也名一正上之所行皆可以名言則財之出入有道而民之為非者可得而禁也民不為非則上之用財也約矣又安以多取為哉古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情作結繩而為網罟以佃以漁蓋取諸離包犧氏沒神農氏作斵木為耜揉木為耒耒耨之利以教天下蓋取諸益日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑神農氏沒黄帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則乆是以自天祐之吉无不利黄帝堯舜垂衣裳而天下治蓋取諸乾坤刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下蓋取諸渙服牛乘馬引重致逺以利天下蓋取諸隨重門擊柝以待㬥客蓋取諸豫斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯古之葬者厚衣之以薪葬之中野不封不樹喪期无數後世聖人易之以棺椁蓋取諸大過上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬易有聖人之道四焉以制器者尚其象故凡此皆象也以義求之則不合以象求之則獲是故易者象也象也者像也彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也孔子之述彖象也蓋自為一篇而題其首曰彖曰象也歟其初无彖曰象曰之文而後之學者散之卦爻之下故以彖曰象曰别之然孔子所謂彖者蓋謂卦辭如乾元亨利貞之類是也其所謂象者有大小其大象指八卦震為雷巽為風之類是也其小象指一爻濳龍勿用之類是也初不謂已所述者為彖象也而近世學者失之乃指孔子之言為彖象不可以不辨也象者像也像之言似也其實有不容言者故以其似者告也達者因似以識眞不達則又見其似似者而日以逺矣彖者豕也爻者折俎也古者謂折俎為爻其文蓋象折俎之形後世以易有六爻也故加肉為肴以别之彖則何為取於豕也曰彖者材也八卦相值材全而體備是以為豕也爻則何為取於折俎也爻者效天下之動分卦之材裂卦之體而適險易之變也陽卦多隂隂卦多陽其故何也陽卦奇隂卦偶其徳行何也陽一君而二民君子之道也隂二君而一民小人之道也陽卦以陽為君隂卦以隂為君其曰隂二君而一民何也曰陽宜為君者也隂宜為民者也以民道而任君事此所以為小人也易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮致極也極則一矣其不一者蓋未極也四海之水同一平也胡越之繩墨同一直也故致一而百慮皆得也夫何思何慮日往則月來月往則日來日月相推而眀生焉寒往則暑來暑往則寒來寒暑相推而歳成焉往者屈也來者信也屈信相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也易將眀乎一未有不用變化晦明寒暑往來屈信者也此皆二也而以眀一者惟通二為一然後其一可必故曰在天成象在地成形又曰變化者進退之象剛柔者晝夜之象又曰闔户謂之坤闢户謂之乾皆所以明一也精義入神以致用也利用安身以崇徳也精義者窮理也入神者盡性以至於命也窮理盡性以至於命豈徒然哉將以致用也譬之於水知其所以浮知其所以沉盡水之變而皆有以應之精義者也知其所以浮沉而與之為一不知其為水入神者也與水為一不知其為水未有不善游者也而況以操舟乎此之謂致用也故善游者之操舟也其心閒其體舒是何故則用利而身安也事至於身安則物莫吾測而徳崇矣過此以往未之或知也窮神知化徳之盛也恐天下沿其末流而不知反其宗故寄之不知以為无窮恐天下相追於无窮而不已故指其盛徳以為蓺極易曰困於石據於蒺藜入於其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得而見邪易曰公用射隼於高墉之上獲之无不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾无咎此之謂也善不積不足以成名惡不積不足以滅身小人以小善為无益而弗為也以小惡為无傷而弗去也故惡積而不可揜罪大而不可解易曰何校滅耳凶子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫於苞桑子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也子曰知幾其神乎君子上交不諂下交不凟其知幾乎幾者動之㣲吉之先見者也君子見幾而作不俟終日易曰介於石不終日貞吉介如石焉寧用終日斷可識矣夫无守於中者不有所畏則有所忽也忽者常失於太早畏者常失於太後既失之又懲而矯之則終身未嘗及事之會矣知㡬者不然其介也如石之堅上交不諂无所畏也下交不凟无所忽也上无畏下无忽事至則發而已矣君子知㣲知彰知柔知剛萬夫之望知幾者衆之所望以為進退之候也子曰顔氏之子其殆庶幾乎有不善未甞不知知之未嘗復行也其心至靜而清眀故不善觸之未嘗不知知之故未甞復行知之而復行者非眞知也世所以不食烏喙者徒以知之審也如使知不善如知烏喙則世皆顔子矣所以不及聖人者猶恃知爾詩曰不識不知順帝之則易曰不逺復无祗悔元吉天地絪縕萬物化醇男女搆精萬物化生易曰三人行則損一人一人行則得其友言致一也子曰君子安其身而後動易其心而後語定其交而後求君子脩此三者故全也危以動則民不與也懼以語則民不應也无交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恒凶子曰乾坤其易之門邪闢闔以生變化易之所自出也乾陽物也坤隂物也隂陽合德而剛柔有體以體天地之撰以通神眀之德其稱名也雜而不越隂陽二物也其合也未嘗不雜其分也乾道成男坤道成女未嘗雜也故曰隂陽合徳而剛柔有體隂陽合徳故雜剛柔有體故不越於稽其類其衰世之意邪夫易彰往而察來至靜而明故物之往來屈信者无遁形也而㣲顯闡幽顯道神徳行開而當名辨物正言斷辭則備矣此解剝至道自𤣥適著之叙也夫道之大全也未始有名而易實開之賦之以名以名為不足而取諸物以寓其意以物為不足而正言之以言為不足而斷之以辭則備矣名者言之約者也辭者言之悉者也其稱名也小其取類也大夫名者取衆人之所知以況其所不知其旨逺不得不逺其辭文不得不文其言曲而中其事肆而隱因貳以濟民行以明失得之報兼三才而兩之所謂貳也夫道一而已然易之作必因其貳者貳而後有内外有内外而後有好惡有好惡而後有失得故孔子以易為衰世之意而興於中古者以其因貳也一以自用貳以濟民易之興也其於中古乎作易者其有憂患乎是故履德之基也基者厚下以自全也履之九五待六三而不疚六三待九二而能履故和則至乖則廢矣謙徳之柄也旁出而起物者柄也謙之為道偏矣而徳非謙莫能起者復徳之本也恒徳之固也損徳之脩也脩之為言長也逺也民見其損之患而未見其終以為益之效故先難而後易此徳之逺者也益徳之裕也困徳之辨也困則真偽别井徳之地也地者所在之謂也老子曰埏埴以為器當其无有器之用夫井亦然以其无有故徳在焉巽徳之制也无忤於物而能勝物者風也故徳之制在巽而可以行權履和而至謙尊而光復小而辨於物雖㣲也而其為陽物也審矣恒雜而不厭雷風相與故雜雜故不厭如使專一則厭而遷矣損先難而後易益長裕而不設有孚惠心何設之有困窮而通井居其所而遷内足者不求於物而物求之巽稱而隱稱舉也舉而人莫見者風也履以和行謙以制禮復以自知恒以一德損以逺害居憂患之世而有得民之形則害之者衆矣故損以逺害益以興利困以寡怨致命遂志故不怨天不尤人尤人者人亦尤之則多怨矣井以辨義居有常所則分義眀矣巽以行權此九卦者為憂患者言也其意以屬文王歟孔子之於文王也見其禮樂讀其易考其行事而得其為人其必有以合此九卦者而世莫足以知之也易之為書也不可逺凡言為書者皆論其已造於形器者也其書可以指見口授不當逺索於文辭之外也其道則逺矣為道也屢遷變動不居周流六虛六虛六位也此六者虛器爾吉凶悔吝存乎其人上下無常剛柔相易不可為典要唯變所適此所謂屢遷屢遷者其道也非其書也其出入以度外内使知懼卦所以有内外爻所以有出入者為之立敵而造憂患之端使知懼也有敵而後懼懼而後用法此物之情也又眀於憂患與故憂患之來苟不眀其故則人有苟免之志而怠於避禍矣故易明憂患又明其所以致之之故无有師保如臨父母去父母逺師保而不敢忘畏者知内外之懼眀憂患之故也初率其辭而揆其方既有典常此所謂不可逺不可逺者其書也非其道也不可以逺索故循其辭度其所向而已初者為未達者言也未達者治其書用其出入之度審其内外之懼明其憂患之故而蹈其典常可以寡過達者行其道无出无入无内无外周流六位无往不適雖為聖人可也故曰以言乎逺則不禦以言乎邇則靜而正苟非其人道不虛行戒非其人而學其道者非其人而學其道則无所不至矣易之為書也原始要終以為質也吉凶成敗非要終不得其實質實也六爻相雜唯其時物也各以其時物之其初難知其上易知本末也非固欲為難易本末之勢然也初辭擬之卒成之終若夫雜物撰徳辨是與非則非其中爻不備物雜而徳可撰者以有中爻也噫亦要存亡吉凶則居可知矣不必在中爻故又以存亡吉凶要之知者觀其彖辭則思過半矣彖者常論其用事之爻故觀其彖則其餘皆彖爻之所用者也二與四同功而異位其善不同二多譽四多懼近也四近於五也有善之名而近於君則懼矣故二之善宜著四之善宜隱柔之為道不利逺者其要无咎其用柔中也柔者有依而後能立二逺无依而免於咎者中也三與五同功而異位三多凶五多功貴賤之等也三與五者厚事之地也故大者先享其利而小者先受其害其柔危其剛勝邪以剛居之則勝柔則危自此以上皆典要之粗也皆非必然者也從其多者言之爾易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也道有變動故曰爻爻有等故曰物等類也凡乾之類皆陽物坤之類皆隂物物相雜故曰文文不當故吉凶生焉物之不齊物之情也故吉凶者勢之所不免也易之興也其當殷之末世周之盛徳邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要无咎此之謂易之道也得其大者縱横逆順无施不可而天下无廢物矣得其小者懼以終始猶可以无咎夫乾天下之至健也德行恒易以知險夫坤天下之至順也德行恒簡以知阻已險而能知險已阻而能知阻者天下未甞有也夫險阻在躬則天下莫不備之天下莫不備之則其所備者衆矣又何暇知人哉是故處下以傾髙則髙者畢赴用晦以求明則眀者必見易簡以觀險阻則險阻无隱情矣能説諸心能研諸侯之慮侯之衍文也吾心和易則可以究盡萬物之慮也定天下之吉凶成天下之亹亹者向以此言蓍龜者重見於此誤也是故變化云為吉事有祥象事知器占事知來言易簡者无不知也禮曰至誠之道可以前知國家將興必有禎祥國家將亡必有妖孽見乎蓍龜動乎四體禍福將至必先知之故至誠如神天地設位聖人成能人謀鬼謀百姓與能言易簡者取諸物而足也萬物自生自成故天地設位而已聖人无能因天下之已能而遂成之故人為我謀之明鬼為我謀之幽百姓之愚可使與知焉書曰謀及卿士謀及庶人謀及卜筮八卦以象告爻彖以情言剛柔雜居而吉凶可見矣變動以利言以利言之則有變動而道固自如也吉凶以情遷順其所愛則謂之吉犯其所惡則謂之凶夫我之所愛彼有所甚惡則我之所謂吉者彼或以為凶矣故曰吉凶以情遷是故愛惡相攻而吉凶生在我為吉則是天下未甞有凶在彼為凶則是天下未嘗有吉然而吉凶如此其紛紛者是生於愛惡之相攻也遠近相取而悔吝生悔吝者生於不𢎞通者也天下孰為真遠自其近者觀之則逺矣孰為眞近自其逺者觀之則近矣逺近相資以為别也因其别也而各挾其有以自異則或害之矣或害之者悔吝之所從出也情偽相感而利害生信其人則舉以為利己不信則舉以為害己此情偽之蔽也凡易之情近而不相得則凶或害之悔且吝此眀凶與悔吝輕重之差也近而不相得則相害故凶或害之者非我之罪也然亦有以致之矣將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈微之顯誠之不可掩也如此故或害之者我必有以見於外也東坡易傳卷八
