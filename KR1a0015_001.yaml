body:
  text: 東坡易傳卷一宋蘇軾撰乾下乾上乾元亨利貞初九濳龍勿用乾之所以取于龍者以其能飛能潛也飛者其正也不得其正而能潛非天下之至健其孰能之九二見龍在田利見大人飛者龍之正行也天者龍之正處也見而在田明其可安而非正也九三君子終日乾乾夕惕若厲元咎九三非龍德歟曰否進乎龍矣此上下之際禍福之交成敗之決也徒曰龍者不足以盡之故曰君子夫初之所以能潛二之所以能見四之所以能躍五之所以能飛皆有待於三焉甚矣三之難處也使三不能處此則乾喪其所以為乾矣天下莫大之福不測之禍皆萃於我而求決焉其濟不濟間不容髮是以終日乾乾至於夕而猶惕然雖危而無咎也九四或躍在淵無咎下之上上之下其為重剛而不中上不在天下不在田者均也而至於九四獨躍而不惕者何哉曰九四既進而不可復反者也退則入於禍故教之躍其所以異於五者猶有疑而已三與四皆禍福雜故有以處之然後無咎九五飛龍在天利見大人今之飛者昔之潛者也而誰非大人歟曰見大人者皆將有求也惟其處安居正而後可以求得九二者龍之安九五者龍之正也上九亢龍有悔夫處此者豈無無悔之道哉故言有者皆非必然者也用九見羣龍無首吉見羣龍眀六爻皆然也蔡墨云其姤曰潛龍勿用其同人曰見龍在田其大有曰飛龍在天其夬曰亢龍有悔其坤曰見羣龍無首吉古之論卦者以不變論爻者以變姤者初九之變也同人者九二之變也大有者九五之變也夬者上九之變也各指其一而坤則六爻皆變吾是以知用九之通六爻也用六亦然彖曰大哉乾元萬物資始乃統天此論元也元之為德不可見也其可見者萬物資始而已天之德不可勝言也惟是為能統之此所以為元也雲行雨施品物流形此所以為亨也大明終始六位時成此所以為利也生而成之乾之終始也成物之謂利矣時乘六龍以御天飛潛見躍各適其時以用我剛健之德也乾道變化各正性命此所以為貞也保合太和乃利貞通言之也貞正也方其變化各之於情無所不至反而循之各直其性以至於命此所以為貞也世之論性命者多矣因是請試言其粗曰古之言性者如告瞽者以其所不識也瞽者未嘗有見也欲告之以是物患其不識也則又以一物狀之夫以一物狀之則又一物也非是物矣彼惟無見故告之以一物而不識又可以多物眩之乎古之君子患性之難見也故以可見者言性夫以可見者言性皆性之似也君子日修其善以消其不善不善者日消有不可得而消者焉小人日修其不善以消其善善者日消亦有不可得而消者焉夫不可得而消者堯舜不能加焉桀紂不能亡焉是豈非性也哉君子之至於是用是為道則去聖不逺矣雖然有至是者有用是者則其為道常二猶器之用於手不如手之自用莫知其所以然而然也性至於是則謂之命命令也君之令曰命天之令曰命性之至者亦曰命性之至者非命也無以名之而寄之命也死生禍福莫非命者雖有聖智莫知其所以然而然君子之於道至於一而不二如手之自用則亦莫知其所以然而然矣此所以寄之命也情者性之動也泝而上至於命沿而下至於情無非性者性之與情非有善惡之别也方其散而有為則謂之情耳命之與性非有天人之辨也至其一而無我則謂之命耳其於易也卦以言其性爻以言其情情以為利性以為貞其言也互見之故人莫之眀也易曰大哉乾乎剛健中正純粹精也夫剛健中正純粹而精者此乾之大全也卦也及其散而有為分裂四出而各有得焉則爻也故曰六爻發揮旁通情也以爻為情則卦之為性也眀矣乾道變化各正性命保合太和乃利貞以各正性命為貞則情之為利也亦眀矣又曰利貞者性情也言其變而之乎情反而直其性也首出庶物萬國咸寧至於此則無為而物自安矣象曰天行健君子以自强不息夫天豈以剛故能健哉以不息故健也流水不腐用器不蠱故君子莊敬日强安肆日婾强則日長婾則日消濳龍勿用陽在下也見龍在田德施普也終日乾乾反復道也王弼曰居上不驕在下不憂反復皆道也或躍在淵進無咎也飛龍在天大人造也亢龍有悔盈不可久也用九天德不可為首也文言曰元者善之長也亨者嘉之會也隂陽和而物生曰嘉利者義之和也貞者事之幹也君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞禮非亨則偏滯而不合義非利則慘洌而不和初九曰潛龍勿用何謂也子曰龍德而𨼆者也不易乎世王弼曰不為世所易不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔潛龍也九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹間邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也堯舜之所不能加桀紂之所不能亡是謂誠凡可以間而去者無非邪也邪者盡去則其不可去者自存矣是謂間邪存其誠不然則言行之信謹蓋未足以化也九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也修辭者行之必可言也修辭而不立誠雖有業不居矣知至至之可與幾也知終終之可與存義也至之為言往也終之為言止也乾之進退之決在三故可往而往其幾可止而止其義是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也故無咎九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩燥濕不與水火期而水火即之龍虎非有求于風雲而風雲應之聖人非有意於物而物莫不欲見之本乎天者親上本乎地者親下則各從其類也明龍之在天也上九曰亢龍有悔何謂也子曰貴而無位髙而無民王弼曰下無隂也賢人在下位而無輔夫賢人者下之而後為用是以動而有悔也潛龍勿用下也見龍在田時舍也時之所舍故得安於田終日乾乾行事也或躍在淵自試也飛龍在天上治也亢龍有悔窮之災也乾元用九天下治也王弼曰夫能全用剛直放逺善柔非天下至治未之能也濳龍勿用陽氣潛藏見龍在田天下文明以言行化物故曰文明終日乾乾與時偕行或躍在淵乾道乃革飛龍在天乃位乎天德亢龍有悔與時偕極乾元用九乃見天則天以無首為則乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉大哉乾乎剛健中正純粹精也六爻發揮旁通情也時乘六龍以御天也雲行雨施天下平也君子以成德為行日可見之行也君子度可成則行未嘗無得也故其行也日有所見日可見之行也潛之為言也𨼆而未見行而未成是以君子弗用也君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎矣九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎或者未必然之辭也其躍也未可必故以或言之非以或為惑也夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而況於人乎況於鬼神乎亢之為言也知進而不知退知存而不知亡知得而不知喪其唯聖人乎知進退存亡而不失其正者其唯聖人乎坤下坤上坤元亨利牝馬之貞龍變化而自用者也馬馴服而用於人者也為人用而又牝焉順之至也至順而不貞則陷於邪故利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉彖曰至哉坤元萬物資生乃順承天坤厚載物德合無疆含𢎞光大品物咸亨牝馬地類行地無疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地無疆坤之為道可以為人用而不可以自用可以為和而不可以為倡故君子利有攸往往求用也先則迷而失道後則順而得主此所以為利也西與南則兌也離也以及於巽吾朋也東與北則震也坎也以及於乾與艮非吾朋也兩隂不能相用故必離類絶朋而求主於東北夫所以離朋而求主者非為邪也故曰安貞吉象曰地勢坤君子以厚德載物坤未必無君德其所居之勢宜為臣者也書曰臣為上為德為下為民初六履霜堅冰至象曰履霜堅冰隂始凝也馴致其道至堅冰也始於微而終於著者隂陽均也而獨於此戒之者隂之為物弱而易入故易以陷人鄭子産曰水弱民狎而玩之故多死六二直方大不習無不利象曰六二之動直以方也不習無不利地道光也以六居二可謂柔矣夫直方大者何從而得之曰六二順之至也君子之順豈有他哉循理無私而已故其動也為直居中而推其直為方既直且方非大而何夫順生直直生方方生大君子非有意為之也循理無私而三者自生焉故曰不習無不利夫有所習而利則利止於所習者矣六三含章可貞或從王事無成有終象曰含章可貞以時發也或從王事知光大也三有陽德茍用其陽則非所以為坤也故有章而含之坤之患弱而不可以正也有章則可以為正矣然以其可正而遂專之則亦非所以為坤也故從事而不造事無成而代有終六四括囊無咎無譽象曰括囊無咎慎不害也夫處上下之交者皆非安地也乾安於上以未至於上為危故九三有夕惕之憂坤安於下以始至於上為難故六四有括囊之慎隂之進而至於三猶可貞也至於四則殆矣故自括結以求無咎無譽咎與譽人之所不能免也出乎咎必入乎譽脫乎譽必罹乎咎咎所以致罪而譽所以致疑也甚矣無咎無譽之難也六五黃裳元吉象曰黃裳元吉文在中也黃中之色也裳下之飾也黃而非裳則君也裳而非黃則臣爾非賢臣也六五隂之盛而有陽德焉故稱裳以明其臣稱黃以明其德夫文生於相錯若隂陽之專一豈有文哉六五以隂而有陽德故曰文在中也上六龍戰於野其血𤣥黃象曰龍戰于野其道窮也至於此則非隂之所能安矣隂雖欲不戰而不可得故曰其道窮也用六利永貞象曰用六永貞以大終也易以大小言隂陽坤之順進以小也其貞終以大也文言曰坤至柔而動也剛夫物非剛者能剛惟柔者能剛耳畜而不發及其極也發之必決故曰沉濳剛克至靜而德方夫物圓則好動故至靜所以為方也後得主而有常含萬物而化光坤道其順乎承天而時行積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅冰至蓋言順也惟其順也故能濟其剛如其不順則辨之久矣直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也小人惟多愧也故居則畏動則疑君子必自敬也故內直推其直於物故外方直在其內方在其外隱然如名師良友之在吾側也是以獨立而不孤夫何疑之有隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也方其變化雖草木猶蕃及其閉也雖賢人亦隱君子黃中通理正位居體美在其中而暢於四支發於事業美之至也黃中之色也通是理然後有是色也君子之得位如人之有四體為已用也有手而不能執有足而不能馳神不宅其體也隂疑於陽必戰為其嫌於無陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黃者天地之雜也天𤣥而地黃嫌也疑也皆似之謂也隂盛似陽必戰方其盛也似無陽焉故雖隂而稱龍然猶未離其隂陽之類也故稱血以明其雜若隂已變而為陽則無復𤣥黃之雜矣震下坎上屯元亨利貞勿用有攸往利建侯因世之屯而務往以求功功可得矣而爭功者滋多天下之亂愈甚故勿用有攸往雖然我則不往矣而天下之欲往者皆是也故利建侯天下有侯人各歸安其主雖有往者夫誰與為亂彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧屯有四隂屯之義也其二隂以無應為屯其二隂以有應而不得相從為屯故曰剛柔始交而難生物之生未有不待雷雨者然方其作也充滿潰亂使物不知其所從若將害之霽而後見其功也天之造物也豈物物而造之蓋草略茫昧而已聖人之求民也豈人人而求之亦付之諸侯而已然以為安而易之則不可象曰雲雷屯君子以經綸初九盤桓利居貞利建侯象曰雖盤桓志行正也以貴下賤大得民也初九以貴下賤有君之德而無其位故盤桓居貞以待其自至惟其無位故有從者有不從者夫不從者彼各有所為貞也初九不爭以成其貞故利建侯以明不專利而爭民也民不從吾而從吾所建猶從吾耳六二屯如邅如乘馬班如匪寇婚媾女子貞不字十年乃字象曰六二之難乘剛也十年乃字反常也志欲從五而內忌於初故屯邅不進也夫初九屯之君也非寇也六二之貞於五也知有五而已苟異於五者則吾寇矣吾焉知其德哉是故以初為寇曰吾非與寇為婚媾者也然且不爭而成其貞則初九之德至矣六三即鹿無虞惟入于林中君子幾不如舍往吝象曰即鹿無虞以從禽也君子舍之往吝窮也勢可以得民從而君之者初九是也因其有民從而建之使牧其民者九五是也苟不可得而强求焉非徒不得而已後必有患六三非陽也而居於陽無其德而有求民之心將以求上六之隂譬猶無虞而以即鹿鹿不可得而徒有入林之勞故曰君子幾不如舍之幾殆也六四乘馬班如求婚媾往吉無不利象曰求而往明也方未知所從也而初來求婚從之吉可知矣九五屯其膏小貞吉大貞凶象曰屯其膏施未光也屯無正主惟下之者為得民九五居上而專於應則其澤施於二而已夫大者患不廣博小者患不貞一故專於應為二則吉為五則凶上六乘馬班如泣血漣如象曰泣血漣如何可長也三非其應而五不足歸也不知五之不足歸惑於近而不早自附於初九故窮而至於泣血也坎下艮上蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞彖曰蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也蒙者有蔽於物而已其中固自有正也蔽雖甚終不能沒其正將戰於內以求自達因其欲達而一發之迎其正心彼將沛然而自得焉苟不待其欲達而强發之一發不達以至於再三雖有得非其正矣故曰匪我求童蒙童蒙求我彼將內患其蔽即我而求達我何為求之夫患蔽不深則求達不力求達不力則正心不勝正心不勝則我雖告之彼無自入焉故初筮告者因其欲達而一發之也再三瀆瀆則不告者發之不待其欲達而至於再三也蒙亨以亨行者言其一通而不復塞也夫能使之一通而不復塞者豈非時其中之欲達而一發之乎故曰時中也聖人之於蒙也時其可發而發之不可則置之所以養其正心而待其自勝也此聖人之功也象曰山下出泉蒙君子以果行育德果行者求發也育德者不發以養正也初六發蒙利用刑人用說桎梏以往吝象曰利用刑人以正法也所以發蒙者用於未發既發則無用既發而用者瀆蒙也桎梏者用於未刑既刑則說既刑而不說者瀆刑也發蒙者慎其初不可使至瀆故於初云爾九二包蒙吉納婦吉子克家象曰子克家剛柔接也童蒙若無能為也然而容之則足以為助拒之則所喪多矣明之不可以無蒙猶子之不可以無婦子而無婦不能家矣六三勿用取女見金夫不有躬無攸利象曰勿用取女行不順也王弼曰童蒙之時隂求於陽上不求三而三求上女先求男者也女之為體正行以待命者也見剛夫而求之故曰不有躬也施之於女行不順矣六四困蒙吝象曰困蒙之吝獨逺實也實陽也六五童蒙吉象曰童蒙之吉順以巽也六五之位尊矣恐其不安於童蒙之分而自强於明故教之曰童蒙吉上九擊蒙不利為寇利禦寇象曰利用禦寇上下順也以剛自高而下臨弱故至於用擊也發䝉不得其道而至於用擊過矣故有以戒之王弼曰為之捍禦則物咸附之若欲取之則物咸叛矣乾下坎上需有孚光亨貞吉利涉大川彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也謂九五也乾之欲進凡為坎者皆不樂也是故四與之抗傷而後避上六知不可抗而敬以求免夫敬以求免猶有疑也物之不相疑者亦不以敬相攝矣至於五則不然知乾之不吾害知己之足以御之是以內之而不疑故曰有孚光亨貞吉光者物之神也蓋出於形器之表矣故易凡言光光大者皆其見逺知大者也其言未光未光大者則隘且陋矣利涉大川往有功也見險而不廢其進斯有功矣象曰雲上於天需君子以飲食宴樂乾之剛為可畏也坎之險為不可易也乾之於坎逺之則無咎近之則致寇坎之於乾敬之則吉抗之則傷二者皆莫能相懷也惟得廣大樂易之君子則可以兼懷而兩有之故曰飲食宴樂初九需於郊利用恆無咎象曰需于郊不犯難行也利用恆無咎未失常也尚逺於坎故稱郊處下不忘進者乾之常也逺之不惰近之不躁是為不失常也九二需於沙小有言終吉象曰需於沙衍在中也雖小有言以吉終也衍廣衍也九三需於泥致寇至象曰需於泥災在外也自我致寇敬慎不敗也漸近則為沙逼近則為泥於沙則有言於泥則致寇坎之為害也如此然於其言也告之以終吉於其致寇也告之以敬慎不敗則乾以見險而不廢其進為吉矣六四需於血出自穴象曰需於血順以聽也需於血者抗之而傷也出自穴者不勝而避也九五需於酒食貞吉象曰酒食貞吉以中正也敵至而不忌非有餘者不能夫以酒食為需去備以相待者非二隂之所能辦也故九五以此待乾乾必心服而為之用此所以正而獲吉也上六入於穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也乾已克四而達於五矣其勢不可復抗故入穴以自固謂之不速之客者明非所願也以不願之意而固守以待之可得為安乎其所以得免於咎者特以敬之而已故不如五之當位而猶愈於四之大失也坎下乾上訟有孚窒惕中吉終凶利見大人不利涉大川彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也初六信於九四六三信於上九而九二塞之故曰有孚窒而九四上九亦不能置而不爭此訟之所以作也故曰上剛下險險而健訟九二知懼則猶可以免故曰惕中吉剛來而得中也言其來則息訟而歸矣終之則凶利見大人尚中正也謂九五也不利涉大川入於淵也夫使川為淵者訟之過也難未有不起於爭今又欲以爭濟之是使相激為深而已象曰天與水違行訟君子以作事謀始王弼曰聽訟吾猶人也必也使無訟乎夫無訟在於謀始契之不明訟之所以生也故有德司契而訟自息矣初六不永所事小有言終吉九二處二隂之間欲兼有之初不豫而强爭焉初六有應於四不永事二而之四以為從强求之二不若從有應之四也二雖有言而其辨則明故終吉象曰不永所事訟不可長也雖小有言其辨明也若事二則相從於訟無已也九二不克訟歸而逋其邑人三百戶無眚象曰不克訟歸逋竄也自下訟上患至掇也初六六三本非九二之所當有也二以其近而强有之以為邑人力征而心不服我克則來不克遂往以我卜也故九二不克訟而歸則初六六三皆棄而違之失衆知懼猶可少安故無眚眚災也其曰逋其邑人三百户者猶曰亡其邑人三百户云爾六三食舊德貞厲終吉或從王事無成象曰食舊德從上吉也六三與上九為應二與四欲得之而强施德焉夫六三之應於上九者天命之所當有也非為其有德於我也雖二與四之德不能奪之矣是以食舊德以從其配食者食而忘之不報之謂也猶曰食言云爾與二陽近而不報其德故厲而後吉或從王事無成者有討於其舊從之可也成之過矣九四不克訟復即命渝安貞吉象曰復即命渝安貞不失也九四命之所當得者初六而已近於三而强求之故亦不克訟然而有初之應退而就其命之所當得者自改而安於貞則猶可以不失其有也九五訟元吉象曰訟元吉以中正也處中得位而無私於應故訟者莫不取曲直焉此所以為元吉也上九或錫之鞶帶終朝三褫之象曰以訟受服亦不足敬也六三上九之配也二與四嘗有之矣不克訟而歸於上九上九之得之也譬之鞶帶奪諸其人之身而已服之於人情有赧焉故終朝三褫之既服之矣則又褫之愧而不安之甚也二與四訟不勝者也然且終於無眚與吉也上九訟而勝者也然且有三褫之辱何也曰此止訟之道也夫使勝者自多其勝以夸其能不勝者自恥其不勝以遂其惡則訟之禍吾不知其所止矣故勝者褫服不勝者安貞無眚止訟之道也坎下坤上師貞丈人吉無咎丈人詩所謂老成人也夫能以衆正有功而無後患者其惟丈人乎故彖曰吉又何咎矣彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣用師猶以藥石治病故曰毒天下象曰地中有水師君子以容民畜衆兵不可一日無然不可觀也祭公謀父曰先王耀德而不觀兵夫兵戢而時動動則威觀則玩玩則無震故地中有水師言兵當如水行於地中而人不知也初六師出以律否臧凶象曰師出以律失律凶也師出不可不以律也否則雖臧亦凶夫以律者正勝也不以律者竒勝也能以竒勝可謂臧矣然其利近其禍逺其獲小其喪大師休之曰乃見之矣故曰凶九二在師中吉無咎王三錫命夫師出不先得主於中雖有功患隨之矣九二有應於五是以吉而無復有咎象曰在師中吉承天寵也王三錫命懷萬邦也賞有功而萬邦懷之則其所賞皆以正勝者也六三師或輿尸凶象曰師或輿尸大無功也九二體剛而居柔體剛則威居柔則順是以無專權之疑而有錫命之寵六三體柔而居剛體柔則威不足居剛則勢可疑是以不得專其師而為或者之衆主之也故凶而無功六四師左次無咎象曰左次無咎未失常也王弼曰得位而無應無應則不可以行得位則可以處故左次無咎行師之法欲左皆高故左次六五田有禽利執言無咎長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也夫以隂柔為師之主不患其好勝而輕敵也患其弱而多疑爾故告之曰禽㬥汝田執之有辭矣何咎之有既使長子帥師又使弟子與衆主之此多疑之故也臣待命而行可謂正矣然將在軍則不可故曰貞凶上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也夫師始終之際聖人之所甚重也師出則嚴其律師休則正其功小人無自入焉小人之所由入者常自不以律始惟不以律然後能以竒勝夫能以竒勝者其人豈可與居安哉師休之日將録其一勝之功而以為諸侯大夫則亂自是始矣聖人之師其始不求苟勝故其終可以正功曰是君子之功邪小人之功邪坤下坎上比吉原筮元永貞無咎不寧方來後夫凶彖曰比吉也比輔也下順從也原筮元永貞無咎以剛中也比吉比未有不吉者也然而比非其人今雖吉後必有咎故曰原筮筮所從也原再也再筮慎之至也元始也始既已從之矣後雖欲變其可得乎故曰元永貞始既已從之則終身為之貞知將終身貞之故再筮而後從孰為可從者非五歟故曰以剛中也不寧方來上下應也不寧方來謂五隂也五隂不能自安而求安於五後夫凶其道窮也窮而後求比其誰親之象曰地上有水比先王以建萬國親諸侯初六有孚比之無咎有孚盈缶終來有他吉五隂皆求比於五初六最處其下而上無應急於比者也夫急於求人者必盡其誠故莫如初六之有信也五以其急於求人也而忽之則來者懈矣故必比之然後無咎是有信者其初甚微且約也其小盈缶而已然而因是可以致來者故曰終來有他吉象曰比之初六有他吉也言致他者初六之功也六二比之自內貞吉象曰比之自內不自失也以應為比故自內於二可謂貞吉不自失者於五則陋矣六三比之匪人象曰比之匪人不亦傷乎近者皆隂而逺無應故曰匪人六四外比之貞吉象曰外比於賢以從上也上謂五也非應而比故曰外比九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也王弼曰為比之主而有應在二顯比者也比而顯之則所親者狹矣夫無私於物惟賢是與則去之與來皆無失也三驅之禮禽逆來趨已則舍之背已而走則射之愛於來而惡於去也故其所施常失前禽也以顯比而居王位用三驅之道者也故曰王用三驅失前禽也用其中正征討有常伐不加邑動必討叛邑人無虞故不誡也此可以為上之使非為上之道也上六比之無首凶象曰比之無首無所終也無首猶言無素也窮而後比是無素也乾下巽上小畜亨密雲不雨自我西郊彖曰小畜柔得位而上下應之曰小畜謂六四也六四之謂小矣五陽皆為六四之所畜是以大而畜於小也健而巽剛中而志行乃亨未畜而亨則巽之所以畜乾者順之而已密雲不雨尚往也自我西郊施未行也乾之為物難乎其畜之者也畜之非其人則乾不為之用雖不為之用而眷眷焉不決去之卒受其病者小畜是也故曰密雲不雨自我西郊夫陽施於隂則為雨乾非不知巽之不足以任吾施也然其為物也健而急於用故進而嘗試焉既已為密雲矣能為密雲而不能為雨豈真不能哉不欲雨也雨者乾之有為之功也不可以輕用用之於非其人則喪其所以為乾矣乾知巽之不足以任吾施也是以遲疑而重發之欲之於巽而未决故次於我之西郊君子是以知乾之終病也既以為雲矣則是欲雨之道也能終不雨乎既已次於郊矣則是欲往之勢也能終不往乎雲而不雨將安歸哉故卦以為不雨而爻不免於雨者勢也君子之於非其人也望而去之況與之為雲乎既已為雲矣又可反乎乾知巽之不足與雨矣而猶往從之故曰密雲不雨尚往也象曰風行天上小畜君子以懿文德夫畜已而非其人則君子不可以有為獨可以雍容講道如子夏之在魏子思之在魯可也初九復自道何其咎吉象曰復自道其義吉也九二牽復吉象曰牽復在中亦不自失也九三輿說輻夫妻反目象曰夫妻反目不能正室也陽之畜乾也厲而畜之厲而畜之者非以害之也將盈其氣而作之爾隂之畜乾也順而畜之順而畜之者非以利之也將即其安而縻之爾故大畜將以用乾而小畜將以制之乾進而求用則可進而受制則不可故大畜之乾以之艮為吉小畜之乾以之巽為凶乾之欲去於巽必自其交之未深也去之則易初九復自道何其咎吉進而嘗之知其不可反循故道而復其所則無咎九二交深於初九矣故其復也必自引而後脫蓋已難矣然猶可以不自失也至於九三其交益深而不可復則脫輻而與之處與之處可也然乾終不能自革其健而與巽久處而無尤也故終於反目六四有孚血去惕出無咎象曰有孚惕出上合志也九五有孚攣如富以其鄰象曰有孚攣如不獨富也凡巽皆隂也六四固隂矣九五上九其質則陽其志則隂也以隂畜乾乾知其不可也易以質陽而志隂者畜乾乾知其不可也難何則不知其志而見其類也六四有孚血去惕出無咎六四之所孚者初九也初九欲去之六四欲畜而留之隂陽不相能故傷而去懼而出也以其傷且懼是以知隂之畜乾其欲害乾之意見於外也如此以其為害也淺而乾去之速故無咎若夫九五之畜乾也則不然所孚者既已去我矣我且挽援而留之若中心誠好之然此乾之所以眷眷而不悟自引而後脫二者皆欲畜乾而制之顧力不能是以六四與上合志而九五以其富附其鄰並力以畜之鄰上九也上九既雨既處尚德載婦貞厲月幾望君子征凶象曰既雨既處德積載也君子征凶有所疑也小畜之世宜不雨者也九三之於上九其勢不得不雨者以密雲之不可反而舍上九則無與雨也既已與之雨則為其人矣可不為之處乎乾非德不止九五上九質陽而志隂故能尚德以載乾尚德者非真有德之謂也九五上九知乾之難畜故積德而共載之此陽也而謂之婦明其實隂也以上畜下故貞乾不心服故厲以隂勝陽故月幾望君子之征自其交之未合則無咎既已與之雨矣而去之則彼疑我矣疑則害之故凶兌下乾上履虎尾不嘻人亨彖曰履柔履剛也說而應乎乾是以履虎尾不嘻人亨剛中正履帝位而不疚光眀也履之所以為履者以三能履二也有是物者不能自用而無者為之用也乾有九二乾不能用而使六三用之九二者虎也虎何為用於六三而莫之嘻以六三之應乎乾也故曰說而應乎乾是以履虎尾不嘻人亨應乎乾者猶可以用二而乾親用之不可何哉曰乾剛也九二亦剛也兩剛不能相下則有爭有爭則乾病矣故乾不親用而授之以六三六三以不校之柔而居至寡之地故九二樂為之用也九二為三用而三為五用是何以異於五之親用二哉五未嘗病而有用二之功故曰履帝位而不疚光明也夫三與五合則三不見嘻而五不病五與三離則五至於危而三見嘻卦統而論之故言其合之吉爻别而觀之故見其離之凶此所以不同也象曰上天下澤履君子以辨上下定民志初九素履往無咎象曰素履之往獨行願也履六爻皆上履下也所履不同故所以履之者亦異初九獨無所履則其所以為履之道者行其素所願而已君子之道所以多變而不同者以物至之不齊也如不與物遇則君子行願而已矣九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也九二之用大矣不見於二而見於三三之所以能視者假吾目也所以能履者附吾足也有目不自以為眀有足不自以為行者使六三得坦途而安履之豈非才全德厚隱約而不慍者欺故曰幽人貞吉六三眇能視跛能履履虎尾嘻人凶武人為于大君象曰眇能視不足以有眀也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也眇者之視跛者之履豈其自能哉必將有待於人而後能故言跛眇者以眀六三之無能而待於二也二虎也所以為吾用而不吾嘻者凡以為乾也六三不知其眇而自有其明不量其跛而自與其行以虎為畏已而去乾以自用虎見六三而不見乾焉斯嘻之矣九二有之而不居故為幽人六三無之而自矜故為武人武人見人之畏已而不知人之畏其君是以有為君之志也九四履虎尾訴訴終吉象曰訴訴終吉志行也訴訴懼也九二之剛用於六三故三雖隂而九二之虎在焉則三亦虎爰雖然非誠虎也三為乾用而二輔之四履其上可無懼乎及其去乾以自用而九二叛之則向之所以為虎者亡矣故始懼終吉以九四之終吉知六三之衰也六三之衰則九四之志得行矣九五夬履貞厲象曰夬履貞厲位正當也九二之剛不可以剛勝也惟六三為能用之九五不付之於三而自以其剛決物以此為履危道也夫三與五之相離也豈獨三之禍哉雖五亦不能無危其所以猶得為正者以其位君也上九視履考祥其旋元吉象曰元吉在上大有慶也三與五其始合而成功其後離而為凶至於上九歷見之矣故視其所履考其禍福之祥知二者之不可以一日相離也而復其舊則元吉旋復也東坡易傳卷一
