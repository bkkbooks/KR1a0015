body:
  text: 東坡易傳卷六宋蘇軾撰離下震上豐亨王假之勿憂宜日中彖曰豐大也眀以動故豐王假之尚大也勿憂宜日中宜照天下也日中則􅉴月盈則食天地盈虛與時消息而況於人乎況於鬼神乎豐者極盛之時也天下既平其勢必至於極盛故曰王假之勿憂宜日中者不憂其不至而憂其已至也宜日之中而不宜其既中也既盈而虧天地鬼神之所不免也而聖人何以處此曰豐者至足之辭也足則餘餘則溢聖人處之以不足而安所求餘故聖人無豐豐非聖人之事也象曰雷電皆至豐君子以折獄致刑傳曰為刑罰威獄以類天之震曜故易至於雷電相遇則必及刑獄取其明以動也至於離與艮相遇則曰無折獄無留獄取其眀以止也初九遇其配主雖旬無咎往有尚象曰雖旬無咎過旬災也凡人智生於憂患而愚生於安佚豐之患常在於暗故爻皆以眀暗為吉凶也初九六二九三三者皆離也而有眀德者也九四六五上六則所謂豐而暗者也離火也日也以下升上其性也以眀發暗其德也故三離皆上適於震初九適四其配之所在也而九四非其配故曰配主旬之為言猶曰周浹云爾尚配也九四以陽居隂不安於暗者也方其患蔽而求發則雖兩剛可以相受故曰往有尚言其與配同也及其暗去而眀全離之功既周浹矣則當去之既浹而不去則有相疑之災九四之為人可與共憂患而不可與同安樂者也六二豐其蔀日中見斗往得疑疾有孚發若吉象曰有孚發若信以發志也九三豐其沛日中見沫折其右肱無咎象曰豐其沛不可大事也折其右肱終不可用也蔀覆也蔽之全者也見斗暗之甚也沛斾也蔽之不全者也沫小眀也眀暗雜者也六五之謂蔀上六之謂沛何也二者皆隂也而六五處中居暗以求眀上六處髙强眀以自用六二之適五也適於全蔽而甚暗者也夫蔽全則患蔽也深暗甚則求眀也力六五之暗不發則已發之則眀矣故曰往得疑疾有孚發若吉以隂適隂其始未有不疑者也六二雖隂而所以為離眀之所自出也故始疑而終信也若夫九三之適上六則適於眀暗雜者也用人則不能自用則不足故不可以大事也君子不畏其蔽而畏其雜以為無時而可發也為之用乎則不可不為之用乎則不敢故折其右肱以示必不可用而後免也九四豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不眀也遇其夷主吉行也夷等夷也初九之謂夷主不得其配而得其類也幽不眀者以言其暗之甚而不雜吉行者言初九之不可以久留也六五來章有慶譽吉象曰六五之吉有慶也六五以隂居陽有章者也而能來六二之明故曰來章借眀於人而譽歸於己君子豫之上六豐其屋蔀其家窺其户閴其無人三歲不覿凶象曰豐其屋天際翔也窺其戶閴其無人自藏也上六翔於天際自以為明之至也而其暗則足以蔽其身而已故曰豐其屋蔀其家九三自折其右肱而莫為之用豈真無人哉畏我而自藏也三歲不覿其自以為眀者窮矣故凶艮下離上旅小亨旅貞吉彖曰旅小亨柔得中乎外而順乎剛止而麗乎眀是以小亨旅貞吉也旅之時義大矣哉旅六二六五二隂據用事之地而九三九四上九三陽寓於其間所以為旅也小者為主而大者為旅為主者以得中而順乎剛為亨故曰小亨為旅者以居貞而不取為吉故曰旅貞吉止而麗乎明則居貞而不取之謂也貞吉者指三陽非二隂為主者之事也故特曰旅貞吉象曰山上有火旅君子以眀慎用刑而不留獄初六旅瑣瑣斯其所取災象曰旅瑣瑣志窮災也羈旅之世物無正主近則相依自六二至上九皆隂陽相鄰而初獨孑然處六二之下其細已甚故曰旅瑣瑣也斯隸也六二近於九三三之所取也初六窮而無依隸於六二役於九三三焚二次並以及初故曰斯其所取災也六二旅即次懷其資得童僕貞象曰得童僕貞終無尤也六二九三之所即以為次也因三之資以隸初六故曰得童僕貞初六雖四之應而四為三所隔終無尤之者也九三旅焚其次喪其童僕貞厲象曰旅焚其次亦以傷矣以旅與下其義喪也下初六也六二我之次也而初隸於二懷二而並有之則初亦我之童僕矣九三以剛居上見得而忘義焚二以取初則一舉而兩失之矣九四旅於處得其資斧我心不快象曰旅於處未得位也得其資斧心未快也資斧所以除荆棘治次舍也九四剛而失位所乘者九三有資斧而無地者也故處而心不快六五射雉一矢亡終以譽命象曰終以譽命上逮也居二陽之間可以德懷不可以力取如以一矢射兩雉理無兼獲得四則失上矣若不志於取亡矢而不射則夫二陽者皆可以其功譽而爵命之非獨得四可以及上也上九鳥焚其巢旅人先笑後號咷喪牛於易凶象曰以旅在上其義焚也喪牛於易終莫之聞也九三次於六二之上上九巢於六五之上皆以剛臨柔六二六五皆無應而在我下其勢必與我上九九三知其無應而必我與也故易而取之九三焚其次上九焚其巢其為不義一也而三止於貞厲上至於號咷之凶者六五旅之主也離之彖曰畜牝牛吉六五之謂牛矣易五以喪牛終莫之聞者驕亢之罪也巽下巽上巽小亨利有攸往利見大人彖曰重巽以申命君子和而不同以巽繼巽小人之道也無施而可故用於申命而已剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人所以為巽者初與四也二五雖據用事之地而權不在焉故曰剛巽乎中正而志行言必用初與四而後得志也權雖在初與四而非用事之地故曰柔皆順乎剛是以小亨言必順二五而後亨也利有攸往為二五用也利見大人見九五也有其權而無其位非九五之大人孰能容之象曰隨風巽君子以申命行事申重也兩風相因是謂隨風申命之象也古之為令者必反覆申明之然後事必行初六進退利武人之貞象曰進退志疑也利武人之貞志治也初六有其權而無其位九二九三之所病故疑而進退也小人而權在焉則易謂之武人武人負其力而不貞於君志亂也及其治也則以貞於其君為利九二巽在牀下用史巫紛若吉無咎象曰紛若之吉得中也九二以陽居隂能下人者也知權在初六故巽於牀下下之而求用也初六武人也方且進退我則下之而求其用故求者紛然而用者不力譬之用史巫將以求福於神神之降福未可知而史巫先享其利也故吉而後無咎紛然而求人者非吉之道也其所以吉者居得其中用事之地也九三頻巽吝象曰頻巽之吝志窮也九三以陽居陽而非用事之地也知權之在初六也下之則心不服制之則力不能故頻蹙以待之復之六三不能止初九之為復也故頻復巽之九三不能止初六之為巽也故頻巽六四悔亡田獲三品象曰田獲三品有功也六四有其權而無其位者與初六均也蓋亦居可疑之地矣而有九五以為之主坦然以正待之故悔亡九五不求而六四自求用故其用也力譬之於田田者盡力以獲禽而利歸於君一為乾豆二為賓客三為充君之庖君子不勞而獲三品其與史巫之功亦逺矣九五貞吉悔亡無不利無初有終先庚三日後庚三日吉象曰九五之吉位正中也九五履中正之位進不頻蹙以忌四退不過巽以下之蓋貞而已矣此四所以心服而為之用也是以吉且悔亡而無不利無不利者四與五皆利也九五之德如此故有後庚之終吉上九巽在牀下喪其資斧貞凶象曰巽在牀下上窮也喪其資斧正乎凶也九二以陽居隂上九處巽之極故皆巽於牀下而上九陽亢於上非能下人者也九二之巽將以用初六而上九之巽將以圖六四也有用斧之意焉特以處於無位之地故喪其斧也以上下言之則正以勢言之則凶兌下兌上兌亨利貞彖曰兌說也剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉小惠不足以勸民象曰麗澤兌君子以朋友講習取其樂而不流者也初九和兌吉象曰和兑之吉行未疑也九二孚兌吉悔亡象曰孚兌之吉信志也和而不同謂之和兌信於其類謂之孚兌六三小人而初九九二君子也君子之說於小人將以有所濟非以為利也初九以逺之而無嫌至九二則初九疑之矣故必有以自信於初九者而後悔亡文豫而實不豫所以信於初九也六三來兌凶象曰來兌之凶位不當也九四商兌未寧介疾有喜象曰九四之喜有慶也九五兑之主也上有上六下有六三皆其疾也傳曰美疢不如惡石九四介於其間以剛輔五而議二隂者也故曰商兌未寧介疾有喜言疾去而後有喜也疾去而後有喜則易之所謂慶也九五孚於剝有厲象曰孚於剝位正當也上六引兌象曰上六引兌未光也六三上六皆兌之小人以隂為質以說為事者均也六三履非其位而處於二陽之間以求說為兑者故曰來兌言初與二不招而自來也其心易知其為害淺故二陽皆吉而六三凶上六超然於外不纍於物此小人之託於無求以為兌者也故曰引兑言九五引之而後至也其心難知其為害深故九五孚於剝剝者五隂而消一陽也上六之害何至於此曰九五以正當之位而孚於難知之小人其至於剝豈足怪哉雖然其心蓋不知而賢之非說其小人之實也使知其實則去之矣故有厲而不凶然則上六之所以不光何也曰難進者君子之事也使上六引而不兌則其道光矣坎下巽上渙亨王假有廟利涉大川利貞彖曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也世之方治也如大川安流而就下及其亂也潰溢四出而不可止水非樂為此蓋必有逆其性者泛溢而不已逆之者必衰其性必復水將自擇其所安而歸焉古之善治者未嘗與民爭而聽其自擇然後從而導之渙之為言天下流離渙散而不安其居此宜經營四方之不暇而其彖曰王假有廟其象曰先王以亨於帝立廟何也曰犯難而爭民者民之所疾也處危而不婾者衆之所恃也先王居渙散之中安然不爭而自為長久之計宗廟既立亨帝之位定而天下之心始有所繫矣剛來而不窮者九二也柔得位乎外而上同者六四也渙之得民惟是二者此所以亨也然猶未免乎渙王假有廟謂五也王至於有廟而後可以涉大川於是渙始有所歸矣有所歸而後有川有川而後可涉乘木乘舟也舟之所行川之所在也象曰風行水上渙先王以亨於帝立廟初六用拯馬壯吉象曰初六之吉順也九二在險中得初六而安故曰用拯馬壯吉眀夷之六二有馬不以自乘而以拯上六之傷渙之初六有馬不以自乘而以拯九二之險故象皆以為順言其忠順之至也九二渙奔其機悔亡象曰渙奔其機得願也得初六而安是謂機也六三渙其躬無悔象曰渙其躬志在外也渙之世民無常主六三有應於上志在外者也而近於九二二者必爭焉故渙其躬無所適從惟有道者是豫而後安六四渙其羣元吉渙有丘匪夷所思象曰渙其羣元吉光大也上九之有六三者以應也九五之有六四九二之有初六者以近也皆有以羣之渙而至於羣天下始有可收之漸其德大者其所羣也大其德小者其所羣也小小者合於大大者合於一是謂渙其羣也近五而得位則四之所羣者最大也因君以得民有民以自封殖是謂丘也夷平也民之蕩蕩焉未有所適從者也彼方不知其所從而我則為丘以聚之豈夷者之所思哉民之所思思夫有德而爭民者也九五渙汗其大號渙王居無咎象曰王居無咎正位也汗取其周浹而不反也宗廟既立亨帝之位定而大號令出焉其曰渙王居何也彖曰王假有廟王乃在中也渙然之中不知其孰為臣孰為主至於有廟而天下始知王之所在矣故曰渙王居言渙之中有王居矣上九渙其血去逖出無咎象曰渙其血遠害也上九求六三必與九二爭而傷焉渙其血不爭也九二剛來而不窮不可與爭者也雖不爭而處爭之地猶未免也故去而逺出然後無咎兌下坎上節亨苦節不可貞彖曰節亨剛柔分而剛得中剛柔分者兌下而坎上也剛得中者謂二五也此所以為節亨也苦節不可貞其道窮也謂六三也說以行險當位以節中正以通謂九二也兌施節於坎故曰說以行險天地節而四時成節以制度不傷財不害民象曰澤上有水節君子以制數度議德行數度者其政事也德行者其教化也皆所以為民物之節也初九不出户庭無咎象曰不出戶庭知通塞也九二不出門庭凶象曰不出門庭凶失時極也節者事之會也君子見吉凶之幾發而中其會謂之節詩東方未眀刺無節也其詩曰不能晨夜不夙則莫言無節者不識事之會或失則早或失則莫也澤上有水節以澤節水者也虛則納之滿則流之其權在澤初九九二六三澤也節人者也六四九五上六水也節於人者也節之於初九則太早節之於六三則太莫故九二者施節之時當發之會也水之始至澤當塞而不當通既至當通而不當塞故初九以不出戶庭為無咎言當塞也九二以不出門庭為凶言當通也至是而不通則失時而至於極六三是也是禍福之交成敗之决也故孔子曰君不密則失臣臣不密則失身幾事不密則害成六三不節若則嗟若無咎象曰不節之嗟又誰咎也咨嗟而節之以為不可不節也九二之節節於未滿節之者樂見節者井焉六三之節節於既溢節之者嗟見節者苦焉苦節者人之所不能堪而人終莫之咎者知六三之不得已也嗟者不得已之見於外者也六四安節亨象曰安節之亨承上道也六四承節於九五在其上不在其身故六四安焉九五甘節吉往有尚象曰甘節之吉居位中也畜而至於極然後節之其節也必爭九二施節於不爭之中此九五之所樂也故曰甘節樂則流井則壞故以往適上六隂陽相配甘苦相濟為吉也上六苦節貞凶悔亡象曰苦節貞凶其道窮也易有凶而無咎者大過之上六困之九二是也則未有凶而能悔亡者亦如人之未有既死而病愈者也上六貞凶悔亡者何也凶者六三悔亡者上六也是以知節者在坎而見節者之在兌也六三施苦節於我出於不得已則無咎以是為正則凶矣而我悔亡兌下巽上中孚豚魚吉利涉大川利貞彖曰中孚柔在內而剛得中說而巽孚乃化邦也中孚信也而謂之中孚者如羽蟲之孚有諸中而後能化也羽蟲之孚也必柔內而剛外然則頥曷為不中孚也曰內無陽不生故必柔內而剛外且剛得中然後為中孚也剛得中則正而一柔在內則靜而久此羽蟲之所以孚天之道也君子法之行之以說輔之以巽而民化矣豚魚吉信及豚魚也信之及民容有僞其及豚魚不容有僞也至於豚魚皆吉則其信也至矣利涉大川乘木舟虛也易至於巽在上而云涉川者其言必及木益之彖曰木道乃行渙之彖曰乘木有功中孚之彖曰乘木舟虛以眀此巽之功也以巽行兌乘天下之至順而行於人之所說必無心者也舟虛者無心之謂也中孚以利貞乃應乎天也天道不容僞象曰澤上有風中孚君子以議獄緩死化邦之時不可以用刑初九虞吉有它不燕象曰初九虞吉志未變也虞戒也燕安也六四初九之應也而近於五為五所攣所謂它也六四不專於應而有心於五其色不安此必變者也初九及其未變而戒之不輕往應則遠於爭矣故吉九二鳴鶴在隂其子和之我有好爵吾與爾靡之象曰其子和之中心願也此中孚也而爻未有能中孚者也中孚者必正而一靜而久而初九六四六三上九有應而相求九五無應而求人者也皆非所謂正而一靜而久者也惟九二以剛履柔伏於二隂之下端慤無求而物自應焉故曰鳴鶴在隂其子和之鶴鳴而子和者天也未有能使之者也我有好爵吾與爾靡之有爵者求我之辭也彼求我而我不求之之謂也六三得敵或鼓或罷或泣或歌象曰或鼓或罷位不當也六三履非其位雖應在上九而上九非下我者也上不求三而三求之求之必過五五無應而寇我故曰得敵也得敵而躁躁而失常故或鼓或罷或泣或歌也六四月幾望馬匹亡無咎象曰馬匹亡絶類上也初九以應而從我九五以近而攣我一隂而當二陽之求盛之至也故曰月幾望月幾望者非四之所任也故必捨五而從初如有二馬而亡其一然後無咎類五也四與五皆巽也故得稱類九五有孚攣如無咎象曰有孚攣如位正當也有孚者六四也自五言之則以得四為無咎非應而求從必攣而後固特以其位當是以無咎也上九翰音登於天貞凶象曰翰音登於天何可長也翰音飛且鳴者也凡羽蟲之飛且鳴者其飛不長雉雞之類是也處外而居上非中孚之道飛而求顯鳴而求信者也故曰翰音登於天九二在隂而子和上九飛鳴而登天其道蓋相反也惟不下從隂得陽之正故曰貞凶艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉彖曰小過小者過而亨也隂自外入據用事之地而囚陽於內謂之小過小過者君弱而臣强之世也小者過而亨則大者失位而否矣過以利貞與時行也彖之所謂利貞則象之所謂過乎恭儉與哀者時當然也柔得中是以小事吉也剛失位而不中是以不可大事也小過者臣强而專小事雖專之可也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也小過有鳥之象四隂據用事之地其翼也二陽囚於內其腹背也翼欲往腹背不能止翼欲止腹背不能作也故飛鳥之制在翼鳥之飛也上窮而忘返其身遠矣而獨遺其音臣之僣也必孤其君遠其民使其君如飛鳥之上窮使其民聞君之聲不見其形也而後得志故曰飛鳥遺之音不宜上宜下大吉上逆而下順也小過之世其臣則逆而其民順故不宜上宜下上則無民而主孤下則近民而君强也象曰山上有雷小過居子以行過乎恭喪過乎哀用過乎儉小過之君弱是以臣子痛自貶以張君父也初六飛鳥以凶象曰飛鳥以凶不可如何也大過之棟小過之飛鳥皆以為一卦之象而其於爻也皆寄之於初上者本末之地也春秋傳曰凡師能左右之曰以飛鳥見以於翼欲左而左欲右而右莫如之何也故凶六二過其祖遇其妣不及其君遇其臣無咎象曰不及其君臣不可過也卦合而言之小過者臣强之世也爻别而觀之六五當强臣六二以隂居隂臣强而不僣者也大過以夫妻為君臣而小過寄之祖與妣者大過君驕故自君父言之而小過臣强故為臣子之辭其義一也曰不幸而過其祖矣而猶遇其妣妣未有不助祖者也不幸而不及其君矣而猶遇其臣臣未有不忠於其君者也故小過之世君弱而不能為政臣得專之者惟六二也然而於祖曰過於君曰不及者以見臣之不可過其君也九三弗過防之從或戕之凶象曰從或戕之凶如何也九四無咎弗過遇之往厲必戒勿用永貞象曰弗過遇之位不當也往厲必戒終不可長也小過陽失位而不中故其君在三四三之所臣者初與二也四之所臣者五與上也春秋臣弒其君故曰弒或曰戕弒者其所從來有漸而戕者一朝一夕之故也六二强臣也而未之過九三剛而不中莫能容也故曰弗過防之從或戕之凶言六二弗過而九三疑之故或從而戕其君謂之戕者以眀二本無意於逆咎在三也九四以陽居隂可謂無咎矣然而失位自卑臣雖弗過我則開之遇逢也臣未僣而逢其惡故曰弗過遇之往厲必戒勿用永貞言九四失位而往從五危而非正不可長也六五密雲不雨自我西郊公弋取彼在冗象曰密雲不雨已上也已上者其勢不可復下之辭也六五之權足以為密雲而終不為雨次於西郊而不行豈真不能哉其謀深也强臣之欲為變也憂在內是故見利而不為見益而不取縕畜以自厚持滿而不發者凡皆以遂其深謀也當是時也必有冗其間而為之用者故戒之曰公弋取彼在冗君子之居此苟無意於為盜莫若取其在冗者以自眀於天下而天下信之矣上六弗遇過之飛鳥離之凶是謂災眚象曰弗遇過之已亢也至於是則亢而不可復返也故曰弗遇過之言君雖不逢其惡而臣自僣也離遭也君失其政而臣得之其所從來逺矣而憂患集於我非我失政而遭其凶者天禍也故曰飛鳥離之凶是謂災眚離下坎上既濟亨小利貞初吉終亂彖曰既濟亨小者亨也凡隂陽各安其所則靜而不用將發其用必有以蘊之者水在火上火欲炎而不達此火之所以致其怒也隂皆乘陽陽欲進而不遂此陽之所以奮其力也火致其怒雖險必達陽奮其力雖難必遂此所以為既濟也故曰既濟亨小者亨也言小者皆在上而亨大者皆在下而否也利貞剛柔正而位當也坎上而離下剛柔正也隂皆居隂陽皆居陽位當也剛柔正而位當則小者不可復進以貞為利也初吉柔得中也終止則亂其道窮也柔皆乘剛非正也以濟則可既濟則當變而反其正以此終焉止而不變則亂矣象曰水在火上既濟君子以思患而豫防之既濟者難平而安樂之世也憂患常生於此初九曵其輪濡其尾無咎象曰曳其輪義無咎也濟者皆自內適外故既濟未濟皆以初為尾以上為首曵者欲行而未進之象也初九方行於險未畢濟者也故無咎六二婦喪其茀勿逐七日得象曰七日得以中道也安樂之世人不思亂而小人開之開之有端必始於爭爭則動動則無所不至君子居之以至靜受之以廣大雖有好亂樂禍之人欲開其端而人莫之豫蓋未嘗不旋踵而敗也既濟爻爻皆有應六二六四居二陽之間在可疑之地寇之所謀而六二居中九五之配也或者欲間之故竊其茀茀者婦之蔽也婦喪其茀其夫必怒而求之求未必得而婦先見疑近其婦者先見詰怨怒竝生而憂患之至不可以勝防矣故凡竊吾茀者利在於吾之逐之也吾恬而不逐上下晏然非盜者各安其位而盜者敗矣故曰勿逐七日得九三髙宗伐鬼方三年克之小人勿用象曰三年克之憊也未濟方其未出于難也上下一心譬如胡越同舟而遇風雖厲民以犯難可也及其既濟已出於難則上之用其民也易以致怨而下之為其上用也易以致疑故未濟之九四震用伐鬼方三年有賞於大國而既濟之九三以是為憊也未濟之主在六五而九四為之臣有震主之威者也其威不用之於主而用之於伐鬼方雖三年之久未見其克不克也而猶賞之以大國者以難未平也若出於難則臣必用其威於主而主亦疑其臣矣既濟之九三以九五為主臣主皆强故曰髙宗伐鬼方以見三之為五用也雖以髙宗之賢三年而後克之者既濟之世民安於無事而不可用也未濟之賞以大國也豈嘗問其君子小人哉有功斯國之矣而既濟則小人勿用蓋已疑其臣矣六四繻有衣袽終日戒象曰終日戒有所疑也繻當作濡衣袽所以備舟隙也四居二陽之間而不相得故備且戒如是也卦以濟為事故取於舟九五東鄰殺牛不如西鄰之禴祭實受其福象曰東鄰殺牛不如西鄰之時也實受其福吉大來也東西者彼我之辭也祭未有不殺牛者而云殺牛不如禴祭何也曰禴祭時祭也國之常事而殺牛者非時特殺而祭以求福者也小人以為禴祭常事不足以致福故以非時殺牛而求之而不知時祭之福不求而大來也人之情在難則厭事而無難之世常不能安有其福故聖人以為既濟之主在於守常安法而已求功名於法度之外則易之所謂殺牛也上六濡其首厲象曰濡其首厲何可久也既濟之上六畢濟之時也而以隂居之未免於危也坎下離上未濟亨小狐汔濟濡其尾無攸利彖曰未濟亨柔得中也謂六五也小狐汔濟未出中也濡其尾無攸利不續終也未濟陽皆乘隂上下之分定未可以有為也汔涸也坎在離上則水溢而火怒於下必進之象也是以雖溢而可以濟坎在離下則水涸而火安於上不進之象也是以雖涸而不可以濟君子見其逺者大者小人見其小者近者初六六三小人也見水之涸以為可濟也是謂小狐汔濟而九二君子也以為不可曵其輪而不進則小狐安能獨濟哉是謂未出中也二隂輕進而九二不豫是以六三征凶初六濡其尾雖九二亦病矣故無攸利見易而輕犯之遇難而退雖有智者不能善其後故曰不續終也雖不當位剛柔應也易二三四五皆失位惟未濟與歸妹也故皆無攸利而歸妹又征凶者剛柔不應也象曰火在水上未濟君子以慎辨物居方上下方安其位而不樂於進取則君子慎靜其身而辨物居方以待其會初六濡其尾吝象曰濡其尾亦不知極也水火相射極乃致用故濟必待其極汔濟非其極也九二曵其輪貞吉象曰九二貞吉中以行正也外若不行中以行正也六三未濟征凶利涉大川象曰未濟征凶位不當也未濟非不濟也有所待之辭也蓋將畜其全力一用之於大難大難既平而小者隨之矣故曰利涉大川六三見水之涸幸其易濟而驟用之後有大川則其用廢矣故曰征凶見涸而濟者初與三均也初吝而已三至於凶位不當也九四貞吉悔亡震用伐鬼方三年有賞於大國象曰貞吉悔亡志行也九四有震主之威苟不用於鬼方則無所行其志矣震主者悔也貞於主而用於敵所以悔亡也六五貞吉無悔君子之光有孚吉象曰君子之光其暉吉也光出於形之表而不以力用君子之廣大者也下有九二其應也旁有九四上九其鄰也險難未平三者皆剛莫能相用將求用於我之不暇非謀我者也故六五信是三者則三者為之盡力而我無為此貞吉無悔君子之光也上九有孚於飲酒無咎濡其首有孚失是象曰飲酒濡首亦不知節也節事之會也是是時也至於是而不濟終不濟也故未濟之可以濟者惟是也險難未平六五信我將以用我也我則飲酒而已何也將安以待其會也故無咎上九之謂首濡其首者可濟之時也若不赴其節飲酒於可濟之時則信我者失是時矣東坡易傳卷六
