body:
  text: 東坡易傳易類提要臣等謹案東坡易傳九卷宋蘇軾撰軾事迹具宋史本傳是書一名毗陵易傳陸遊老學庵筆記謂其書初遭元祐黨禁不敢顯題軾名故稱毗陵先生以軾終於常州故也蘇籀欒城遺言記蘇洵作易傳未成而卒屬二子述其志軾書先成轍乃送所解於軾今蒙卦猶是轍解則此書實蘇氏父子兄弟合力為之題曰軾撰要其成耳籀又稱洵晚嵗讀易玩其爻象得其剛柔逺近喜怒逆順之情故朱子謂其惟發明愛惡相攻情偽相感之義而議其粗疏胡一桂記朝説之之言謂軾作易傳自恨不知數學而其學又雜以禪故朱子作雜學辨以軾是書為首然朱子所駁不過十九條其中辨文義者四條又一條謂蘇説無病然有未盡其説者則朱子所不取者僅十四條不過全書百分之一未足以為是書病况朱子語類又嘗謂其於物理上亦有看得著處則亦未嘗竟廢之矣今觀其書如解乾卦彖傳性命之理諸條誠不免杳冥恍惚淪於異學至其他推闡理勢言簡意明往往足以達難顯之情而深得曲譬之旨蓋大體近於王弼而弼之説惟暢元風軾之説多切人事其文詞博辨足資啓發又烏可一槩屏斥耶李衡作周易義海撮要丁易東作周易象義董真卿作周易會通皆採録其説非徒然也明焦竑初得舊本刻之烏程閔齊伋以朱墨板重刻頗為工緻而無所校正毛晉又刻入津逮祕書中三本之中毛本最舛如漸卦上九併經文皆改為鴻漸於逵則他可知矣今以焦本為主猶不甚失其真焉乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1440a50227b1232286c90b85811508a0f8f191035bb63a9f4c10938e560700ea
