body:
  text: 東坡易傳卷二宋蘇軾撰乾下坤上泰小往大來吉亨彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也内陽而外隂内健而外順内君子而外小人君子道長小人道消也陽始於復而至於泰泰而後為大壯大壮而後為夬泰之世不若大壯與夬之世小人愈衰而君子愈盛也然而聖人獨安夫泰者以為世之小人不可勝盡必欲迫而逐之使之窮而无歸其勢必至於爭爭則勝負之勢未有決焉故獨安夫泰使君子居中常制其命而小人在外不為无措然後君子之患无由而起此泰之所以為最安也象曰天地交泰后以財成天地之道輔相天地之宜以左右民財材也物至於泰極矣不可以有加矣故因天地之道而材成之即天地之宜而輔相之以左右民使不入扵否而已否未有不自其已甚者始故左右之使不失其中則泰可以常保也初九拔茅茹以其彚征吉象曰拔茅征吉志在外也王弼曰茅之為物拔其根而相連引者也茹相連之貌也三陽同志俱志於外初為類首舉則類從故曰以其彚征吉九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚于中行以光大也陽皆在内據用事之處而擯三隂於外此隂之所不能堪也隂不能堪必疾陽疾陽斯争矣九二陽之主也故包荒用馮河馮河者小人之勇也小人之可用惟其勇者荒者其無用者也有用者用之無用者容之不遐棄也此所以懐小人爾以君子而懐小人其朋以為非也而或去之故曰朋亡然而得配於六五有大援於上君子所以愈安也雖亡其朋而卒賴以安此所以為光大也九三无平不陂无往不復艱貞无咎勿恤其孚于食有福象曰无往不復天地際也乾本上也坤本下也上下交故乾居於内而坤在外苟乾不安其所而務進以迫坤則夫順者將至於逆故曰无平不陂坤不獲安於上則将下復以奪乾乾之往適所以速其復也故曰無往不復當是時也坤已知難而貞於我則可以无咎之矣九三之所孚者初與二也以其所孚者為樂進以迫坤而重違之則危矣故教之以勿恤其孚而安于食是以有泰之福六四翩翩不富以其鄰不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也王弼曰乾樂上復坤樂下復四處坤首六五上六皆失其故處而樂下者故翩翩相從不必富而能用其鄰不待戒而自孚六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也妹女之少者也易女少而男長則權在女六五以隂居尊位有帝乙歸妹之象焉坤樂下復下復而奪乾乾則病矣而亦非坤之利也乾病而疾坤坤亦將傷焉使乾不病坤不傷莫如以輔乾之意而行其下復之願如帝女之歸其夫者帝女之歸也非求勝其夫將以祉之坤之下復非以奪乾將以輔之如是而後可上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也取土於隍而以為城封而髙之非城之利以利人也泰之所以厚坤於外者非以利坤亦以衛乾爾坤之在上而欲復於下猶土之為城而欲復於隍也有城而不能固之使復於隍非城之罪人之過也故勿用師上失其衛則下思擅命故自邑告命邑非所以出命也然既以失之矣從而懐之則可正之則吝坤下乾上否之匪人不利君子貞大徃小来彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下无邦也内隂而外陽内柔而外剛内小人而外君子小人道長君子道消也春秋傳曰不有君子其能國乎君子道消雖有國與无同矣象曰天地不交否君子以儉徳辟難不可榮以禄初六拔茅茹以其彚貞吉亨象曰拔茅貞吉志在君也自泰為否也易自否為泰也難何也隂陽易位未有不志於復而其既復未有不安其位者也故泰有征而否旡征夫苟无征則是終无泰也而可乎故坤處内而不忘貞於乾斯所以為泰之漸矣故亨六二包承小人吉大人否亨象曰大人否亨不亂羣也隂得其位欲包羣陽而以承順取之上説其順而不知其害此小人之吉也大人之欲濟斯世也苟出而争之上則君莫之信下則小人之所疾故莫如否大人否而退使君子小人之羣不相亂以為邪之勝正也常於交錯未定之間及其羣分類别正未有不勝者也故亨六三包羞象曰包羞位不當也三本陽位故包承羣陽而知羞之矣九四有命无咎疇離祉象曰有命无咎志行也君子之居否患无以自行其志爾初六有志於君而四之應苟有命我无庸咎之矣故君子之疇獲離其福疇類也九五休否大人吉其亡其亡繫於苞桑象曰大人之吉位正當也九五大人之得位宜若甚安且强者也然其實制在於内席其安强之勢以與小人争而求勝則不可故曰休否大人吉恃其安强之勢而不虞小人之内勝亦不可故曰其亡其亡繫於苞桑休否者所謂大人否也小人之不吾敵也審矣惟乗吾急則有以幸勝之利在於急不在於緩也苟否而不争以休息之必有不吾敵者見焉故大人吉上九傾否先否後喜象曰否終則傾何可長也否至於此不可復因非傾蕩埽除則喜無自至矣離下乾上同人於野亨利涉大川利君子貞彖曰同人柔得位得中而應乎乾曰同人此專言二也同人曰同人於野亨此言五也故别之利涉大川乾行也野者无求之地也立於無求之地則凡從我者皆誠同也彼非誠同而能從我於野哉同人而不得其誠同可謂同人乎故天與人同物之能同於天者蓋寡矣天非求同於物非求不同於物也立乎上而天下之能同者自至焉其不能者不至也至者非我援之不至者非我拒之不拒不援是以得其誠同而可以涉川也故曰同人于野亨利涉大川乾行也苟不得其誠同與之居安則合與之涉川則潰矣渉川而不潰者誠同也文眀以健中正而應君子正也唯君子為能通天下之志象曰天與火同人君子以類族辨物水之於地為比火之與天為同人同人與比相近而不同不可不察也比以无所不比為比而同人以有所不同為同故君子以類族辨物初九同人于門无咎象曰出門同人又誰咎也初九自内出同於上上九自外入同於下自内出故言門自外入故言郊能出其門而同於人不自用者也六二同人于宗吝象曰同人于宗吝道也凡言媾者其外應也凡言宗者其同體也九五為媾九三為宗從媾正也從宗不正也六二之所欲從者媾也而宗欲得之正者逺而不相及不正者近而足以相困苟不能自力於難而安於易以同乎不正則吝矣九三伏戎於莽升其髙陵三歳不興象曰伏戎于莽敵剛也三歳不興安行也九四乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也六二之欲同乎五也歴三與四而後至故三與四皆欲得之四近於五五乘其墉其勢至迫而不可動是以雖有争二之心而未有起戎之迹故猶可知困而不攻反而獲吉也若三之於五也稍逺而肆焉五在其陵而不在其墉是以伏戎于莽而伺之既已起戎矣雖欲反則可得乎欲興不能欲歸不可至於三歲行將安入故曰三嵗不興安行也九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也子曰君子之道或出或處或黙或語二人同心其利斷金同心之言其臭如蘭由此觀之豈以用師而少五哉夫以三四之强而不能奪始於號咷而卒達於笑至於用師相克矣而不能散其同此所以知二五之誠同也二隂也五陽也隂陽不同而為同人是以知其同之可必也君子出處語黙不同而為同人是以知其同之可必也苟可必也則雖有堅强之物莫能間之矣故曰其利斷金蘭之有臭誠有之也二五之同其心誠同也故曰其臭如蘭上九同人於郊无悔象曰同人於郊志未得也物之同於乾者已寡矣今又處乾之上則同之者尤難以其无所苟同則可以无悔以其莫與共立則志未得也乾下離上大有无亨彖曰大有柔得尊位大中而上下應之曰大有謂五也大者皆見有於五故曰大有其徳剛健而文眀應乎天而時行是以元亨象曰火在天上大有君子以遏惡揚善順天休命以健濟眀可以進退善惡順天之休命也初九无交害匪咎艱則无咎二應於五三通於天子四與上近焉獨立无交者惟初而已雖然无交之為害也非所謂咎也獨立无恃而知難焉何咎之有象曰大有初九无交害也明惟初九為然也九二大車以載有攸往无咎象曰大車以載積中不敗也大車虚而有容者謂五也九二足以有為矣然非六五虚而容之雖欲往可得乎積中明虚也九三公用亨於天子小人弗克象曰公用亨于天子小人害也九三以陽居陽其勢足以通於天子以小人處之則敗矣九四匪其彭无咎象曰匪其彭无咎眀辨晳也彭三也九四之義知有五而已夫九三之剛非强也六五之柔非弱也惟眀者為能辨此六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而无備也處羣剛之間而獨用柔无僃之甚者也以其无僃而物信之故歸之者交如也此柔而能威者何也以其无備知其有餘也夫僃生於不足不足之形見於外則威削上九自天祐之吉无不利象曰大有上吉自天祐也曰祐曰吉曰无不利其為福也多矣而終不言其所以致福之由而象又因其成文无所復説此豈真无説也哉盖其所以致福者逺矣夫兩剛不能相用而獨隂不可以用陽故必居至寡之地以隂附陽而後衆予之履之六三大有之六五是也六三附於九五六五附於上九而羣陽歸之二隂既因羣陽而有功九五上九又得以坐受二隂之成績故履有不疚之光而大有有自天之祐此皆聖賢之高致妙用也故孔子曰天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉无不利信也順也尚賢也此三者皆六五之徳也易而无僃六五之順也厥孚交如六五之信也羣陽歸之六五之尚賢也上九特履之爾我之所履者能順且信又以尚賢則天人之助將安歸哉故曰聖人无功神人无名而大有上九不見致福之由也艮下坤上謙亨君子有終彖曰謙亨天道下濟而光眀地道卑而上行此所以為謙亨也天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也此所以為君子有終也不於其終觀之則争而得謙而失者盖有之矣惟相要於究極然後知謙之必勝也象曰地中有山謙君子以裒多益寡稱物平施裒取也謙之為名生於過也物過然後知有謙使物不過則謙者乃其中爾過與中相形而謙之名生焉聖人即世之所名而名之而其實則歸于中而已矣地過乎卑山過乎高故地中有山謙君子之居是也多者取之謙也寡者益之亦謙也初六謙謙君子用涉大川吉象曰謙謙君子卑以自牧也此最處下是謙之過也是道也无所用之用於涉川而已有大難不深自屈折則不足以致其用牧者養之以待用云爾六二鳴謙貞吉象曰鳴謙貞吉中心得也雄鳴則雌應故易以隂陽唱和寄之於鳴謙之所以為謙者三也其謙也以勞故聞其風被其澤者莫不相從於謙六二其鄰也上九其配也故皆和之而鳴於謙而六二又以隂處内卦之中雖微九三其有不謙乎故曰鳴謙又曰貞吉鳴以言其和於三貞以見其出於性也九三勞謙君子有終吉象曰勞謙君子萬民服也勞功也謙五隂一陽待是而後為謙其功多矣艮之制在三而三親以艮下坤其謙至矣故曰勞謙勞而不伐有功而不徳非獨以自免而已又將以及人是得謙之全者也故彖曰君子有終而三亦云六四无不利撝謙象曰无不利撝謙不違則也是亦九三之所致也二近其内有配之象故曰鳴四近其外三之所向故稱撝以柔居柔而當三之所向三之所撝四之所趨也以謙撝謙孰不利者故曰无不利六五不富以其鄰利用侵伐无不利象曰利用侵伐征不服也直者曲之矯也謙者驕之反也皆非徳之至也故兩直不相容兩謙不相使九三以勞謙而上下皆謙以應之内則鳴謙外則撝謙其甚者則謙謙相追於无窮相益不已則夫所謂裒多益寡稱物平施者將使誰為之若夫六五則不然以為謙乎則所據者剛也以為驕乎則所處者中也惟不可得而謂之謙不可得而謂之驕故五謙莫不為之使也求其所以能使此五謙者而无所有故曰不富以其鄰至於侵伐而不害為謙故曰利用侵伐莫不為之用者故曰无不利上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也其為鳴謙一也六二自得於心而上六志未得者以其所居非安於謙者也特以其配之勞謙而强應焉貌謙而實不至則所服者寡矣故雖其邑國而猶叛之夫實雖不足而名在於謙則叛者不利叛者不利則征者利矣王弼曰吉凶悔吝生乎動者也動之所起興於利者也故飲食必有訟訟必有衆起未有居衆人之所惡而為動者所害處不競之地而為争者所奪是以六爻雖有失位无應乘剛而皆无凶咎悔吝者以謙為主也坤下震上豫利建侯行師豫之言暇也暇以樂之謂豫建侯所以豫豫所以行師也故曰利建侯行師有民而不以分人雖欲豫可得乎子重問晉國之勇欒鍼曰好以暇是故惟暇者為能師彖曰豫剛應而志行順以動豫豫順以動故天地如之言天地亦以順動也而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服上以順動則凡入於刑罰者皆民之過也豫之時義大矣哉卦未有非時者也時未有无義亦未有无用者也苟當其時有義有用焉往而不為大故曰時義又曰時用又直曰時者皆適遇其及之而已從而為之説則過矣如必求其説則凡不言此者皆當求所以不言之故无乃不勝異説而厭棄之歟盍取而觀之因其言天地以及聖人王公則多有是言因其所言者大而後及此者則其言之勢也是説也且非獨此見天地之情者四利見大人者五其餘同者不可勝數也又可盡以為異於他卦而曲為之説歟象曰雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考初六鳴豫凶象曰初六鳴豫志窮凶也所以為豫者四也而初和之故曰鳴已无以致樂而恃其配以為樂志不逺矣因人之樂者人樂亦樂人憂亦憂志在因人而已所因者窮不得不凶六二介于石不終日貞吉象曰不終日貞吉以中正也以隂居隂而處二隂之間晦之極静之至也以晦觀眀以静觀動則凡吉凶禍福之至如長短黑白陳乎吾前是以動静如此之果也介于石果於静也不終日果於動也是故孔子以為知㡬也六三盱豫悔遲有悔象曰盱豫有悔位不當也以陽居陽猶力人之馭健馬也有以制之夫三非六之所能馭也乗非其任而聴其所之若是者神亂於中而目盱於外矣據静以觀物者見物之正六二是也乗動以逐物者見物之似六三是也物之似福者誘之似禍者劫之我且睢盱而赴之既而非也則後雖有誠然者莫敢赴之矣故始失之疾而其終未嘗不以遲為悔也九四由豫大有得勿疑朋盍簮象曰由豫大有得志大行也盍何不也簮固結也五隂莫不由四而豫故大有得豫有三豫二貞三豫易懐而二貞難致難致者疑之則附者皆以利合而已夫以利合亦以利散是故來者去者觀望而不至者舉勿疑之則吾朋何有不固者乎六五貞疾恒不死象曰六五貞疾乘剛也恒不死中未亡也二與五皆貞者也貞者不志於利故皆不得以豫名之其貞同其所以為貞者異故二以得吉五以得疾也二之貞非固欲不從四也可則進否則退其吉也不亦宜乎五之於四也其質則隂其居則陽也質隂則力莫能較居陽則有不服之心焉夫力莫能較而有不服之心則其貞足以為疾而已三豫者皆内喪其守而外求豫者也故小者悔吝大者凶六五之貞雖以為疾而其中之所守者未亡則恒至於不死君子是以知貞之可恃也上六㝠豫成有渝无咎象曰㝠豫在上何可長也㝠者君子之所宜息也豫至上六宜息矣故曰㝠豫成有渝者盈輒變也盈輒變所以為无窮之豫也震下兌上隨元亨利貞无咎彖曰隨剛來而下柔動而説隨大亨貞无咎而天下隨時隨時之義大矣哉大時不齊故隨之世容有不隨者也責天下以人人隨已而咎其貞者此天下所以不説也是故大亨而利貞者貞者无咎而天下隨時時者上之所制也不從已而從時其為隨也大矣象曰澤中有雷隨君子以嚮晦入宴息雷在澤中伏而不用故君子晦則入息初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也物有正主之謂官九五者六二之正主也二以逺五而苟隨於初五以其隨初而疑之則官有變矣官有變初可以有獲也而非其正故官雖有變而以從正不取為吉也初之取二也得二而失五初之不取二也失二而得五何也可取而不取歸之於正主初信有功於五矣五必徳之失門内之配而得門外之交是故捨其近配而出門以求交於其所有功之人其得也必多故君子以為未嘗失也六二係小子失丈夫象曰係小子弗兼與也小子初也丈夫五也兼與必兩失六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也四為丈夫初為小子三无適應有求則得之矣然而從四正也四近而在上從上則順與近則固故係丈夫而利居貞九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也六三固四之所當有也不可以言獲獲者取非其有之辭也二之往配於五也厯四而後至四之勢可以不義取之取之則於五為凶不取則於五為有功二之從五也甚難初處其鄰而四當其道處其鄰不忘貞當其道不忘信使二得從其配者初與四之功也故皆言功居可疑之地而有功足以自明其誰咎之九五孚于嘉吉象曰孚於嘉吉位正中也嘉謂二也傳曰嘉偶曰配而昏禮為嘉故易凡言嘉者其配也隨之時隂急於隨陽者也故隂以不苟隨為貞而陽以不疑其叛已為吉六二以逺五而貳於初九五不疑而信之則初不敢有二不敢叛故吉上六拘係之乃從維之王用亨于西山象曰拘係之上窮也居上无應而不下隨故拘係之而後從從而又維之明强之而後從也强之而後從則其從也不固故教之曰當如王之通于西山王文王也西山西戎也文王之通西戎也待其自服而後從之不强以從也巽下艮上蠱元亨利渉大川先甲三日後甲三日彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利渉大川往有事也先甲三日後甲三日終則有始天行也器乆不用而蟲生之謂之蠱人乆宴溺而疾生之謂之蠱天下乆安无為而弊生之謂之蠱易曰蠱者事也夫蠱非事也以天下為无事而不事事則後將不勝事矣此蠱之所以為事也而昧者乃以事為蠱則失之矣器欲常用體欲常勞天下欲常事事故曰巽而止蠱夫下巽則莫逆上止則无為下莫逆而上无為則上下大通而天下治也治生安安生樂樂生媮而衰亂之萌起矣蠱之災非一日之故也必世而後見故爻皆以父子言之明父養其疾至子而發也人之情无大患難則日入於媮天下既已治矣而猶以渉川為事則畏其婾也蠱之與巽一也上下相順與下順而上止其為婾一也而巽之所以不為蠱者有九五以幹之而蠱无是也故蠱之彖曰先甲三日後甲三日終則有始而巽之九五曰无初有終先庚三日後庚三日吉陽生於子盡於已隂生於午盡於亥陽為君子君子為治隂為小人小人為亂夫一日十二干相值支五干六而後復世未有不知者也先甲三日後甲三日則世所謂六甲也先庚三日後庚三日則世所謂六庚也甲庚之先後隂陽相反故易取此以寄治亂之勢也先甲三日子戌申也中盡於己而陽盈矣盈將生隂治將生亂故受之以後甲後甲三日午辰寅也寅盡於亥然後隂極而陽生蠱無九五以幹之則其治亂皆極其自然之勢勢窮而後變故曰終則有始天行也夫巽則不然初雖失之後必有以起之譬之於庚先庚三日午辰寅也後庚三日子戌申也庚之所後甲之所先也故先庚三日盡於亥後庚三日盡於已先隂而後陽先亂而後治故曰无初有終又特曰吉不言之於巽彖而言之於九五者明此九五之功非巽之功也象曰山下有風蠱君子以振民育徳鼔之舞之之謂振振民使不惰育徳使不竭初六幹父之蠱有子考无咎厲終吉象曰幹父之蠱意承考也蠱之為災非一日之故也及其微而幹之初其任也見蠱之漸子有改父之道其始雖危終必吉故曰有子考无咎言无是子則考有咎矣孝愛之深者其迹有若不順其迹不順其意順也九二幹母之蠱不可貞象曰幹母之蠱得中道也隂之為性安无事而惡有為是以為蠱之深而幹之尤難者寄之母也正之則傷愛不正則傷義以是為至難也非九二其孰能任之故責之二也二以陽居隂有剛之實而无用剛之迹可以免矣九三幹父之蠱小有悔无大咎象曰幹父之蠱終无咎也九三之徳與二无以異也特不知所以用之二用之以隂而三用之以陽故小有悔而无大咎六四裕父之蠱往見吝象曰裕父之蠱往未得也六四之所居與二无以異也而无其徳斯益其疾而已裕益也六五幹父之蠱用譽象曰幹父用譽承以徳也父有蠱而子幹之猶其有疾而砭藥之也豈其所樂哉故初以獲厲三以獲悔六五以柔居中雖有幹蠱之志而无二陽之決故反以是獲譽譽歸於己則疾歸於父矣父之徳惟不可承也使其可承則非蠱矣蠱而承徳是以无巽九五後庚之吉也上九不事王侯髙尚其事象曰不事王侯志可則也君子見蠱之漸則渉川以救之及其成則不事王侯以逺之蠱之成也良醫不治君子不事事兌下坤上臨元亨利貞至於八月有凶彖曰臨剛浸而長説而順剛中而應大亨以正天之道也至于八月有凶消不乆也復而陽生凡八月而二隂至則臨之二陽盡矣方長而慮消者戒其速也象曰澤上有地臨君子以教思无窮容保民无疆澤所以容水而地又容澤則无不容也故君子為无窮之教保无疆之民記曰君子過言則民作辭過動則民作則故言必慮其所終而行必稽其所弊初九咸臨貞吉象曰咸臨貞吉志行正也有應者為咸臨咸感也感以臨則其為臨也易故咸臨所以行正也九二咸臨吉无不利象曰咸臨吉无不利未順命也二陽在下方長而未盛也四隂在上雖危而尚强也九二以方長之陽而臨衆隂隂負其强而未順命從而攻之隂則危矣而陽不能无損故九二以咸臨之而後吉陽得其欲而隂免於害故无不利六三甘臨无攸利既憂之无咎象曰甘臨位不當也既憂之咎不長也樂而受之謂之甘陽進而隂莫逆甘臨也甘臨者居於不爭之地而後可以居於陽陽猶疑之拒之固傷不拒猶疑之進退無所利者居之過也故六三之咎位不當而已咎在其位不在其人則憂懼可以免矣六四至臨无咎象曰至臨无咎位當也以隂居隂而應於初陽至而遂順之故曰至臨六五知臨大君之宜吉象曰大君之宜行中之謂也見於未然之謂知臨之世陽未足以害隂而其勢方鋭隂尚可以抗陽而其勢方郤苟以其未足以害我而不内以吾尚足以抗之而不受則陽将忿而攻隂六五以柔居尊而應於二方其未足而收之故可使為吾用方吾有餘而柔之故可使懐吾徳此所以為知也天子以是服天下之强者則可小人以是畜君子則不可故曰大君之宜吉惟大君為宜用是也大君以是行其中小人以是行其邪上六敦臨吉无咎象曰敦臨之吉志在内也敦益也内下也六五既已應九二矣上六又從而附益之謂之敦臨復之六四既已應初九矣六五又從而附益之謂之敦復其義一也坤下巽上觀盥而不薦有孚顒若彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣无器而民趨不言而物喻者觀之道也聖人以神道設教則賞爵刑罰有設而不用者矣寄之宗廟則盥而不薦者也盥者以誠薦者以味象曰風行地上觀先王以省方觀民設教初六童觀小人无咎君子吝象曰初六童觀小人道也大觀在上故四隂皆以尚賔為事初六童而未仕者也急於用以自衒賈惟器小而夙成者為无咎君子則吝矣六二闚觀利女貞象曰闚觀女貞亦可醜也六二逺且弱宜處而未宜賔者也譬之於女利貞而不利行者也苟以此為觀則是女不待禮而闚以相求貞者之所醜也六三觀我生進退象曰觀我生進退未失道也六三上下之際也故當自觀其生以卜進退夫欲知其君則觀其民故我之生則君之所為也知君之所為則進退決矣進退在我故未失道也六四觀國之光利用賔於王象曰觀國之光尚賔也進退之決在六三故自三以下利退而不利進自三以上利進而不利退進至於四決不可退矣故利用賔于王九五觀我生君子无咎象曰觀我生觀民也上九觀其生君子无咎象曰觀其生志未平也此二觀所自言之者不同其實一也觀我生讀如觀兵之觀觀其生讀如觀魚之觀九五以其至顯觀之於民以我示民故曰觀我生上九處於至高而下觀之自民觀我故曰觀其生今夫乗車於道負者皆有不平之心聖人以其一身擅天下之樂厚自奉以觀示天下而天下不怨夫必有以大服之矣吾以吾可樂之生而觀之人人亦觀吾生可樂則天下之争心將自是而起故曰君子无咎君子而後无咎難乎其无咎也東坡易傳卷二
