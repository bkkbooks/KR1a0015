body:
  text: 東坡易傳卷三宋蘇軾撰震下離上噬嗑亨利用獄道之衰也而物至於相噬以求合教化則已晚矣故利用獄彖曰頥中有物曰噬嗑所以為噬嗑者四也否則為頥矣噬嗑而亨剛柔分動而眀噬嗑之時噬非其𩔖而居其間者也陽欲噬隂以合乎陽隂欲噬陽以合乎隂故曰剛柔分動而明也雷電合而章柔得中而上行雖不當位利用獄也謂五也象曰雷電噬嗑先王以眀罰勅法初九屨校滅趾无咎象曰屨校滅趾不行也居噬嗑之時六爻未有不以噬為事者也自二與五反覆相噬猶能戒以相存也惟初與上内噬三隂而莫或噬之貪得而不戒故始於小過終於大咎聖人於此兩者寄小人之始終於彼四者明相噬之得喪六二噬膚滅鼻无咎象曰噬膚滅鼻乗剛也以隂居隂至柔而不拒者也故初九噬之若噬膚然至於滅鼻而不知止也夫滅鼻而不知止者非初之利也非初之利則二无咎矣六三噬腊肉遇毒小吝无咎腊肉乾胏乾肉皆難噬者也凡易以隂居陽則不純乎柔中有剛矣故六三六五皆有難噬之象夫勢之必不能拒也則君子以不拒為大六二是也六三之於九四力不能敵而懐毒以待之則已陋矣故曰小吝出於見噬而不能堪也故非其咎象曰遇毒位不當也若以隂居隂則无復有毒矣九四噬乾胏得金矢取其堅而可畏利艱貞吉象曰利艱貞吉未光也六五噬乾肉得黄金取其居中而貴貞厲无咎象曰貞厲无咎得當也九四居二隂之間六五居二陽之間皆處争地而致交噬者也夫不能以徳相懐而以相噬為志者惟常有敵以致其噬則可以少安苟敵亡矣噬将无所施不㡬於自噬乎由此觀之无徳而相噬者以有敵為福矣九四噬乾胏得金矢六五噬乾肉得黄金九四之難噬是六三六五之得也六五之難噬是九四上九之得也得之為言猶曰賴此以存云爾利艱貞吉貞厲无咎皆未可以居安而享福也惟有徳者為能居安而享福夫豈賴有敵而後存邪故曰未光也得當者當於二陽之間也上九何校滅耳凶象曰何校滅耳聰不眀也滅趾者止其行而已不行猶可以无咎滅耳則廢其聰矣无及也故凶離下艮上賁亨小利有攸往彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文眀以止人文也剛不得柔以濟之則不能亨柔不附剛則不能有所往故柔之文剛剛者所以亨也剛之文柔柔者所以利往也乾之為離坤之為艮隂陽之勢數也文眀以止離艮之徳也勢數推之天其徳以為人易有剛柔往来上下相易之説而其最著者賁之彖也故學者沿是争推其所從變曰泰變為賁此大惑也一卦之變為六十三豈獨為賁也哉學者徒知泰之為賁又烏知賁之不為泰乎凡易之所謂剛柔相易者皆本諸乾坤也乾施一陽於坤以化其一隂而生三子皆一陽而二隂凡三子之卦有言剛来者眀此本坤也而乾来化之坤施一隂於乾以化其一陽而生三女皆一隂而二陽凡三女之卦有言柔來者眀此本乾也而坤來化之故凡言此者皆三子三女相值之卦也非是卦也則无是言也凡六蠱之彖曰剛上而柔下賁之彖曰柔来而文剛分剛上而文柔咸之彖曰柔上而剛下恒之彖曰剛上而柔下損之彖曰損下益上益之彖曰損上益下此六者適遇而取之也凡三子三女相值之卦十有八而此獨取其六何也曰聖人之所取以為卦亦多術矣或取其象或取其爻或取其變或取其剛柔之相易取其象天水違行訟之𩔖是也取其爻六三履虎尾之𩔖是也取其變頥中有物曰噬嗑之類是也取其剛柔之相易賁之類是也夫剛柔之相易其所取以為卦之一端也遇其取者則言不取者則不言也又可以盡怪之歟觀乎天文以察時變觀乎人文以化成天下象曰山下有火賁君子以明庶政无敢折獄眀庶政眀也无敢折獄止也初九賁其趾舍車而徒象曰舍車而徒義弗來也文剛者六二也初九九三見文者也自六二言之則初九其趾九三其須也初九之應在四六二之文初九之所不受也車者所以養趾為行文也初九為趾則六二之所以文初九者為車矣初九自潔以答六四之好故義不乗其車而徒行也六二賁其須象曰賁其須與上興也六二施隂於二陽之間初九有應而不受九三无應而内之无應而内之者正也是以仰賁其須須者附上而與之興也九三賁如濡如永貞吉象曰永貞之吉終莫之陵也初九之正配四也而九三近之九三之正配二也而初九近之見近而不貞則失其正故九三不貞於二而貳於四則其配亦見陵於初九矣初九亦然何則无以相賁也自九三言之賁我者二也濡我者四也我可以兩獲焉然而以永貞於二為吉也六四賁如皤如白馬翰如匪寇婚媾象曰六四當位疑也匪寇婚媾終无尤也六四當可疑之位者以近三也六二以其賁賁初九而初九全其潔皤然也初九之所以全其潔者凡以為四也四可不以潔答之乎是以潔其車馬翼然而往從之以三為寇而莫之媾也此四者危疑之間交争之際也然卒免於侵陵之禍者以四之无不貞也六五賁於丘園束帛戔戔吝終吉象曰六五之吉有喜也丘園者僻陋无人之地也五无應于下而上九之所賁也故曰賁于丘園而上九亦无應者也夫兩窮而无歸則薄禮可以相縻而長乆也是以雖吝而有終可不謂吉乎彼苟有以相喜則吝而吉可也戔戔小也上九白賁无咎象曰白賁无咎上得志也夫柔之文剛也往附於剛以賁從人者也剛之文柔也柔来附之以人從賁者也以賁從人則賁存乎人以人從賁則賁存乎已此上九之所以得志也陽行其志而隂聴命惟其所賁故曰白賁受賁莫若白坤下艮上剝不利有攸往彖曰剝剝也柔變剛也不利有攸往小人長也順而止之觀象也見可而後動君子尚消息盈虚天行也象曰山附於地剝上以厚下安宅身安而民與之則剝者自衰不與之校也初六剝牀以足蔑貞凶象曰剝牀以足以滅下也六二剝牀以辨蔑貞凶象曰剝牀以辨未有與也陽在上故君子以上三爻為已載已者牀也故下為牀隂之長猶水之溢也故曰蔑辨足之上也牀與足之間故曰辨君子之於小人不疾其有邱山之惡而幸其有毫髪之善剝牀以足且及其辨矣猶未直以為凶也曰蔑貞而後凶小人之於正也絶蔑无餘而後凶可必也若猶有餘則君子自其餘而懐之矣故曰剝牀以辨未有與也小人之為惡也有人與之然後自信以果方其未有與也則其愧而未果之際也六三剝之无咎象曰剝之无咎失上下也王弼曰羣隂剝陽已獨協焉雖處於剝可以无咎上下各有二隂應陽則失上下也六四剝牀以膚凶象曰剝牀以膚切近災也剝牀以膚始及已矣雖欲懐之而不可得矣故直曰凶六五貫魚以宫人寵无不利象曰以宫人寵終无尤也觀之世幾於剝矣而言不及小人者其主陽也六五剝之主凡剝者皆其類也聖人不能使之无寵於其類故擇其害之淺者許之四以下貫魚之象也自上及下施寵均也夫寵均則勢分勢分則害淺矣以宫人之寵寵之不及以政也不及以政豈惟自安亦以安之故無不利聖人之教人也容其或有而去其太甚庶㡬從之如責之以必无則彼有不從而已矣上九碩果不食君子得輿小人剝廬象曰君子得輿民所載也小人剝廬終不可用也果未有不見食者也碩而不見食必不可食者也智者去之愚者眷焉上九之失民乆矣五隂之勢足以轢而取之然且獨存於上者彼特存我以為名爾與之合則存不與之合則亡君子以為是不可食之果也而亟去之彼得志於上必食其下故君子去其上而出其下可以得民載於下謂之輿庇於上謂之廬廬者既剝之餘也豈可復用哉震下坤上復亨出入无疾朋來无咎反復其道七曰來復利有攸往彖曰復亨剛反動而以順行是以出入无疾自坤為復謂之入自復為乾謂之出疾病也朋來无咎反復其道七日來復天行也坤與初九為七利有攸往剛長也復其見天地之心乎見其意之所向謂之心見其誠然謂之情凡物之將亡而復者非天地之所予者不能也故陽之消也五存而不足及其長也甫一而有餘此豈人力也哉傳曰天之所壊不可支也其所支亦不可壊也違天不祥必有大咎象曰雷在地中復先王以至日閉闗商旅不行后不省方復者變易之際也聖人居變易之際静以待其定不可以有為也故以至日閉闗眀之下至於商旅不行上至於后不省方初九不逺復无祗悔元吉象曰不逺之復以脩身也去其所居而復歸亡其所有而復得謂之復必嘗去也而後有歸必嘗亡也而後有得无去則无歸无亡則无得是故聖人无復初九未嘗見其有過也然而始有復矣孔子曰顔氏之子其殆庶㡬乎有不善未嘗不知知之未嘗復行也六二休復吉象曰休復之吉以下仁也休初九也以隂居隂不争之至也退而休之使復者得信謂之休復六三頻復厲无咎象曰頻復之厲義无咎也以隂居陽力不得抗而中不願故頻於初九之復也外順而内不平者危則无咎頻蹙也六四中行獨復象曰中行獨復以從道也獨與初應六五敦復无悔象曰敦復无悔中以自考也憂患未至而慮之則无悔六五隂之方盛也而内自度其終不足以抗初九故因六四之獨復而附益之以自託焉上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征象曰迷復之凶反君道也乗極盛之末而用之不已不知初九之已復也謂之迷復災眚者在天之罰也初九之復天也衆莫不予而已獨迷焉用之於敵則災其國用之於國則災其身極盛必衰驟勝故敗在其終也國敗君凶至於十年而不復者明其用民之過而師競之甚也震下乾上无妄元亨利貞其匪正有眚不利有攸往彖曰无妄剛自外來而為主於内謂初九動而健剛中而應謂九五大亨以正天之命也无妄者天下相從於正也正者我也天下從之者天也聖人能必正不能使天下必從故以无妄為天命也其匪正有眚不利有攸往无妄之往何之矣天命不祐行矣哉无故而為惡者天之所甚疾也世之妄也則其不正者容有不得已焉无妄之世正則安不正則危棄安即危非人情故不正者必有天災象曰天下雷行物與无妄妄者物所不與也先王以茂對時育萬物茂勉也對濟也傳曰寛以濟猛猛以濟寛天下既已无妄矣則先王勉濟斯時容養萬物而已初九无妄往吉象曰无妄之往得志也所以為无妄者震也所以為震者初九也无妄之權在初九故往得志也六二不耕穫不葘畬則利有攸往象曰不耕穫未富也六三无妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也九四可貞无咎象曰可貞无咎固有之也九五无妄之疾勿藥有喜象曰无妄之藥不可試也善為天下者不求其必然求其必然乃至於盡喪无妄者驅人而内之正也君子之於正亦全其大而已矣全其大有道不必乎其小而其大斯全矣古之為過正之行者皆内不足而外慕者也夫内足者恃内而略外不足者反之隂之居隂安其分者也六二是也而其居陽也不安其分而外慕者也六三是也陽之居陽致其用者也九五是也而其居隂也内足而藏其用者也九四是也六二妄其分是故不敢為過正之行曰不耕穫不葘畬則利有攸往夫必其所耕而後穫必其所葘而後畬則是揀髪而櫛數米而炊擇地而蹈之充其操者蚓而後可將有所往動則躓矣故曰於義可穫不必其所耕也於道可畬不必其所葘也不害其為正而可以通天下之情故利有攸往所惡於不耕而穫者惡富之為害也如取之不失其正雖欲富可得乎故曰不耕穫未富也六三不安其分而外慕其名自知其不足而求詳於无妄故曰无妄之災或繫之牛行人之得邑人之災或者繫其牛於此而為行道者之得之也行者固不可知矣而欲責得於邑人宜其有无辜而遇禍者此无妄之所以為災也失其牛於此而欲必求之於此此其意未始不以為无妄也然卒至于大妄則求詳之過也九五以五用九極其用矣用極則憂廢故戒之曰无妄之疾勿藥有喜无妄之世而有疾焉是大正之世而未免乎小不正也天下之有小不正是養其大正也烏可藥哉以无妄為藥是以至正而毒天下天下其誰安之故曰无妄之藥不可試也九四内足而藏其用詘其至剛而用之以柔故曰可貞无咎可以其貞正物而无咎者惟四也其象曰固有之固有之者生而性之非外掠而取之也上九无妄行有眚无攸利象曰无妄之行窮之災也无妄之世有大妄者六三也而上九應之六三外慕於正而竊取其名三以苟免可也至於上九窮且敗矣乾下艮上大畜利貞不家食吉利渉大川彖曰大畜剛健篤實輝光日新其徳剛健者乾也篤實者艮也輝光者二物之相磨而神眀見也乾不得艮則素健而已矣艮不得乾則徒止而已矣以止厲健以健作止而徳之變不可勝窮也剛上而尚賢能止健大正也大者正也謂上九也故謂之賢賢者見畜於上九所以為大畜也不家食吉養賢也利涉大川應乎天也乾之健艮之止其徳天也猶金之能割火之能熱也物之相服者必以其天魚不畏網而畏鵜鶘畏其天也故乾在艮下未有不止而為之用也物之在乾上者常有忌乾之心而乾常有不服之意需之上六小畜之上九是也忌者生於不足以服人爾不足以服人而又忌之則人之不服也滋甚今夫艮自知有以畜乾故不忌其健而許其進乾知艮之有以畜我而不忌故受其畜而為之用不家食者以艮為主也利渉大川者用乾之功也象曰天在山中大畜君子以多識前言往行以畜其徳孔子論乾九二之徳曰君子學以聚之問以辨之是以知乾之健患在於不學漢高帝是也故大畜之君子將以用乾亦先厚其學初九有厲利已象曰有厲利已不犯災也小畜之畜乾也順而畜之故始順而終反目大畜之畜乾也厲而畜之故始厲而終亨君子之愛人以徳小人之愛人以姑息見徳而慍見姑息而喜則過矣初九欲進之意无已也至於六三遇厲而止六四之厲我所謂徳也使我知戒而終身不犯於災者六四也九二輿説輹象曰輿説輹中无尤也小畜之説輹不得已也故夫妻反目大畜之説輹其心願之故中无尤也九三良馬逐利艱貞曰閑輿衛利有攸往象曰利有攸往上合志也三乾竝進故曰良馬逐馬不憂其不良而憂其輕車易道以至泛軼也故利艱貞九三乾之殿也故相與飭戒閑習其車徒則利有攸往上上九也上利在不忌三利在必戒六四童牛之牿元吉象曰六四元吉有喜也六五豶豕之牙吉象曰六五之吉有慶也童牛初九也牿角械也童牛无所用牿然且不敢廢者自其童而牿之迨其壯雖不牿可也此愛其牛之至也豶豕羠豕也九二之謂也有牙而不鷙者羠豕也不鷙則可畜矣大畜之畜乾也始厲而終亨初九陽之㣲者也而遂牿之故至於九二雖有牙而可畜也其始牿之其漸可畜其終雖進之天衢可也童而牿之愛以徳也故有喜不惡其牙而畜之將求其用也故有慶凡物有以相徳曰喜施徳獲報曰慶孔子曰積善之家必有餘慶上九何天之衢亨象曰何天之衢道大行也天衢者上之所履而不與下共者也徳有以守之雖以予人而莫敢受苟无其徳雖吾不予夫將有取之者上九之徳足以自固是以无忌於乾而大進之其曰何天之衢者何天衢之有而不汝進也夫惟以天衢進之而乾大服矣震下艮上頥貞吉觀頥自求口實彖曰頥貞吉養正則吉也觀頥觀其所養也謂上九自求口食觀其自養也謂初九天地養萬物聖人養賢以及萬民頥之時大矣哉象曰山下有雷頥君子以慎言語節飲食上止下動有頥之象故君子治所以養口者人之所共知而難能者慎言語節飲食也言語一出而不可復入飲食一入而不可復出者也初九舍爾靈龜觀我朶頥凶象曰觀我朶頥亦不足貴也爾初九也我六四也龜者不食而壽无待於物者也養人者陽也養於人者隂也君子在上足以養人在下足以自養初九以一陽而伏於四隂之下其徳足以自養而无待於物者如龜也不能守之而觀於四見其可欲朶頥而慕之為隂之所致也故凶所貴於陽者貴其養人也如養於人則亦不足貴矣六二顛頥拂經于丘頥征凶象曰六二征凶行失𩔖也從下為顛過擊曰拂經厯也丘空也豫之六五失民而九四得之則九四為由豫頥之六五失民而上九得之則上九為由頥六二有養人之位而无養人之徳則丘頥也夫由丘二者皆非相安者也丘以其位由以其徳兩立而不相忌者未之有也六二六三之求養於上九也皆厯五而後至焉夫有求於人者必致怨於其所忌以求説此人之情也故六二六三之過五也皆擊五而後過非有怨於五也以悦其所求養者也由頥者利之所在也丘頥者位之所在也見利而蔑其位君子以為不義也故曰顛頥拂經于丘頥征凶六二可以下從初九而求養也然且不從而過擊五以求養於上九无故而陵其主故征凶征凶者眀顛頥之吉也二隂也五亦隂也故稱𩔖也六三拂頥貞凶十年勿用无攸利象曰十年勿用道大悖也拂頥者拂經于丘頥也六二已詳言之矣因前之辭故略其實一也拂頥之為不義二與三均也然二有初可從而三不得不從上也故曰貞凶雖貞於其配而於義為凶由頥之興丘頥之廢可坐而待也其勢不過十年盍待其定而從之故戒之曰十年勿用用於十年之内則大悖之道也夫擊其主而悦其配雖其配亦不義也故无攸利六四顛頥吉虎視眈眈其欲逐逐无咎象曰顛頥之吉上施光也四於初為上自初而言之則初之見養於四為凶自四言之則四之得養初九為吉初九之剛其始若虎之眈眈而不可馴也六四以其所欲而致之逐逐焉而來六四之所施可謂光矣六五拂經居貞吉不可涉大川象曰居貞之吉順以從上也六五既失其民為六二六三之所拂而過也慍而起争之則亡矣故以順而從上居貞為吉失民者不可以犯難故曰不可渉大川上九由頥厲吉利涉大川象曰由頥厲吉大有慶也莫不由之以得養者故曰由頥有其徳而无其位故厲而後吉无位而得衆者必以身犯難然後衆與之也巽下兌上大過棟橈利有攸往亨彖曰大過大者過也棟橈本末弱也剛過而中巽而説行利有攸往乃亨二五者用事之地也陽自内出據用事之地而擯隂於外謂之大過大者過也隂自外入據用事之地而囚陽於内謂之小過小者過也過之為言偏盛而不均之謂也故大過者君驕而无臣之世也易之所貴者貴乎陽之能御隂不貴乎陽之陵隂而蔑之也人徒知夫隂之過乎陽之為禍也豈知夫陽之過乎隂之不為福也哉立隂以養陽也立臣以衛君也隂衰則陽失其養臣弱則君棄其衛故曰大過大者過也棟橈本末弱也四陽者棟也初上者棟之所寄也弱而見擯則不任寄矣此棟之所以橈也棟橈吾將壓焉故大過之世利有事而忌安居君侈已甚而國无憂患則上益張而下不堪其禍可待也故利有攸往所利於往者利其有事也有事則有患有患則急人患至而人急則君臣之勢可以少均故曰剛過而中巽而説行利有攸往乃亨大過之時大矣哉象曰澤滅木大過君子以獨立不懼遯世无悶初六宜不懼上六宜遯初六藉用白茅无咎象曰藉用白茅柔在下也白茅初六也所藉者九二也茅之為物賤而不足收也然吾有所甚愛之器必以藉之非愛茅也愛吾器也初之於二彊弱之勢固相絶矣其存亡不足以為損益然二所以得安養於上者以有初之藉也棄茅而不收則器措諸地棄初而不録則二親其勞矣故孔子曰茅之為物薄而用可重也九二枯楊生稊老夫得其女妻无不利象曰老夫女妻過以相與也卦合而言之則大過者君驕之世也爻别而觀之則九五當驕而九二以陽居隂不驕者也盛極將枯而九二獨能下收初六以自助則生稊者也老夫九二也女妻初六也凡人之情夫老而妻少則妻倨而夫恭妻倨而夫恭則臣難進而君下之之謂也故无不利大過之世患在亢而无與故曰老夫女妻過以相與也九三棟橈凶象曰棟橈之凶不可以有輔也九四棟隆吉有他吝象曰棟隆之吉不橈乎下也卦合而言之則本末弱棟橈者也爻别而觀之則上六當棟橈初六弱而能立以遇九二不橈者也初上非棟也棟之所寄而已所寄在彼而隆橈見於此初六不橈於下則九四棟隆上六不足以相輔則九三之棟橈以其應也九四專於其應則吉有他則吝矣棟之隆也非初之福而四享其利及其橈也上亦不與而三受其名故大過之世智者以為陽宜下隂而愚者以為隂宜下陽也九五枯楊生華老婦得其士夫无咎无譽象曰枯楊生華何可乆也老婦士夫亦可醜也盛極將枯而又生華以自耗竭而不能乆矣稊者顛而復蘖反其始也華者盈而畢發速其終也九五以陽居陽汰侈已甚而上六乗之力不能正祗以速禍故曰老婦得其士夫无咎无譽老婦上六也士夫九五也夫壯而妻老君厭其臣之象也故教之以无咎无譽以求免於斯世咎所以致罪譽所以致疑也上六過涉滅頂凶无咎象曰過涉之凶不可咎也過涉至於滅頂將有所救也勢不可救而徒犯其害故凶然其義則不可咎也坎下坎上習坎坎險也水之所行而非水也惟水為能習行於險其不直曰坎而曰習坎取於水也有孚維心亨行有尚彖曰習坎重險也水流而不盈險故流流故不盈行險而不失其信萬物皆有常形惟水不然因物以為形而已世以有常形者為信而以无常形者為不信然而方者可斵以為圜曲者可矯以為直常形之不可恃以為信也如此今夫水雖無常形而因物以為形者可以前定也是故工取平焉君子取法焉惟无常形是以迕物而无傷惟莫之傷也故行險而不失其信由此觀之天下之信未有若水者也維心亨乃以剛中也所遇有難易然而未嘗不志於行者是水之心也物之窒我者有盡而是心无已則終必勝之故水之所以至柔而能勝物者維不以力爭而以心通也不以力爭故柔外以心通故剛中行有尚往有功也尚配也方圜曲直所遇必有以配之故无所往而不有功也天險不可升也地險山川丘陵也王公設險以守其國朝廷之儀上下之分雖有彊㬥而莫敢犯此王公之險也險之時用大矣哉象曰水洊至習坎君子以常徳行習敎事事之待教而後能者教事也君子平居常其徳行故遇險而不變習為教事故遇險而能應初六習坎入于坎窞凶象曰習坎入坎失道凶也六爻皆以險為心者也夫苟以險為心則大者不能容小者不能忠无適而非寇也惟相與同患其勢有以相待然後相得而不叛是故居坎之世其人可與同處患而不可與同處安九二九五二險之不相下者也而六三六四其蔽也夫有事於敵則敵者先受其害故九二之於六三九五之於六四皆相與同患者也是以相得而不叛至於初上處内外之極最逺於敵而不被其禍以為足以自用而有餘是以各挾其險以待其上初不附二上不附五故皆有失道之凶焉君子之習險將以出險也習險而入險為寇而已九二坎有險求小得象曰求小得未出中也險九五也小六三也九二以險臨五五亦以險待之欲以求五焉可得哉所可得者六三而已二所以能得三者非謂其徳足以懐之徒以二者皆未出於險中相待而後全故也六三來之坎坎險且枕入于坎窞勿用象曰來之坎坎終无功也之往也枕所以休息也來者坎也往者亦坎也均之二坎来則得主往則得敵遇險於外而休息於内也故曰險且枕六三知其不足以自用用必无功故退入于坎以附九二相與為固而已六四樽酒簋貳用缶納約自牖終无咎象曰樽酒簋貳剛柔際也樽酒簋貳用缶薄禮也納約自牖簡陋之至也夫同利者不交而歡同患者不約而信四非五无與為主五非四无與為蔽餽之以薄禮行之以簡陋而終不相咎者四與五之際也九五坎不盈祗既平无咎象曰坎不盈中未大也祗猶言適足也九五可謂大矣有敵而不敢自大故不盈也不盈所以納四也盈者人去之不盈者人輸之故不盈適所以使之既平也上六係用徽纆寘于叢棘三嵗不得凶象曰上六失道凶三歲也夫有敵而深自屈以致人者敵平則汰矣故九五非有徳之主也无徳以致人則其所致者皆有求於我者也上六維无求於五故徽纆以係之叢棘以固之上六之所恃者險爾險窮則亡故三歲不得凶也離下離上離火之為物不能自見必麗於物而後有形故離之象取於火也利貞亨畜牝牛吉彖曰離麗也日月麗乎天百穀草木麗乎土言萬物各以其𩔖麗也重眀以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也六麗二五是柔麗中正也物之相麗者不正則易合而難乆正則難合而終必固故曰利貞亨欲知其所畜視其主有是主然後可以畜是人也有其人而无其主雖畜之不為用故以柔為主則所畜者惟牝牛為吉象曰眀兩作離大人以繼眀照于四方火得其所附則一炬可以傳千萬明得其所寄則一耳目可以盡天下天下之續吾明者衆矣初九履錯然敬之无咎象曰履錯之敬以辟咎也六爻莫不以相附離為事而火之性炎上者也故下常附上初九附六二者也以柔附剛者寧倨而无諂以剛附柔者寧敬而无凟凟其所附則自棄者也故初履聲錯然敬之以辟相凟之咎六二黄離元吉象曰黄離元吉得中道也黄中也隂不動而陽來附之故元吉九三日昃之離不鼓缶而歌則大耋之嗟凶象曰日昃之離何可乆也火得其所附則傳不得其所附則窮初九之於六二六五之於上九皆得其所附者以隂陽之相資也惟九三之於九四不得其傳而遇其窮如日之昃如人之耋也君子之至此命也故鼓缶而歌安以俟之不然咨嗟而不寧則凶之道也九四突如其來如焚如死如棄如象曰突如其來如无所容也九三无所附九四人莫附之皆窮者也然九三之窮則咨嗟而已九四見五之可欲而不度其義之不可得故其來突如其炎焚如六五拒而不納故窮而无所容夫四之欲得五是與上九爭也而上九離之王公也是以死而衆棄之也六五出涕沱若戚嗟若吉象曰六五之吉離王公也王公上九也六五上附上九而九四欲得之故出涕戚嗟以眀不貳也六五不貳於四則上九離之矣故吉上九王用出征有嘉折首獲匪其醜无咎象曰王用出征以正邦也凡在下者未免離於人也惟上九離人而不離於人故其位為王其徳可以正人各安其所離矣而有亂羣者焉則王之所征也嘉者六五也非其𩔖者九四也六爻皆无應故近而附之者得稱嘉也其嘉之所以能克其非類者以上九與之也東坡易傳卷三
