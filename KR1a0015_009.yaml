body:
  text: 東坡易傳卷九宋蘇軾撰說卦傳昔者聖人之作易也幽贊於神明而生蓍介紹以傳命謂之贊天地鬼神不能與人接也故以蓍龜為之介紹參天兩地而倚數天數五地數五其曰三兩何也自一至五天數三地數二眀數之止於五也自五以往非數也皆相因而成者也故曰倚數以是知大衍之數五十孔子論之已悉豈容有異說焉觀變於隂陽而立卦發揮於剛柔而生爻和順於道德而理於義窮理盡性以至於命昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也何為順何為逆曰道德之變如江河之日趨於下也沿其末流至於生蓍倚數立卦生爻而萬物之情備矣聖人以為立於其末則不能識其全而盡其變是以泝而上之反從其初道者其所行也德者其行而有成者也理者道德之所以然而義者所以然之說也君子欲行道德而不知其所以然之說則役於其名而為之爾夫苟役於其名而不安其實則大小相害前後相陵而道德不和順矣譬如以機發木偶手舉而足發口動而鼻隨也此豈若人之自用其身動者自動止者自止曷嘗調之而後和理之而後順哉是以君子貴性與命也欲至於性命必自其所以然者泝而上之夫所以食者為饑也所以飲者為渴也豈自外入哉人之於飲食不待學而能者其所以然者明也盍徐而察之饑渴之所從出豈不有未嘗饑渴者存乎於是性可得而見也有性者有見者孰能一是二者則至於命矣此之謂逆聖人既得性命之理則順而下之以極其變率一物而兩之以開生生之門所謂因二以濟民行者也故兼三才設六位以行於八卦之中天地山澤雷風水火紛然相錯盡八物之變而邪正吉凶悔吝憂虞進退得失之情不可勝窮也此之謂順斷竹為籥竅而吹之唱和往來之變清濁緩急之節師曠不能盡也反而求之有五音十二律而已五音十二律之初有哮然者而已哮然者之初有寂然者而已古之作樂者其必立於寂然者之中乎是以自性命而言之則以順為往以逆為來故曰數往者順知來者逆六十四卦三百八十四爻皆據其末而反求其本者也故易逆數也雷以動之風以散之雨以潤之日以烜之艮以止之兌以說之乾以君之坤以藏之於是方以四時言也八卦之用於四時也震巽坎離各以其物故曰雷曰風曰雨曰日而不言其德也天地山澤各以其德故曰乾曰坤曰艮曰兌而不言其物也帝出乎震齊乎巽相見乎離致役乎坤說言乎兌戰乎乾勞乎坎成言乎艮古有是說也萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者眀也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兌正秋也萬物之所說也故曰說言乎兑戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮神也者妙萬物而為言者也此孔子從而釋之也曰是萬物之盛衰於四時之間者也皆其自然莫或使之而謂之帝者萬物之中有妙於物者焉此其神也而謂之帝云爾震木也兌金也離火也坎水也故各位於其方巽亦木也故從震而位於東南乾亦金也故從兑而位於西北坤與艮皆土也坤位於西南季夏之位也艮位於東北蓋從坎也艮則曷為從坎季夏土十一月水其律皆黃鍾傳曰夫水土衍而民用也古之達者其有以知此矣坤不言其方何也所謂致養者取於地非獨取於季夏也二言字衍文也當云說乎兌成乎艮古者兌說通無從言者或從而加之故遂以為說言而離誠以為二也記曰誠者物之終始不誠無物內躁而外靜內柔而外剛蓋有之矣至於死生終始之際其情必得艮終始萬物者也亦不容僞也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火說萬物者莫說乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也此各以其物言也而不及乾坤者乾坤不可物六子之功顯而乾坤之德存乎其中艮亦不言其物何也艮之物山山之用坤兼之矣故艮亦不得以物言也乾健也坤順也震動也巽入也坎陷也離麗也艮止也兌說也循萬物之理無往而不自得謂之順執柔而不爭無往而不見納謂之入乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兌為羊乾為首坤為腹震為足巽為股坎為耳離為目艮為手兌為口乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兌三索而得女故謂之少女乾為天為圜為君為父為玉為金為寒為冰為大赤為良馬為老馬為瘠馬為駁馬為木果坤為地為母為布為釡為吝嗇為均為子母牛為大輿為文為衆為柄其於地也為黑震為雷為龍為𤣥黃為敷為大塗為長子為决躁為蒼筤竹為萑葦其於馬也為善鳴為馵足為作足為的顙其於稼也為反生其究為健為蕃鮮巽為木為風為長女為繩直為工為白為長為高為進退為不果為臭其於人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦坎為水為溝瀆為隱伏為矯輮為弓輪其於人也為加憂為心病為耳痛為血卦為赤其於馬也為美脊為亟心為下首為薄蹄為曵其於輿也為多眚為通為月為盜其於木也為堅多心離為火為日為電為中女為甲胄為戈兵其於人也為大腹為乾卦為鱉為蟹為螺為蚌為龜其於木也為科上槁艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔喙之屬其於木也為堅多節兌為澤為少女為巫為口舌為毁折為附决其於地也為剛鹵為妾為羊凡八卦之所為至於俚俗雜亂無所不有其說固不可盡知蓋用於占筮者而已意不止於此將使人以類求之歟不然則有亡逸不全者矣易有聖人之道四焉以卜筮者尚其占是以得見於此矣序卦傳有天地然後萬物生焉盈天地之間者唯萬物故受之以屯屯者盈也屯者物之始生也物生必蒙故受之以蒙蒙者蒙也義有不盡於名者履為禮蠱為事臨為大解為緩之類是也故曰蒙者蒙也屯者屯也比者比也剝者剝也皆義盡於名者也物之稚也物稚不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜大畜小畜皆取於畜而已大過小過皆取於過而已不復論其大小也故序卦之論易或直取其名而不本其卦者多矣若賦詩斷章然不可以一理求也物畜然後有禮故受之以履履而泰然後安故受之以泰泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫豫必有隨故受之以隨以喜隨人者必有事故受之以蠱以喜隨人者溺於燕安者也故至於蠱蠱則有事矣蠱者事也有事而後可大故受之以臨臨者大也物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也物不可以苟合而已故受之以賁賁者飾也君臣父子夫婦朋友之際所謂合也直情而行謂之苟禮以飾情謂之賁苟則易合易則相瀆相瀆則易以離賁則難合難合則相敬相敬則能久致飾然後亨則盡矣故受之以剝飾極則文勝而實衰故剝剝者剝也物不可以終盡剝窮上反下故受之以復復則不妄矣故受之以無妄有無妄然後可畜有無妄者不能必之以皆無妄之辭也故受之以大畜物畜然後可養故受之以頥頥者養也不養則不可動故受之以大過養而不用其極必動動而不已其極必過物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不久也故受之以恆夫婦者咸與恆也則男女者坎與離也有男女然後有夫婦明咸恆之所以次坎離也六子皆男女而獨取於坎離何也艮兑為少非少無以相感震巽為長非長無以能久是故少者為咸長者為恆而以其中者為男女之正恆者久也物不可以久居其所故受之以遁遁者退也物不可以終遁故受之以大壯物不可以終壯故受之以晉晉以柔進也晉者進也進必有所傷故受之以眀夷夷者傷也傷於外者必反其家故受之以家人人窮則反本疾痛則呼父母故傷則反於家家道窮必乖故受之以睽睽者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也緩必有所失故受之以損損而不已必益故受之以益益而不已必決故受之以夬夬者決也決必有所遇故受之以姤施決於壅己者故有所遇也姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升聚而無主則亂故必有相推而上之者升而不已必困故受之以困困乎上者必反下故受之以井井道不可不草故受之以革不革則穢革物者莫若鼎故受之以鼎主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹漸女歸吉也得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而無所容故受之以巽巽者入也入而後說之故受之以兌兌者說也說而後散之故受之以渙渙者離也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過君子之信也物信之而已不有故時行時止未嘗必也有其信而必行之則過矣有過物者必濟故受之以既濟權以濟物有時而過也物不可窮也故受之以未濟終焉未濟所以為無窮也以雜卦觀之六十四卦皆兩不相從非覆則變也變者八乾坤也頥大過也坎離也中孚小過也覆變具者八泰否也隨蠱也漸歸妹也既濟未濟也其餘四十八皆覆也卦本以覆相從不得已而從變也何為其不得已也變者八皆不可覆者也雜卦皆相反序卦皆相因此理也而有二變者八覆變具者八覆者四十八此數也而有三然則六十四卦之叙果何義也曰理二曰數三五者無不可此其所以為易也步歷而厯協吹律而律應考之人事而人事契循乎天理而行無往而不相值也且非獨此五者而已將世之所有莫不咸在是故從孔子之言則既有二說矣曰物不可終過故受之以坎坎者陷也陷必有所麗故受之以離又曰有男女然後有夫婦方其為男女則所謂陷與麗者不取也自是以往吾豈敢一之哉雜卦傳乾剛坤柔比樂師憂有親則樂動衆則憂臨觀之義或與或求以我臨物故曰與物來觀我故曰求屯見而不失其居君子以經綸故曰見盤桓利居貞故曰不失其居蒙雜而著蒙以養正蒙正未分故曰雜童蒙求我求人以自眀故曰著雜則不見著則不居震起也艮止也損益盛衰之始也大畜時也無妄災也以艮畜乾而可者時也以乾行震而不可者災也六三行人得牛邑人之災又曰無妄之藥不可試也萃聚而升不來也易以上為往下為來澤上於地萃聚於下也地中生木升升於上也謙輕而豫怠也輕者鋭於有為怠者安於無事折節以下人必鋭於有為者也知樂而不憂必安於無事者也噬嗑食也賁無色也噬嗑自二至五皆以相噬為事躁於食者也賁自初至四皆賁而不受汙安於無色者也兌見而巽伏也柔在外則見在內則伏隨無故也蠱則飾也隨以隨時為安故其象曰君子以嚮晦入宴息蠱以婾安為危故其象曰君子以振民育德故事也飾修也剝爛也復反也爛者非一日之故而不可反者也晉晝也眀夷誅也晝日三接故曰晝得其大首故曰誅井通而困相遇也井居其所而人即之困欲行而遇剛掩也咸速也恆久也渙離也節止也解緩也蹇難也暌外也家人內也否泰反其類也大壯則止遁則退也大壯小人止而遁則君子退大有衆也同人親也親則於衆有所擇也革去故也鼎取新也小過過也中孚信也隂在外據用事之地故為小過隂在內不據用事之地故為中孚豐多故也親寡旅也豐以盛大而多憂旅以寡弱而相親離上而坎下也小畜寡也履不處也小畜之卦不雨其爻雨履之卦不嘻人其爻嘻人皆以一隂而遇五陽故曰寡小畜六四居隂而履六三居陽有為君之志故曰不處需不進也訟不親也天水相迫故不進相違故不親大過顛也姤遇也柔遇剛也漸女歸待男行也頥養正也既濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君子道長小人道憂也雜卦自乾坤以至需訟皆以兩兩相從而眀相反之義自大過以下則非相從之次蓋傳者失之也凡八卦今改而正之曰頥養正也大過顛也姤遇也柔遇剛也夬決也剛決柔也君子道長小人道憂也漸女歸待男行也歸妹女之終也既濟定也未濟男之窮也其說日初上者本末之地也以陽居之則正以隂居之則顛故曰頥養正也大過顛也艮下巽上為漸男下女非其正也故曰漸女歸待男行也兌下震上為歸妹男女之正也當以是終故曰歸妹女之終也離下坎上為既濟男女之正也故曰既濟定也坎下離上為未濟男失其位窮之道也故曰未濟男之窮也如此而相從之次相反之義煥然若合符節矣東坡易傳卷九
