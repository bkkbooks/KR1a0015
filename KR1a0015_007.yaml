body:
  text: 東坡易傳卷七宋蘇軾撰繫辭傳上天尊地卑乾坤定矣卑髙以陳貴賤位矣動靜有常剛柔斷矣苟非其常則剛而靜柔而動者有之矣方以類聚物以羣分吉凶生矣方本異也而以類故聚此同之生於異也物羣則其勢不得不分此異之生於同也有成而後有毁有廢而後有興是以知吉凶之生於相形也在天成象在地成形變化見矣天地一物也隂陽一氣也或為象或為形所在之不同故在云者明其一也象者形之精華發於上者也形者象之體質留於下者也人見其上下直以為兩矣豈知其未嘗不一邪繇是觀之世之所謂變化者未嘗不出於一而兩於所在也自兩以往有不可勝計者矣故在天成象在地成形變化之始也是故剛柔相摩八卦相蕩鼓之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女天地之間或貴或賤未有位之者也卑髙陳而貴賤自位矣或剛或柔未有斷之者也動靜常而剛柔自斷矣或吉或凶未有生之者也類聚羣分而吉凶自生矣或變或化未有見之者也形象成而變化自見矣是故剛柔相摩八卦相蕩雷霆風雨日月寒暑更用迭作於其間雜然施之而未嘗有擇也忽然成之而未嘗有意也及其用息而功顯體分而名立則得乾道者自成男得坤道者自成女夫男者豈乾以其剛强之德為之女者豈坤以其柔順之道造之哉我有是道物各得之如是而已矣聖人者亦然有惻隱之心而未嘗以為仁也有分别之心而未嘗以為義也所遇而為之是心著於物也人則從後而觀之其惻隱之心成仁分别之心成義乾知大始坤作成物乾以易知坤以簡能上而為陽其漸必虛下而為隂其漸必實至虛極於無至實極於有無為大始有為成物夫大始豈復有作哉故乾特知之而已作者坤也乾無心於知之故易坤無心於作之故簡易故無所不知簡故無所不能易則易知簡則易從易簡者一之謂也凡有心者雖欲一不可得也不一則無信矣夫無信者豈不難知難從哉乾坤惟無心故一一故有信信故物知之也易而從之也不難易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業知之與作易之與簡易知之與易從有親之與有功可久之與可大德之與業皆有隱顯之别矣此乾坤之辨也不可以不知也古之言賢人者賢於人之人也猶曰君子云爾夫賢於人者豈有極哉聖人與焉而世乃曰聖人無德業德業賢人也夫德業之名聖人之所不能免也其所以異於人者特以其無心爾見其謂之聖人則隆之見其謂之賢人則降之此近世之俗學古無是論也易簡而天下之理得矣天下之理得而成位乎其中矣夫無心而一一而信則物莫不得盡其天理以生以死故生者不德死者不怨無怨無德則聖人者豈不備位於其中哉吾一有心於其間則物有僥幸夭枉不盡其理者矣僥幸者德之夭枉者怨之德怨交至則吾任重矣雖欲備位可得乎聖人設卦觀象繫辭焉而明吉凶繇此觀之繫辭則彖象是也以上下繫為繫辭失之矣雖然世俗之所安也而無害於易故因而不改也剛柔相推而生變化得之則吉失之則凶此理之常者以為未足以盡吉凶之變也故又曰剛柔相推而生變化變化一生則吉凶之至亦多故矣是以有宜若吉而凶宜若凶而吉者是故吉凶者失得之象也悔吝者憂虞之象也失得未決則為憂虞及其已決則為吉凶變化者進退之象也剛柔者晝夜之象也夫剛柔相推而變化生變化生而吉凶之理無定不知變化而一之以為無定而兩之此二者皆過也天下之理未嘗不一而一不可執知其未嘗不一而莫之執則幾矣是以聖人既明吉凶悔吝之象又明剛柔變化本出於一而相摩相蕩至於無窮之理曰變化者進退之象也剛柔者晝夜之象也象者以是觀之之謂也夫出於一而至於無窮人之觀之以為有無窮之異也聖人觀之則以為進退晝夜之間耳見其今之進也而以為非向之退者可乎見其今之眀也而以為非向之晦者可乎聖人以進退觀變化以晝夜觀剛柔二觀立無往而不一也六爻之動三極之道也未極則為三既極則動動則為六三六無異道也是故君子所居而安者易之序也所樂而玩者爻之辭也是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利至於占則君子之慮周矣故祐且吉無不利者也彖者言乎象者也爻者言乎變者也吉凶者言乎其失得也悔吝者言乎其小疵也無咎者善補過也是故列貴賤者存乎位齊小大者存乎卦隂陽各有所統御謂之齊夫卦豈可以爻别而觀之彼小大有所齊矣得其所齊則六爻之義未有不貫者吾論六十四卦皆先求其所齊之端得其端則其餘脈分理解無不順者蓋未嘗鑿而通也辨吉凶者存乎辭憂悔吝者存乎介介小疵也震無咎者存乎悔是故卦有小大辭有險易辭也者各指其所之辭爻辭也卦有成體小大不可易而爻無常辭隨其所適之險易故曰彖者言乎象爻者言乎變夫爻亦未嘗無小大而獨以險易言者眀不在乎爻而在乎所適也同是人也而賢於此愚於彼所適之不同也如此易與天地凖故能彌綸天地之道凖符合也彌周浹也綸經緯也所以與天地凖者以能知幽眀之故死生之說鬼神之情狀也仰以觀於天文俯以察於地理是故知幽眀之故此與形象變化一也原始反終故知死生之說人所以不知生死之說者駭之耳故原始反終者使之了然而不駭也精氣為物遊魂為變是故知鬼神之情狀必其所見而後知則聖人之所知者寡矣是故聖人之學也以其所見者推至其所不見者天文地理物之終始精氣遊魂可見者也故聖人以是三者舉之物鬼也變神也鬼常與體魄俱故謂之物神無適而不可故謂之變精氣為魄魄為鬼志氣為魂魂為神故禮曰體魄則降志氣在上鄭子産曰其用物也𢎞矣其取精也多矣古之達者已知此矣一人而有二知無是道也然而有魄者有魂者何也衆人之志不出於飲食男女之間與凡養生之資其資厚者其氣强其資約者其氣微故氣勝志而為魄聖賢則不然以志一氣清眀在躬志氣如神雖祿之以天下窮至於匹夫無所損益也故志勝氣而為魂衆人之死為鬼而聖賢為神非有二知也志之所在者異也與天地相似故不違天地與人一理也而人常不能與天地相似者物有以蔽之也變化亂之禍福劫之所不可知者惑之變化莫大於幽眀禍福莫烈於死生所不可知者莫深於鬼神知此三者則其他莫能蔽之矣夫苟無蔽則人固與天地相似也知周乎萬物而道濟天下故不過知之未極道之不全是以有過故箕子以極為中眀夫極則不過也知周萬物可謂極矣道濟天下可謂全矣旁行而不流樂天知命故不憂避礙故旁行安土敦乎仁故能愛使物各安其所然後厚之以仁不然雖欲愛之不能也範圍天地之化而不過範圍規摹也曲成萬物而不遺通乎晝夜之道而知晝夜相反而能通之則不為變化之所亂可以知矣故神無方而易無體一隂一陽之謂道繼之者善也成之者性也隂陽果何物哉雖有婁曠之聰明未有得其倣佛者也隂陽交然後生物物生然後有象象立而隂陽隱矣凡可見者皆物也非隂陽也然謂隂陽為無有可乎雖至愚知其不然也物何自生哉是故指生物而謂之隂陽與不見隂陽之倣佛而謂之無有者皆惑也聖人知道之難言也故借隂陽以言之曰一隂一陽之謂道一隂一陽者隂陽未交而物未生之謂也喻道之似莫密於此者矣隂陽一交而生物其始為水水者有無之際也始離於無而入於有矣老子識之故其言曰上善若水又曰水幾於道聖人之德雖可以名言而不囿於一物若水之無常形此善之上者幾於道矣而非道也若夫水之未生隂陽之未交廓然無一物而不可謂之無有此真道之似也隂陽交而生物道與物接而生善物生而隂陽隱善立而道不見矣故曰繼之者善也成之者性也仁者見道而謂之仁智者見道而謂之智夫仁智聖人之所謂善也善者道之繼而指以為道則不可今不識其人而識其子因之以見其人則可以為其人則不可故曰繼之者善也學道而自其繼者始則道不全昔者孟子以善為性以為至矣讀易而後知其非也孟子之於性蓋見其繼者而已夫善性之效也孟子不及見性而見夫性之效因以所見者為性性之於善猶火之能熟物也吾未嘗見火而指天下之熟物以為火可乎夫熟物則火之效也敢問性與道之辨曰難言也可言其似道之似則聲也性之似則聞也有聲而後有聞邪有聞而後有聲邪是二者果一乎果二乎孔子曰人能𢎞道非道𢎞人又曰神而明之存乎其人性者其所以為人者也非是無以成道矣仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣夫屬目於無形者或見其意之所存故仁者以道為仁意存乎仁也智者以道為智意存乎智也賢者存意而妄見愚者日用而不知是以知君子之道成之以性者鮮矣顯諸仁藏諸用仁者其已然之迹也用者其所以然也鼓萬物而不與聖人同憂人見聖人之憂也豈知其中有不憂者未嘗與其所見者同哉盛德大業至矣哉富有之謂大業我未常有即物而有故富如使已有則其富有畛矣日新之謂盛德富有者未嘗有日新者未嘗新吾心一也新者物耳生生之謂易成象之謂乾效法之謂坤相因而有謂之生生夫苟不生則無得無喪無吉無凶方是之時易存乎其中而人莫見故謂之道而不謂之易有生有物物轉相生而吉凶得喪之變備矣方是之時道行乎其間而人不知故謂之易而不謂之道聖人之作易也不有所設則無以交於事物之域而盡得喪吉凶之變是以因天下之至剛而設以為乾因天下之至柔而設以為坤乾坤交而得喪吉凶之變紛然始起矣故曰成象之謂乾效法之謂坤效見也言易之道至乾而始有成象至坤而始有可見之法也極數知來之謂占通變之謂事隂陽不測之謂神生生之極則易成矣成則惟人之所用以數用之謂之占以道用之謂之事夫豈惟是將天下莫不用之用極而不倦者其惟神乎故終之曰隂陽不測之謂神使隂陽而可測則其用廢矣夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正逺邇猶深淺也得其深者雖為聖人有餘而其淺者不失為君子以言乎天地之間則備矣夫乾其靜也専其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉至剛之德果至柔之德深果則其靜也絶意於動而其動也不可復回深則其靜也斂之無餘而其動也發之必盡絶意於動專也不可復回直也斂之無餘翕也發之必盡闢也夫小生於雜隘生於疑故專直生大翕闢生廣廣大配天地變通配四時隂陽之義配日月易簡之善配至德眀乾坤非專以為天地也天地得其廣大四時得其變通日月得其隂陽之義至德得其易簡之善子曰易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地易之言德業有隱顯之别而德之微者莫若智業之著者莫若禮故又以其尤者明之天地設位而易行乎其中矣天地位則德業成而易在其中矣以眀無别有易也成性存存道義之門性所以成道而存存也堯舜不能加桀紂不能亡此真存也存是則道義所從出也聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻言天下之至賾而不可惡也言天下之至動而不可亂也賾喧錯也古作嘖從口從臣一也春秋傳曰嘖有煩言象卦也物錯之際難言也聖人有以見之擬諸其形容象其物宜而畫以為卦剛柔相交上下相錯而六爻進退屈信於其間其進退屈信不可必其順之則吉逆之則凶者可必也可必者其㑹通之處也見其㑹通之處則典禮可行矣故卦者至錯也爻者至變也至錯之中有循理焉不可惡也至變之中有常守焉不可亂也擬之而後言議之而後動擬議以成其變化變化之間不容毫釐然且擬之而後言議之而後動則虛以一物雍容之至也鳴鶴在隂其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎同人先號咷而後笑子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭初六藉用白茅無咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其無所失矣勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也亢龍有悔子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也不出戶庭無咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也子曰作易者其知盜乎易曰負且乘致寇至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下㬥盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致寇至盜之招也夫論經者當以意得之非於句義之間也於句義之間則破碎牽蔓之說反能害經之意孔子之言易如此學者可以求其端矣天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合合而相因則為五十天數二十有五地數三十凡天地之數五十有五分而各數則為五十有五此所以成變化而行鬼神也大衍之數五十五行蓋交相成也水火木金不得土土不得是四者皆不能成夫五行之數始於一而至於五足矣自六以往者相因之數也水火木金得土而後成故一得五而成六二得五而成七三得五而成八四得五而成九土無定位無成名無專氣水火木金四者成而土成矣故得水之一得火之二得木之三得金之四而成十言十則一二三四在其中而言六七八九則五在其中矣大衍之數五十者五不特數以為在六七八九之中也一二三四在十之中然而特數者何也水火木金特見於四時而土不特見言四時足以舉土而言土不足以舉四時也水曰潤下火曰炎上木曰曲直金曰從革皆有以名之而土爰稼穡曰於是稼穡而已五藏六府無胃脈則死而脾脈不可見如雀之啄如水之漏下是脾之衰見也故曰土無定位無成名無專氣其用四十有九易有太極是生兩儀分而為二以象兩則其一不用太極之象也分而為二以象兩掛一以象三揲之以四以象四時歸奇於扐以象閏五歲再閏故再扐而後掛分而為二一也掛一二也揲之以四三也歸奇於扐四也乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日二篇之䇿萬有一千五百二十當萬物之數也是故四營而成易十有八變而成卦八卦而小成四營而一變三變而一爻六爻為十八變也三變之餘而四數之得九為老陽得六為老隂得七為少陽得八為少隂故曰乾之䇿二百一十有六坤之策百四十有四取老而言也九六為老七八為少之說未之聞也或曰陽極於九其次則七也極者為老其次為少則隂當老於十而少於八曰隂不可加於陽故十不用十不用猶當老於八而少於六也則又曰陽順而上其成數極於九隂逆而下其成數極於六自下而上隂陽均也稚於子午而壯於己亥始於復姤而終於乾坤者隂猶陽也曷嘗有進陽而退隂與逆順之别乎且此自然而然者天地且不能知而聖人豈得與於其間而制其豫奪哉惟唐一行之學則不然以為易固已言之矣曰十有八變而成卦八卦而小成則十八變之間有八卦焉人莫之思也變之扐有多少其一變也不五則九其二與三也不四則八八與九為多五與四為少少多者竒偶之象也三變皆少則乾之象也乾所以為老陽而四數其餘得九故以九名之三變皆多則坤之象也坤所以為老隂而四數其餘得六故以六名之三變而少者一則震坎艮之象也震坎艮所以為少陽而四數其餘得七故以七名之三變而多者一則巽離兌之象也巽離兑所以為少隂而四數其餘得八故以八名之故七八九六者因餘數以名隂陽而隂陽之所以為老少者不在是而在乎三變之間八卦之象也此唐一行之學也引而伸之觸類而長之天下之能事畢矣此生生之極也顯道神德行道神而不顯德行顯而不神故易以顯道神德行是故可與酬酢應對萬物之求可與佑神矣助成神化之功子曰知變化之道者其知神之所為乎神之所為不可知也觀變化而知之爾天下之至精至變與聖人之所以極深研幾者每以神終之是以知變化之間神無不在因而知之可也指以為神則不可易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占聖人之道求之而莫不皆有取之而莫不皆獲者也以四人者之各有獲於易也故曰易有聖人之道四焉而昧者乃指此以為道則過矣是以君子將有為也將有行也問焉而以言其受命也如嚮無有逺近幽深遂知來物非天下之至精其孰能與於此此筮占之類參伍以變錯綜其數世之通於數者論三五錯綜則以九宫言之九宫不經見見於乾鑿度曰太一行九宫九宫之數以九一三七為四方以二四六八為四隅而五為中宫經緯四隅交絡相值無不得十五者隂陽老少皆分取於十五老陽取九餘六以為老隂少陽取七餘八以為少隂此與一行之學不同然吾以為相表裏者二者雖不經見而其說皆不可廢也通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此此厯術之類易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此夫易聖人之所以極深而研幾也唯深也故能通天下之志唯幾也故能成天下之務深者其理也幾者其用也唯神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也至精至變者以數用之也極深研幾者以道用之也止於精與變也則數有時而差止於幾與深也則道有時而窮使數不差道不窮者其唯神乎故曰極數知來之謂占變通之謂事隂陽不測之謂神而此二者亦各以神終之既以神終之又曰易有聖人之道四焉眀彼四者之所以得為聖人之道者以此也子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也所謂斯者指此十者而學者不以此十者求之則過矣水至隂也必待天一加之而後生者隂不得陽則終不得蒸而成也火至陽也必待地二加之而後生者陽不得隂則無所傳而見也五行皆然莫不生於隂陽之相加陽加隂則為水為木為土隂加陽則為火為金苟不相加則雖有隂陽之資而無五行之用夫易亦然人固有是材也而渾沌朴鄙不入於器易則開而成之然後可得而用也天下各治其道術自以為至矣而支離專固不適於中易以其道被之然後可得而行也是故乾剛而不折坤柔而不屈八卦皆有成德而不窳不然則天下之物皆棄材也天下之道皆棄術也是故聖人以通天下之志以定天下之業以斷天下之疑是故蓍之德圓而神卦之德方以知六爻之義易以貢蓍有無窮之變故其德圓而象知來之神卦著已然之迹故其德方而配藏往之智以圓適方以神行智故六爻之義易以告也聖人以此洗心退藏於密以神行智則心不為事物之所塵垢使物自運而已不與斯所以為洗心退藏於密也吉凶與民同患神以知來知以藏往其迹不出於吉凶之域故與民同患神以知來智以藏往故其實無患來者應之謂之知來已行者莫見其迹謂之藏往其孰能與於此哉古之聰眀睿知神武而不殺者夫莊子曰賊莫大於德有心而心有眼夫能洗心退藏則雖用武而未嘗殺況施德乎不然則雖施德有殺人者矣況用武乎是以眀於天之道而察於民之故是興神物以前民用天者死生禍福之制而民之所最畏也是故明天之道察民之故而作蓍龜蓍龜之於民用也其實何能益亦前之而已以虛器前之而實用者得完是故禮義亷恥以前賞罰則賞罰設而不用矣聖人以此齊戒以神明其德夫齊戒所以前祭祀也是故闔戶謂之坤闢户謂之乾一闔一闢謂之變往來不窮謂之通同是户也闔則謂之坤闢則謂之乾闢闔之間而二物出焉故變者兩之通者一之不能一則往者窮於伸來者窮於屈矣見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神象而後器器而後用此德業之叙也而神常終之是故易有太極是生兩儀兩儀生四象四象生八卦太極者有物之先也夫有物必有上下有上下必有四方有四方必有四方之間四方之間立而八卦成矣此必然之勢無使之然者八卦定吉凶吉凶生大業入於吉凶之域然後大業可得而見是故法象莫大乎天地變通莫大乎四時縣象著眀莫大乎日月崇髙莫大乎富貴備物致用立成器以為天下利莫大乎聖人探賾索隱鉤深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜天地四時日月天事也天事所不及富貴者制之富貴者所不制聖人通之聖人所不通蓍龜决之是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也天生神物聖人則之則之者則其無心而知吉凶也天地變化聖人效之效之者效其體一而周萬物也天垂象見吉凶聖人象之象之者象其不言而以象告也河圖洛書其詳不可得而聞矣然著於易見於論語不可誣也而今學者或疑焉山川之出圖書有時而然也魏晉之間張掖出石圖文字粲然時無聖人莫識其義爾河圖洛書豈足怪哉且此四者聖人之所取象以作易也當是之時有其象而無其辭示人以其意而已故曰易有四象所以示也聖人以後世為不足以知也故繫辭以告之定吉凶以斷之聖人之憂世也深矣易曰自天祐之吉無不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利也子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意聖人非不欲正言也以為有不可勝言者惟象為能盡之故孟軻之譬喻立象之小者也設卦以盡情僞情僞臨吉凶而後見吉凶至則情者自如而僞者敗矣卦者起吉凶之端也繫辭以盡其言辭約而義廣故能盡其言變而通之以盡利既變之復通之則反復於萬物之間無遺利矣鼓之舞之以盡神孰鼓之歟孰舞之歟莫適為之則謂之神乾坤其易之縕邪乾坤成列而易立乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣縕蓄也隂陽相縕而物生乾坤者生生之祖也是故為易之縕乾坤之於易猶日之於歲也除日而求歲豈可得哉故乾坤毁則易不可見矣易不可見則乾為獨陽坤為獨隂生生之功息矣是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通道者器之上達者也器者道之下見者也其本一也化之者道也裁之者器也推而行之者一之也舉而措之天下之民謂之事業是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻極天下之賾者存乎卦鼓天下之動者存乎辭化而裁之存乎變推而行之存乎通神而眀之存乎其人默而成之不言而信存乎德行有其具而無其人則形存而神亡有其人而修誠無素則我不能默成而民亦不能默喻也東坡易傳卷七
