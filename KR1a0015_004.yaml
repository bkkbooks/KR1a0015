body:
  text: 東坡易傳卷四宋蘇軾撰艮下兌上咸亨利貞取女吉彖曰咸感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也下之而後得必貞者也取而得貞取者之利也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣情者其誠然也雲從龍風從虎無故而相從者豈容有僞哉象曰山上有澤咸君子以虛受人初六咸其拇象曰咸其拇志在外也外四也咸其拇者以是為咸也咸者以神交夫神者將遺其心而况於身乎身忘而後神存心不遺則身不忘身不忘則神忘故神與身非兩存也必有一忘足不忘屨則屨之為纍也甚於桎梏要不忘帶則帶之為虐也甚於縲紲人之所以終日躡屨束帶而不知厭者以其忘之也道之可名言者皆非其至而咸之可分别者皆其粗也是故在卦者咸之全也而在爻者咸之粗也爻配一體自拇而上至於口當其處者有其德德有優劣而吉凶生焉合而用之則拇履腓行心慮口言六職竝舉而我不知此其為卦也離而觀之則拇能履而不能捉口能言而不能聽此其為爻也方其為卦也見其咸而不見其所以咸猶其為人也見其人而不見其體也六體各見非全人也見其所以咸非全德也是故六爻未有不相應者而皆病焉不凶則吝其善者免於悔而已六二咸其腓凶居吉象曰雖凶居吉順不害也順九三也九三咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也執牽也下二也體靜而神交者咸之正也艮止也而所以為艮者三也三之德固欲止而初與二莫之聽者往從其配也見配而動雖三亦然是故三雖欲止而不免於隨也附於足而足不能禁其動者拇也附於股而股不能已其行者腓也初與二者艮之體而艮不能使之止也拇雖動足未必聽故初之於四有志而已腓之所之無不隨者以動靜之制在焉故可以凶可以吉也股欲止而牽於腓三欲止而牽於二不信已而信人是以往吝也九四貞吉悔亡憧憧往來朋從爾思象曰貞吉悔亡未感害也憧憧往來未光大也九四之所居心之所在也方其為卦也四𨼆而不見心與百體竝用而不知是以無悔無朋及其表之以四也而心始有所在心有所在而物疑矣故憧憧往來以求之正則吉不正則不吉既感則悔亡未感則害我者也其朋則從非其朋則不從也九五咸其脢無悔象曰咸其脢志末也拇之動腓之行股之隨心之憧憧往來皆有為之病也懲其病而舉不為者是無為之病也五之所在者脢也而脢者體之不動而無事者也畏其有事之勞而咸於無事求無悔而已志已卑矣上六咸其輔頰舌象曰咸其輔頰舌滕口說也上六之所在者口也夫有以為咸者口未必不用而恃口以為咸則不可巽下震上恆亨無咎利貞利有攸往彖曰恆久也剛上而柔下雷風相與巽而動剛柔皆應恆恆亨無咎利貞久於其道也所以為恆者貞也而貞者施於既亨無咎之後者也上下未交恩澤未渥而驟用其貞此危道也故將為恆其始必有以深通之其終必有以大正之方其通物也則上下之分有相錯者矣以錯致亨亨則悅悅故無我咎者無咎而後貞貞則可恆故恆非一日之故也惟久於其道而無意於速成者能之天地之道恆久而不已也利有攸往終則有始也物未有窮而不變者故恆非能執一而不變能及其未窮而變爾窮而後變則有變之形及其未窮而變則無變之名此其所以為恆也故居恆之世而利有攸往者欲及其未窮也夫能及其未窮而往則終始相受如環之旡端日月得天而能久照照者日月也運之者天也四時變化而能久成將明恆久不已之道而以日月之運四時之變明之明其未窮而變也陽至於午未窮也而隂已生隂至於子未窮也而陽已萌故寒暑之際人安之如待其窮而後變則生物無類矣聖人久於其道而天下化成觀其所恆而天地萬物之情可見矣非其至情者久則厭矣象曰雷風恆君子以立不易方雷風非天地之常用也而天地之化所以無常者以有雷風也故君子法之以能變為恆立不易方而其道運矣初六浚恆貞凶無攸利象曰浚恆之凶始求深也恆之始陽宜下隂以求亨及其終隂宜下陽以明貞今九四不下初六故有浚恆之凶上六不下九三故有振恆之凶二者皆過也易地而後可下沈曰浚上奮曰振初六以九四不見下故求深自藏以逺之使九四雖田而無獲可謂貞矣然隂陽否而不亨非所以為恆之始也故凶始不亨而用貞終必兩廢故無攸利夫恆之始宜亨而未宜貞九二悔亡象曰九二悔亡能久中也艮兌合而後為咸震巽合而後為恆故卦莫吉於咸恆者以其合也及離而觀之見已而不見彼則其所以為咸恆者亡矣故咸恆無完爻其美者不過悔亡恆之世惟四宜下初自初以上皆以隂下陽為正故九二九三六五上六皆非正也以中者用之猶可以悔亡以不中者用之則無常之人也故九三不恆其德九三不恆其德或承之羞貞吝象曰不恆其德無所容也傳曰人而無恆不可作巫醫子曰不占而已矣夫無常之人與之為巫醫且不可而况可與有為乎人惟有常故其善惡可以外占而知無常之人方其善也若可與有為及其變也冰解潦竭而吾受其羞故與是人遇者去之吉貞之吝善惡各有徒惟無常者旡徒故曰不恆其德無所容也九四田無禽象曰久非其位安得禽也九四居非其位而重下初六初六其所欲得也故曰無禽上亢而下沉欲以獲初難矣六五恆其德貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也恆以隂從陽為正六五下即二則婦人之正也九二上從五則夫子之病也上六振恆凶象曰振恆在上大無功也恆之終隂宜下陽者也不安其分而奮於上欲求有功而非其時矣故凶艮下乾上遁亨小利貞彖曰遁亨遁而亨也隂盛於否而至於剝君子未嘗不居其間也遁以二隂而伏於四陽之下隂猶未足以勝陽而君子遂至於遁何也曰君子之遁非直棄去而不復救也以為有亨之道焉今夫二隂在內遁之主也其勢至鋭而其朋至寡鋭則其終必勝寡則其心常欲得衆君子及其未勝而遁則隂無與處而思求陽隂思求陽而後陽可以處故曰遁亨遁而亨也剛當位而應與時行也時當遁雖有應不得不逝也小利貞浸而長也遁之時義大矣哉浸而後長則今猶微也微而忘貞則廢矣象曰天下有山遁君子以逺小人不惡而嚴山有企天之意而不可及隂有慕陽之志而不可追遁之象也初六遁尾厲勿用有攸往象曰遁尾之厲不往何災也遁者皆外向故初六為尾首之所趣尾所不能禁也遁而不能禁逝者衆矣衆逝則我無與處故𫝑危不能禁而往迫之則陽怒而為災故不利有攸往六二執之用黃牛之革莫之勝說象曰執用黃牛固志也六二遁之主而與五為應則有以固執之矣方陽之遁其所以執而留之者非出於款誠至意陽不顧也故必有如牛革之堅者而又用其黃焉則忠確之至也九三係遁有疾厲畜臣妾吉象曰係遁之厲有疾憊也畜臣妾吉不可大事也九三雖陽而與隂同體是為以隂止陽徒欲止之而無應於上止之不由其道蓋係之而已彼欲去矣而以力係之我惟無疾而後可一日有疾則彼皆舍我而去爾何則所以係之者恃力也故曰畜臣妾吉係者畜臣妾之道而非所以畜君子也九四好遁君子吉小人否象曰君子好遁小人否也九四有初六之好舍其好而遁則君子吉而小人否也九五嘉遁貞吉象曰嘉遁貞吉以正志也六二九五配也舍其配而遁故曰嘉遁猶懼其懷也故戒之以貞吉上九肥遁無不利象曰肥遁無不利無所疑也無應於下沛然而去遁之肥也夫九三牽於二隂而為之止我不知勢之不可以不遁而止之非其利也然則上九之肥遁非獨以利我亦以利三也乾下震上大壯利貞彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣以大者為正天地之至情也象曰雷在天上大壯君子以非禮弗履所以全其勇壯也初九壯于趾征凶有孚象曰壯于趾其孚窮也乾施壯于震者也壯者為羊所施為藩故五以二為羊三以六為藩以類推之則初九之壯施於九四九四藩決不羸則初九亦觸四之羊也以其最下而用壯故曰壯於趾自下之四故曰征衆皆觸非其類已獨觸其類觸其類則有孚於非其類矣不孚於方壯之陽而孚於已窮之隂故雖有孚而不免於凶者其孚窮而不足賴也九二貞吉象曰九二貞吉以中也初九以觸陽凶九三以觸隂厲皆失中者也九二之於五也進不觸之退不助之安貞而已中也九三小人用壯君子用罔貞厲羝羊觸藩羸其角象曰小人用壯君子罔也羊九三也藩上六也羸廢也九三之壯施於上六上六窮隂也九三壯陽也以壯陽觸窮隂其勢若易易然然而陽壯則輕敵隂窮則深謀故小人以是為壯而君子以是為罔已也以陽觸隂正也而危道也是以君子不觸也九四貞吉悔亡藩決不羸壯于大輿之輹象曰藩決不羸尚往也九四有藩是以知初九之觸也欲進而消二隂者九四之貞吉也外有二隂之敵而內有初九之觸此九四之所以有悔也忿其觸而羸其角則是敵未亡而內自戰四以是為病也故見觸不校即而懷之以為其徒則可以悔亡故曰藩決不羸壯于大輿之輹九四自決其藩而不以羸初九之角則向之觸我者止而為吾用適所行以壯吾輹爾臨敵而輹壯可以往矣六五喪羊於易無悔象曰喪羊於易位不當也羊九二也六五者九二施壯之地也以隂居陽則不純乎隂有志於助陽矣是以釋九二之羊而縱之故曰喪羊于易位不當也人皆為藩以禦羊而已獨無有豈非易之至也歟有藩者羸其角而易者喪之羸其角者無攸利則喪之者無悔豈不眀哉上六羝羊觸藩不能退不能遂無攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也羊九三也藩上六也自三言之三不應觸其藩自上言之上不應羸其角二者皆不計其後而果於發者三之觸我我既已罔之矣方其前不得遂而退不得釋也豈獨羊之患雖我則何病如之且未有羊羸角而藩不壞者也故無攸利均之為不利也則以知難而避之為吉坤下離上晉康侯用錫馬蕃庶晝日三接彖曰晉進也眀出地上順而麗乎大眀柔進而上行是以康侯用錫馬蕃庶晝日三接也晉以離為君坤為臣坤之為物廣大博厚非特臣爾乃諸侯也故曰康侯君以是安諸侯也夫坤順而離眀以順而進趨於眀無有逆而不受者故曰錫馬馬所以進也錫之馬而使蕃之許其進之甚也一日三接喜其來之至也象曰眀出地上晉君子以自昭眀德初六晉如摧如貞吉罔孚裕無咎象曰晉如摧如獨行正也裕無咎未受命也三隂皆進而之離九四居於其衝欲並而有之衆之所不與也初六有應於四將以衆適四故進而衆摧之也夫初六之適四正也其以衆適四不正也已獨行而不以衆則得其正矣故曰貞吉我雖正矣而衆莫吾信故裕之而後無咎裕之而後無咎者衆未肯受吾命也六二晉如愁如貞吉受茲介福於其王母象曰受茲介福以中正也將進而之五而四欲得之故晉如愁如我守吾正雖四為拒不能終閉也故受福于王母六五之謂王母也以其為王母故二雖隂亦可得而歸之矣六三衆允悔亡象曰衆允之志上行也將適上九而近於四悔也雖與之近而衆信其不與也故悔亡九四晉如鼫鼠貞厲象曰鼫鼠貞厲位不當也求得而未必能者鼫鼠也六二六三非其所當得也因其過我欲兼有之而衆不聽故曰晉如鼫鼠九四之有初六正也非其正者固不可得矣而正者猶危則位不當之故也六五悔亡失得勿恤往吉無不利象曰失得勿恤往有慶也四奪其與悔也然而衆不與四是以悔亡夫以五之尊而下與四爭其所附則陋矣故雖失所當得勿恤而往則吉夫下與四爭必來來者爭也則往者不爭之至也五猶不爭而四何敢不置之故其所失終亦必得而已矣苟終於得則其不爭非獨四之利也上九晉其角維用伐邑厲吉無咎貞吝象曰維用伐邑道未光也剛之上窮者角也晉其角者以是為晉也以角為晉必有所用其觸三吾應也而四閉之則上九之所伐者四也四與上同體故為邑也邑人而閉吾應無以令之而至於用兵道不光矣此正也而吝道也故知戒於危然後其吉可以無咎離下坤上眀夷利艱貞彖曰眀入地中眀夷內文明而外柔順以蒙大難文王以之利艱貞晦其明也內難而能正其志箕子以之象曰明入地中明夷君子以蒞衆用晦而明王弼曰顯明於外乃所辟也初九明夷于飛垂其翼君子于行三日不食有攸往主人有言象曰君子於行義不食也明夷之主在上六二與五皆其用事之地而九三勢均於其主力足以正之此三者皆有責於明夷之世者也夫君子有責於斯世力能救則救之六二之用拯是也力能正則正之九三之南狩是也既不能救又不能正則君子不敢辭其辱以私便其身六五之箕子是也君子居明夷之世有責必有以塞之無責必有以全其身而不失其正初九六四無責於斯世故近者則入腹獲心于出門庭而逺者則行不及食也明夷者自夷以全其明也將飛而舉其翼必見縻矣故垂其翼所以示不飛之形也方其未去也垂其翼緩之至也及其去也三日不遑食亟之至也是何也則懼不免也明夷之主既已失其民矣我有所適所適必其敵也去主而適敵主且以我為謀之故曰主人有言主人上六也六二明夷夷于左股用拯馬壯吉象曰六二之吉順以則也爻言左右猶言內外也在我之上則於我為左矣明夷之世坤君也而將廢也離臣也而方壯也自離言之坤之廢左股之傷也六二忠順之至故往用拯之愛其忠而憂其不濟也故戒之曰徒往不足拯也馬壯而後吉馬所以載傷者也九三明夷于南狩得其大首不可疾貞象曰南狩之志乃大得也六二所居者順而不失人臣之則故可以拯不明之君有功而不見疑是以吉也至於九三其勢逼矣雖欲拯之而不可得故南狩以正之明夷始自晦也南狩發其眀之地也以陽用陽戒在於速故大首既獲則不可疾貞六四入於左腹獲明夷之心于出門庭象曰入于左腹獲心意也近不明之君而位非用事之地雖以遜免可也是故入其左腹獲其心意而君子莫之咎者以去其門庭之速也君子之居此懼不免爾既免未有不去者既免而不去懷其門庭將以有求則吾罪大矣六五箕子之明夷利貞象曰箕子之貞明不可息也六五之於上六正之則勢不敵救之則力不能去之則義不可此最難處者也如箕子而後可箕子之處於此身可辱也而明不可息者也上六不明晦初登于天後入于地象曰初登于天照四國也後入于地失則也六爻皆晦也而所以晦者不同自五以下明而晦者也若上六不明而晦者也故曰不明晦言其實晦非有託也明而晦者始晦而終明不明而晦者强明而實晦此其辨也離下巽上家人利女貞彖曰家人女正位乎內謂二也男正位乎外謂五也男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣象曰風自火出家人君子以言有物而行有恆火之所以盛者風也火盛而風出焉家之所以正者我也家正而我與焉初九間有家悔亡象曰間有家志未變也家人之道寬則傷義猛則傷恩然則是無適而可乎曰君子以言有物而行有恆至矣言之有物也行之有恆也雖有悍婦暴子弟莫敢不肅然而未嘗廢恩也此所以為至也曾子曰君子所貴乎道者三動容貌斯逺㬥慢矣正顏色斯近信矣出辭氣斯逺鄙倍矣如是何間之有初九用剛於家之始九三用剛於家之成是以皆有悔也夫所以至於間者惟德不足故也德既不足而又忘間焉則志變矣及其未變而間之故悔亡六二無攸遂在中饋貞吉象曰六二之吉順以巽也有中饋無遂事婦人之正也九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也以陽居陽過於用剛故悔且危也人見其悔且危也而矯之以寬則家敗矣故告之以斯人之終吉戒之以失節之終吝六四富家大吉象曰富家大吉順在位也家人有四陽二隂而隂皆不失其位以聽於陽陽為政而隂聽之家欲不治不可得也富者治之極也故六二貞吉其治也六四富家其極也以治極致富則其富可久此之謂大吉九五王假有家勿恤吉象曰王假有家交相愛也假至也王至有家則是家也大矣王者以天下為一家家人之家近而相瀆天下之家逺而相忘知其患在於相瀆也故推嚴别逺以存相忘之意知其患在於相忘也故簡易勿恤以通相愛之情家人四陽惟九五有人君之德故稱其德論天下之家焉君臣欲其如父子父子欲其如君臣聖人之意也上九有孚威如終吉象曰威如之吉反身之謂也上九之所信者三也家人之無應者惟三與上而已人皆剛柔相與而已獨兩剛相臨是以終身不忘畏也畏威如疾民之上也故畏人者人亦畏之慢人者人亦慢之此之謂反身凡言終者其始未必然也婦子嘻嘻其始可樂威如之吉其始苦之兌下離上睽小事吉彖曰睽火動而上澤動而下二女同居其志不同行說而麗乎明柔進而上行得中而應乎剛謂五也是以小事吉有同而後有睽同而非其情睽之所由生也說之麗明柔之應剛可謂同矣然而不可大事者以二女之志不同也天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉人苟惟同之知若是必睽人苟知睽之足以有為若是必同是以自其同者言之則二女同居而志不同故其吉也小自其睽而同者言之則天地睽而其事同故其用也大象曰上火下澤睽君子以同而異同而異晏平仲所謂和也初九悔亡喪馬勿逐自復見惡人無咎象曰見惡人以辟咎也睽之不相應者惟初與四也初欲適四而四拒之悔也四之拒我逸馬也惡人也四往無所適無歸之馬也馬逸而無歸其勢自復馬復則悔亡矣人惟好同而惡異是以為睽故美者未必婉惡者未必狠從我而來者未必忠拒我而逸者未必二以其難致而捨之則從我者皆吾疾也是相率而入於咎爾故見惡人所以辟咎也九二遇主于巷無咎象曰遇主于巷未失道也主所主也有所適必有所主九二之進則主五矣巷者二五往來相從之道也使二決從五則見主於其室五決從二則見主於其門所以相遇於巷者皆有疑也何疑也疑四之為寇也然而猶可以無咎者皆未失相從之道也特未至爾六三見輿曵其牛掣其人天且劓無初有終象曰見輿曵位不當也無初有終遇剛也三非六之所宜據譬之乘輿而非其人也非其人而乘其器無人則肆有人則怍矣故六三見上九曵其輪而不進掣其牛而去之夫六三配上九而近於九四九四其寇也無所應而噬之未達於配而噬於寇是以天且劓也乘非其位而汙非其配可以獲罪矣然上九猶脫弧而納之上九則大矣有是大者容之故無初有終九四睽孤遇元夫交孚厲無咎象曰交孚無咎志行也睽之世陽惟升隂惟降九二升而遇五故為遇主九四上九升而無所遇故為睽孤元夫初九也夫兩窮而後相遇者不約而交相信是以雖危而無咎也六五悔亡厥宗噬膚往何咎象曰厥宗噬膚往有慶也六五之配九二也九二之宗九四也二與四同功故亦曰宗膚六三也自五言二之宗故曰厥宗六五之所以疑而不適二者疑四之為寇也故告之曰四已噬三矣夫既已噬三則不暇寇我我往從二何咎之有上九睽孤見豕負塗載鬼一車先張之弧後說之弧匪寇婚媾往遇雨則吉象曰遇雨之吉羣疑亡也上九之所見者六三也汙非其配負塗之豕也載非其人載鬼之車也是以張弧而待之既而察之曰是其所居者不得已非與寇為媾者也是以說弧而納之隂陽和而雨也天下所以睽而不合者以我求之詳也夫苟求之詳則孰為不可疑者今六三之罪猶且釋之羣疑之亡也不亦宜哉艮下坎上蹇利西南不利東北利見大人貞吉彖曰蹇難也險在前也見險而能止知矣哉蹇利西南往得中也不利東北其道窮也艮東北也坎北也難在東北則西南者無難之地也君子將有意乎犯難以靖人必先靖其身是故立於無難之地以觀難之所在勢之可否見可而後赴之是以往則得中也難之所在我亦在焉則求人之不暇其道窮矣然此非為大人者言也初六九三六四上六皆因其勢之逺近時之可否以斷其往來之吉凶故西南之利東北之不利為是四者言也若九五之大人則不然利見大人往有功也當位貞吉以正邦也當位而正五也五之謂大人大人者不擇其地而安是以立於險中而能正邦也是豈惡東北而樂西南者哉得見斯人而與之往其有功旡疑也上六當之蹇之時用大矣哉象曰山上有水蹇君子以反身修德初六往蹇來譽象曰往蹇來譽宜待也九五以大蹇為朋來之主以中正為往來之節未及於五難未艾也犯之有咎過五以上難衰而可乘矣故上六往蹇來碩而六四以下皆以往蹇為病而其來有先後之差焉見難而往難不可犯窮而後反人不以窮而後反者為有讓以其不得已也惟初六涉難未深而遽反不待其窮是以有譽也六二王臣蹇蹇匪躬之故象曰王臣蹇蹇終無尤也初六九三六四上六彼四者或逺或近皆視其勢之可否以為往來之節獨六二有應於五君臣之義深矣是以不計逺近不慮可否無往無來蹇蹇而已君子不以為不智者以其非身之故也九三往蹇來反象曰往蹇來反內喜之也六四往蹇來連象曰往蹇來連當位實也夫勢不可往者非徒往而無獲亦將來而失其故也何則險難在前不慮可否而輕以身赴之苟前不得進則必有議吾後者矣九三往蹇而其來也得反其位則內喜之也內之二隂不能自立於險難之際待我而為捍蔽是故完位以復我我之所以得反者幸也至於六四則九三躡而襲之矣外難未夷而歸遇難故曰往蹇來連連者難之相仍也實陽也九三以陽居陽其有乘虛而不敢者乎故曰當位實也九五大蹇朋來象曰大蹇朋來以中節也險中者人之所避也而已獨安焉此必有以任天下之大難也是以正位不動無往無來使天下之濟難者朋來而取節焉謂之大人不亦宜乎上六往蹇來碩吉利見大人象曰往蹇來碩志在內也利見大人以從貴也六爻可以往者惟是也故獨享其利天下有大難彼三人者皆不能濟而我濟之既濟而天下不吾宗者未之有也故曰往蹇來碩利見大人者明上六之有功由九五為之節也內與貴皆五之謂也坎下震上解利西南無所往其來復吉有攸往夙吉彖曰解險以動動而免乎險解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也所以為解者震也坎也震東也坎北也解者在此所解在彼東北解者之所在則西南所解之地也在難而思解處安而惡擾者物之情也方其在難我往則得衆故利西南及其無難我往則害物故來復吉復者復東北也東北有時而當復是以不言其不利也來復之為吉者夙所往之時也苟有攸往非夙不可有攸往而不夙則難深而不可解矣天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉象曰雷雨作解君子以赦過宥罪初六無咎象曰剛柔之際義無咎也解有二陽九二有應於六五而九四有應於初六各得其正而分定矣惟六三者無應而處於二陽之間兼與二陽而解始有爭矣故解之所疾者莫如六三也六三欲以其不正亂人之正故初與五皆其所疑而咎之以其疑而咎之也故特眀其無咎曰此與九四剛柔之際也於義無咎九二田獲三狐得黃矢貞吉象曰九二貞吉得中道也九二之所當得者六五也近而可取者初六六三也此之謂三狐三狐皆可取而以得六五為貞吉也此之謂黃矢黃中也矢直也直其所當得也是以六五為黃矢釋其所不當得之三狐而取其所當得之一矢息爭之道也六三負且乘致寇至貞吝象曰負且乘亦可醜也自我致戎又誰咎也三於四為負於二為乘乘而不負若負而不乘猶可以免於寇寇之所伐者負且乘也夫三苟與四而不與二則四不伐與二而不與四則二不攻所以致寇者由兼與也二與四皆非其配雖貞於一猶吝也而況兼與乎醜之甚也九四解而拇朋至斯孚象曰解而拇未當位也拇六三朋九二也三來附已解而不取則二信之未當位者明勢不可以爭也六五君子維有解吉有孚于小人象曰君子有解小人退也六五九二之配也而近於四六三欲附於二與四故疑而疾之夫以六五之中直豈與六三爭所附者哉而六三以小人之意度君子之心故六五維有解吉維有解者無所不解之謂也近則解四逺則解二是以六三釋然而退也上六公用射隼於髙墉之上獲之無不利象曰公用射隼以解悖也隼者六三也墉者二陽之間也悖者爭也二陽之所以爭而不已者以六三之不去也孰能去之將使二與四乎二與四固欲得之將使初與五乎則初與五二陽之配三之所疑也夫欲斃所爭而解交鬭惟不涉其黨者能之故髙墉之隼惟上六為能射而獲也隼獲爭解二與四無不利者兌下艮上損有孚元吉無咎可貞利有攸往曷之用二簋可用享彖曰損損下益上其道上行自陽為隂謂之損自隂為陽謂之益兌本乾也受坤之施而為兑則損下也艮本坤也受乾之施而為艮則益上也惟益亦然則損未嘗不益益未嘗不損然其為名則取一而已何也曰君子務知逺者大者損下以自益君子以為自損自損以益下君子以為自益也損而有孚元吉無咎損下而下信之必有道矣孟子曰以佚道使民雖勞不怨以生道殺民雖死不怨殺者使民知所以損我者凡以益我也則信之矣損者下之所患也然且不顧而為之則其利必有以輕其所患者矣利不足以輕其所患益不足以償其所損則損且有咎是故可以無咎者惟元吉也上之所以損我者豈徒然哉蓋吉之元者也如此而後無咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虛與時偕行有孚元吉無咎為上卦言也可貞利有攸往曷之用二簋可用享為下卦言也損下益上其道上行然而下不可以無貞也以損之道為上行而舉不可貞則過矣故損有可貞之道九二是也皆貞而不往則無上皆往而不貞則無下故可貞利有攸往有往者有貞者故曰曷之用曷之者擇之也二簋兑之二陽也兑本乾也而六三以身徇上故自陽而變為隂初九九二意則向之而身不徇故自如而不變也祭祀之設簋也亦以其意而已我豈豫之神豈取之哉君子之益人也蓋亦有無以豫之而人不勝其益者也然此二陽皆有應於上者也初九遄往而九二征凶故曰二簋應有時言雖應而往有時也象曰山下有澤損君子以懲忿窒欲初九已事遄往無咎酌損之象曰已事遄往尚合志也彖曰損益盈虛與時偕行則損益視盈虛以為節者也初九陽之未損則方盈也六四隂之未益則猶虛也下方盈而上猶虛則其往也不可後矣故我雖有事當且已之而遄往也其往也自我則損之多少我得酌之若盤桓不進迫於上之勢而後往則雖欲酌之不可得矣其損必多故勢不可以不損者惟遄往可以無咎九二利貞征凶弗損益之象曰九二利貞中以為志也初九已損矣六四已益矣則九二之於六五不可復往故利貞征凶其迹不往其心往也故弗損益之言九二以無損於己者益六五也兑之三爻未有不以益上為志者初九迹與心合故曰尚合志也九二則其心向之而已故曰中以為志也夫以損己者益人則其益止於所損以無損於己者益人則其益無方故損之六三益之六四皆以損己者益人而損之九二益之九五皆以無損於己者益之以其無損於己故受其益者皆獲十朋之龜也六三三人行則損一人一人行則得其友象曰一人行三則疑也兌之三爻皆以益上為志故曰三人行卒之損己以益上者六三而已故曰損一人且曰一人行也友九二也六三以身徇上使九二得以不征此九二之所深德也故曰一人行則得其友以心言之則三人皆行以迹言之則一人而已君子之事上也心同而迹異故上不疑苟三人皆行則上且以我為有求而來進退之義輕矣六四損其疾使遄有喜無咎象曰損其疾亦可喜也遄者初九也下之所損者有限而上之求益者無已此下之所病也我去是病則夫遄者喜我矣自初言之已事遄往則四之求我也寡故酌損之自四言之損其疾則初之從我也易故遄有喜六五或益之十朋之龜弗克違元吉象曰六五元吉自上祐也六五者受益之主而非受益之地也以受益之主而不居受益之地不求益者也不求益而物自益之故曰或或者我不知其所從來之辭也十朋之龜則九二弗損之益也龜之益人也豈有以豫人而人亦豈有所取之我亦效其智而已六五之於九二無求也自上祐之而二自效其智雖欲避之而不可以其不可避知其非求也故元吉上九弗損益之無咎貞吉利有攸往得臣無家象曰弗損益之大得志也上九者受益之地不可以有損而六三之德不可以無報也故以無損於己者益之則大得其志矣六三忘家而狥我我受其莫大之益苟安居而無所往則是以其益厚已而已故利有攸往然後有以受之而無愧也震下巽上益利有攸往利涉大川彖曰益損上益下民說無疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行六四自損以益下巽之致用未有如益者也故曰木道乃行涉川者用木之道也益動而巽日進無疆天施地生其益無方天施乾為巽也地生坤為震也凡益之道與時偕行君子之視民與己一也益者要有所損爾故時然後行象曰風雷益君子以見善則遷有過則改懲忿窒欲則上之為損也少改過遷善則下之蒙益也多矣初九利用為大作元吉無咎象曰元吉無咎下不厚事也益之下損之上也故知損則知益矣逆而觀之益之初九則損之上九也自初已上無不然者惟其上下內外不同故其迹不能無少異若所以盡初之情處事之宜則損益一也損之上九益之初九皆正受益者也彼之所以自損而專以益我者豈以利我哉將以厚責我也我必有以塞之故上九利有攸往而初九利用為大作上之有為也其勢易有功則其利倍有罪則其責薄故損之上九僅能無咎而已正且吉矣下之有為也其勢難有功則利歸於上有罪則先受其責故益之初九至於元吉然後無咎何則其所居者非厚事之地也六二或益之十朋之龜弗克違永貞吉王用享於帝吉象曰或益之自外來也益之六二則損之六五也六五所獲之龜則九二弗損之益也六二所獲之龜則九五惠心之益也是受益者臣也則以永貞於五為吉王也則以享帝為吉皆受益而不忘報者也六三益之用凶事無咎有孚中行告公用圭象曰益用凶事固有之也益之六三則損之六四也或益之者人益我也益之者我益人也六四之於初九損其疾以益之六三之於上九用凶事以益之其實一也君子之遇凶也惡衣糲食致觳以自貶上九雖吾應然使其自損以益我彼所不樂也故六三致觳以自貶然後能固而有之彼以我為得其益而不以自厚也則信我而來矣故曰有孚中行益以六二為王則初與三皆得為公告者有以語之益之也禮之用圭也卒事則反之故圭非所以為賄所以致信也上九之益六三以信而已非有以豫之而六三亦享其信而無所取也則上九樂益之矣六四中行告公從利用為依遷國象曰告公從以益志也益之六四則損之六三也皆以身為益者也六四中行而益初九豈特如上九用圭而已哉非徒告之乃以身從之夫能捐身以徇人者此以益為志也初九本隂也六四本陽也而相易也故初九為遷國也六四自損而初受其益初九之遷六四資之故初九利用依我而遷也九五有孚惠心勿問元吉有孚惠我德益之九五則損之九二也惠之以心則惠而不費九二益之以弗損之益而九五惠之以不費之惠其實一也夫不費之惠其有擇哉故勿問元吉我惟信二也故二信我我惟德二也故二德我有孚惠我德永貞之報也象曰有孚惠心勿問之矣惠我德大得志也大得六二之志也上九莫益之或擊之立心勿恆凶象曰莫益之偏辭也或擊之自外也益之上九則損之初九也二者皆不樂為益者也故損其疾用凶事而後能致之初九在下勢不得已故已事遄往而上九則益不益在我者也且損上益下君子之所樂而小人之所戚也故至於上九特以莫益勿恆之凶戒之莫益之者非無以益我固曰莫益之勿恆者非不可恆我固曰勿恆莫與勿者我之偏見不廣之辭也衆莫不益下所謂恆也我特立是心而勿恆之凶其宜矣上者獨高之位下之所疾也而莫吾敢擊者畏吾與也莫益則無與矣孔子曰無交而求則民不與莫之與則傷之者至矣故或擊之上九之致擊如六二之致益徒有是心而物自有以應之故皆曰或或者物自外來而吾不知也東坡易傳卷四
