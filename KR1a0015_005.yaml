body:
  text: 東坡易傳卷五宋蘇軾撰乾下兌上夬揚於王庭孚號有厲告自邑不利即戎利有攸往彖曰夬決也剛決柔也健而說決而和揚于王庭柔乘五剛也孚號有厲其危乃光也五陽而一隂隂至寡弱而皆乘於決者以其得所附也上六之所乘者九五之剛所謂王也欲決上六必㬥揚之於王之庭此其勢有不便者故五陽雖相信而不忘警以為有危道焉號者所以警也在强而知危所以光也告自邑不利即戎所尚乃窮也邑者民之所在也與小人處必先附其民彼無民將無與立戎上六也五陽之强足以即之有餘然而不即也此所以不窮也自以為不足雖弱有餘自以為足雖强有所止矣故其所尚乃所以窮也利有攸往剛長乃終也陽盈則憂溢溢則憂覆故利有攸往往則有所施用所以求不盈也象曰澤上於天夬君子以施祿及下居德則忌君子之於祿利欲其在人德業欲其在己孔子曰修辭立其誠所以居業也澤上於天其勢不居故君子以施祿不以居德初九壯於前趾往不勝為咎象曰不勝而往咎也大壯之長則為夬故夬之初九與大壯之初九無異也大壯之初九曰壯於趾而夬之初九曰壯於前趾二者皆有羊之象見於其所施壯之爻是以知其無異也曰前者通大壯之辭也必通大壯而為辭者明其所壯同而所遇異也大壯之初九施壯於震震吾朋也觸而遇其朋是以決藩而遂之因以為用夬之初九施壯於兑兌非吾朋也苟不能勝則往見牽矣豈復決藩而遂我哉君子之動見勝而後往故勝在往前不能必勝而往宜其為咎也九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也戎上六也惕號莫夜警也有戎勿恤靜也能靜而不忘警能警而不用得中道矣與大壯九二貞吉同故皆稱其得中九三壯於頄有凶君子夬夬獨行遇雨若濡有慍無咎象曰君子夬夬終無咎也初九為趾故九三為頄與小人處而壯見于面顔有凶之道矣易凡稱其尤者申言之乾乾謙謙蹇蹇之類是也九三之所以見壯於面顔者避私其配之嫌也故告之以不然曰九三之君子以陽居陽夬之尤者也何嫌於私其配也哉苟舍其朋而獨行以答其配使上六之隂和洽而為雨以至於濡雖有不知我心而慍者然終必無咎九四臀無膚其行次且牽羊悔亡聞言不信象曰其行次且位不當也聞言不信聰不眀也九四上六之所謂臀也困之六三據于蒺藜故初六之臀困於株木夬之上六見夬故九四之臀無膚皆謂其同體之末者為臀也與衆陽處而同體者見夬故其行次且而不安也羊者初九也初九之觸則我之悔也而能牽之故悔亡雖能悔亡而聰不明矣孰與大壯九四既悔亡而得壯輹哉夫君子惟能釋怨而收士故為之聰眀者衆大壯之九四是也今初九觸我我牽而縻之莫肯釋則懼者衆矣雖其左右前後將無不可疑故聞言不信九五莧陸夬夬中行無咎象曰中行無咎中未光也上六之不足夬如莧陸也九五以陽居陽夬之尤者也於所不足夬用夬之尤雖中而未光故中行無咎中行者反與四陽處而釋上六也此與上六為同體者與九四均爾然不至於次且者以其剛之全也剛之全者則不戚其同體之傷矣故九四之象以為位不當也上六無號終有凶象曰無號之凶終不可長也無號者不警也陽不吾警則吾或有以乘之矣然終亦必凶巽下乾上姤女壯勿用取女彖曰姤遇也柔遇剛也勿用取女不可與長也姤者所遇而合無適意之謂也故其女不可與長天地相遇品物咸章也姤者乾之末坤之始也故曰天地相遇以四時言之則建午之月品物咸章之際也易曰萬物相見乎離剛遇中正天下大行也姤之時義大矣哉剛者二也中正者五也隂之長自九二之亡而後為遁始無臣也自九五之亡而後為剝始無君也姤之世上有君下有臣君子之欲有為無所不可故曰剛遇中正天下大行也象曰天下有風姤后以施命誥四方初六繫於金柅貞吉有攸往見凶羸豕孚蹢躅象曰繫於金柅柔道牽也剛而能止物者謂之金柅九二是也初六之勢足以兼獲五陽然其始遇而合者九二也既合於二若捨而之他則終身無所容矣故以繫二而貞為吉有所往見為凶初六者羸豕也雖羸而不可信者以權在焉以其羸而信之則蹢躅而不可制矣九二包有魚無咎不利賓象曰包有魚義不及賓也魚者初六也包者魚之所不能脫也賓者九四也姤者主求民之時非民求主之時也故近而先者得之遠而後者不得也不論其應與否也嫌其若有咎故曰無咎九三臀無膚其行次且厲無大咎象曰其行次且行未牽也以姤之初六為夬之上六則姤之九三夬之九四也故其象同九三之所謂臀者初六初六剝陽而進者也處衆陽之間而同體者有剝陽之隂宜其次且而不安也夬之九四下牽初九之羊故有聰不明之咎而九三無是也故雖危無大咎而象曰行未牽也九四包無魚起凶象曰無魚之凶遠民也既已失民起而爭之則凶九五以杞包瓜含章有隕自天象曰九五含章中正也有隕自天志不舍命也金柅也包也杞也皆九二也豕也魚也瓜也皆初六也杞枸檵也木之至庳者也包瓜者籠而有之也瓜之為物得所附而後止不得所附則攀援而求無所不至幸而遇喬木則雖欲抑之不可得矣故授之以杞則杞能籠而有之杞之所至瓜之所及也九五者姤之主也知初六之勢將至於剝盡而後止故授之以九二九二之所至初六之所及也姤者隂長之卦而九五以至陽而勝之故曰含章凡隂中之陽為章隂長而消陽天之命也有以勝之人之志也君子不以命廢志故九五之志堅則必有自天而隕者言人之至者天不能勝也上九姤其角吝無咎象曰姤其角上窮吝也剛之上窮者角也姤其角以是為姤也以角為姤物之所不樂遇也小人雖不能合而君子亦無自入焉故吝無咎坤下兌上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往彖曰萃聚也順以說剛中而應故聚也王假有廟致孝亨也利見大人亨聚以正也易曰方以類聚物以羣分有聚必有黨有黨必有爭故萃者爭之大也盍取其爻而觀之五能萃二四能萃初近四而無應則四能萃三近五而無應則五能萃上此豈非其交爭之際也哉且天下亦未有萃於一者也大人者惟能因其所萃而即以付之故物有不萃於我而天下之能萃物者非我莫能容之其為萃也大矣順以說剛中而應者二與五而已而足以為萃乎曰足矣有餘矣從我者納之不從者付之其所欲從此大人也故萃有二亨萃未有不亨者而其未見大人也則亨而不正不正者爭非其有之謂也故曰利見大人亨聚以正也大人者為可以聚物之道而已王至於有廟而盡其孝享非安且暇不能物見其安且暇安得不聚而歸之此聚之正也用大牲吉利有攸往順天命也易之言薦盥禴享非正言也皆有寄焉用大牲者猶曰用大利祿云爾易曰何以聚人曰財所聚者大則所用者不可小矣天之命我為是物主非以厚我也坐而享之則過矣故利有攸往順天命也觀其所聚而天地萬物之情可見矣不期而聚者必其至情也象曰澤上於地萃君子以除戎器戒不虞王弼曰聚而無防則衆生心初六有孚不終乃亂乃萃若號一握為笑勿恤往無咎象曰乃亂乃萃其志亂也初六之所應者九四也九四有信之者而不終六三是也始以無應而萃於四終以四之有應咨嗟而去之故其象曰萃如嗟如此志亂而苟聚者也若號一握為笑者號且笑也一握者其聲也號笑雜也君子之於禍福審矣故笑則不號號則不笑先否而後通則先號而後笑未有號笑雜者也此其志已亂焉能為我寇哉故勿恤往無咎六二引吉無咎孚乃利用禴象曰引吉無咎中未變也隂之從陽以難進為吉六二得位而安其中不急於變志以從上者也故九五引之而後從引之而後從則其聚也固是以吉而無復有咎禴者禮之薄者也故用於既信之後上以利祿聚之下豈以利祿報之哉故上用大牲而下用禴以為有重於此者矣六三萃如嗟如無攸利往無咎小吝象曰往無咎上巽也六三之萃於四四與我與初皆不利也去而之上上亦無應巽而納我者也故雖小吝而無咎九四大吉無咎象曰大吉無咎位不當也非其位而有聚物之權五之所忌也非大吉則有咎矣九五萃有位無咎匪孚元永貞悔亡象曰萃有位志未光也九五萃之主也萃有四隂而九四分其二以位為心者未有能容此者也故曰萃有位無咎挾位以忌四為無咎而已志不光矣惟大人為能忘位以任四夫能忘位以任四則四且為吾用而二隂者獨何往哉匪孚者非其所孚也元者始也元永貞者始既以從之則終身為之貞也自六二之外皆非我之所孚也非我之所孚則我不求聚使各得永貞於其始之所從悔亡之道也上六齎咨涕洟無咎象曰齎咨涕洟未安上也未安上者不樂在五上也巽下坤上升元亨用見大人勿恤南征吉彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也巽之為物非能破堅達强者也幸而遇坤故能升其升也有時故曰柔以時升坤既順之五又應之是以大亨大人之於物也危者安之易者懼之下巽而上順質柔而遇易志得而輕進以此見大人所畏者也故不曰利雖不利不可不見也見而知畏其為利也大矣利之遠者曰慶以其有慶故雖有畏勿恤也南征吉志行也彖曰巽而順剛中而應是以大亨而六五為升階由此觀之非獨巽之上即坤亦坤之下援巽也巽之求坤坤之求巽皆㑹於南南征吉二者相求之謂也象曰地中生木升君子以順德積小以髙大初六允升大吉象曰允升大吉上合志也所以為升者巽也所以為巽者初也升之制在初故初六雖隂柔而其於升也蓋誠能之故曰允升隂升而遇陽若陽升而遇隂皆得其所升者也初六以誠能之資而遇九二宜其為吉之大者矣九二孚乃利用禴無咎象曰九二之孚有喜也九二升而遇九三蓋升而窮者也雖窮於三而配於五窮而之五五亦無所升而納之故薄禮可以相縻而無咎也九三升虛邑象曰升虛邑無所疑也九三以陽用陽其升也果矣六四以隂居隂其避之也審矣故曰升虛邑無所疑也不言吉者以至强克至弱其為禍福未可知也存乎其人而已六四王用亨於歧山吉無咎象曰王用亨於歧山順事也上有所適下升而避之失於此而償於彼雖不爭可也今六四下為三之所升而上不為五之所納此人情必爭之際也然且不爭而虛邑以待之非仁人其孰能為此太王避狄於豳而亨於岐方其去豳也豈知百姓之相從而不去哉亦以順物之勢而已以此獲吉夫何咎之有六五貞吉升階象曰貞吉升階大得志也貞者貞於九二也巽之所以能升者以六五之應也曰此升之階也階者有可升之道焉我惟為階故人升之我不為階而人何自升哉木之生也克土而後能升而土以生木為功未有木生而土不願者也故階而升巽則六五為得志矣上六冥升利於不息之貞象曰冥升在上消不富也冥者君子之所息也升至上六宜息也然而不息則消之道也施於不息之正者則可孟子曰求則得之舍則失之求在我者此不息之正者也求之有道得之有命求在外者此不息之不正者也坎下兌上困亨貞大人吉無咎有言不信彖曰困剛掩也九二為初六六三之所掩九四九五為六三上六之所掩故困困者坐而見制無能為之辭也隂之害陽者多矣然皆有以侵之夫惟侵之是以陽不能堪而至於戰戰者有危道也而無所謂困困之世惟不見侵而見掩隂有以消陽而陽無所致其怒其為害也深矣險以說困而不失其所亨其惟君子乎貞大人吉以剛中也剛中者二也二之謂大人貞於大人而後吉者五也有言不信尚口乃窮也象曰澤無水困君子以致命遂志水潤下者也在澤上則居在澤下則逝矣故水在澤下為澤無水命與志不相謀者也故各致其極而任其所至也初六臀困於株木入於幽谷三歲不覿象曰入於幽谷幽不眀也初六掩九二者也掩者非一人之所能故初六之掩九二必將有待於六三六三固以初為臀也臀得其所據而後其身能有所為今六三之所據者蒺藜也則臀已困於株木身且廢矣株木也蒺藜也皆非臀之所據者也夫以柔助剛則其幽可明以柔掩剛其誰眀之入谷者也有配在四而不善二是以三歲不得見也九二困於酒食朱紱方來利用亨祀征凶無咎象曰困於酒食中有慶也困之世利以柔用剛二與五皆剛者也二以柔用之而五以剛用之天下之易懷者惟小人也方其見掩也爭之以力雖刀鋸有不足而將懷之也則酒食有餘矣故九二困於酒食所以懷小人也九五則不然掩我下者我劓之掩我上者我刖之輕用其威威窮而物不服乃大困也既困而無助則雖欲不求二不可得矣赤紱者所以爵命二也故曰困於赤紱五以赤紱為困而二以是為方來言此五之所困而二之所不求而至也困而求二乃徐有說以其用說為已晚矣說於未困則其所以為說者小故九二之所困者酒食而已說於已困則其所以為說者重故九五之所困者爵命也祭祀者人之求神而神無求也祭之者人也享之者神也五求二故祭之二不求五故享之而已享之者固不征而征以求之故凶雖然其義則不可咎以其所從者君也六三困於石據於蒺藜入於其宫不見其妻凶象曰據於蒺藜乘剛也入於其宫不見其妻不祥也六三上掩四下掩二者也堅而不可勝者石也四之謂石傷而不可據者蒺藜也二之謂蒺藜六三隂也而居於陽自以為陽而求配於上六不祥也三之應在上而上六非其應也宮則是矣而非其妻故曰入於其宫不見其妻凶小人易合而難久故困之三隂其始相與締交而掩剛其終初六之臀困六三之妻亡九四來徐徐困於金車吝有終象曰來徐徐志在下也雖不當位有與也初六我之配二之所惡也二剛而在下載已者也故為金車欲下從初六而困於二故其來徐徐不急於配配之所怨剛之所與也故雖吝而有終九五劓刖困於赤紱乃徐有說利用祭祀其曰赤紱正也朱紱嚴之也下受上之辭也象曰劓刖志未得也乃徐有說以中直也利用祭祀受福也用九二也上六困於葛藟於臲卼曰動悔有悔征吉柔而牽己者葛藟也三之謂葛藟剛而難乘者臲卼也五之謂臲卼上六困於此二者而不能去則謀全之過也曰不可動動且有悔而不知其不動乃所以有悔也上無掩我者則吉莫如征也而不征何哉以柔用剛則乘之者至以為蒺藜以剛用剛則乘之者以為臲卼而已象曰困於葛藟未當也上六足以為配而六三未足以當也動悔有悔吉行也巽下坎上井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也食者往也不食者來也食不食存乎人所以為井者存乎己存乎人者二存乎己者一故曰往來井井汔燥也至井而未及水曰汔至得水而未出井曰未繘井井未嘗有得喪繘井之為功羸瓶之為凶在汲者爾象曰木上有水井君子以勞民勸相人之於井未有錮之者也故君子推是道以勞民勸相初六井泥不食舊井無禽象曰井泥不食下也舊井無禽時舍也易以所居為邪正然不可必也惟井為可必井未有在潔而不清處穢而不濁者也故即其所居而邪正決矣孔子曰君子惡居下流天下之惡皆歸焉初六惡之所鍾也君子所受於天者無幾養之則日新不養則日亡擇居所以養也彖曰井養而不窮所以養井者豈有他哉得其所居則潔潔則食食則日新日新故不窮升泥者無禽之漸也泥而不食則廢矣舊井廢井也其始無人其終無禽無人猶可治也無禽不可治也所以為井者亡矣故時皆舍之九二井谷射鮒甕敝漏象曰井谷射鮒無與也九二居非其正故無應於上則趨下而已下趨者谷之道也失井之道而為谷故曰井谷九二之所趨者初六也初六之謂鮒井而有鮒則人惡之矣然猶得志於甕何也彼有利器而肯以我汙之歟此必敝漏之甕非是甕不汲是井也九三井泄不食為我心惻可用汲王眀竝受其福象曰井泄不食行惻也求王眀受福也泄潔也九三居得其正井潔者也井潔而不食何哉不中也不中者非邑居之所會也故不食井未有以不食為戚者也凡為我惻者皆行道之人爾故曰行惻行惻者明人之惻我而非我之自惻也是井則非敝漏之甕所能容矣故擇其所用汲者曰孰可用者哉其惟器之潔者乎器之潔則王之明者也器潔王眀則受福者非獨在我而已六四井甃無咎象曰井甃無咎修井也修潔也陽為動為實隂為靜為虛泉者所以為井也動也實也井者泉之所寄也靜也虛也故三陽為泉三隂為井初六最下故曰泥上六最上故曰收六四居其間而不失正故曰甃甃之於井所以禦惡而潔井也井待是而潔故無咎九五井洌寒泉食象曰寒泉之食中正也此其正與九三一也所以食者中也上六井收勿幕有孚元吉象曰元吉在上大成也收者甃之上窮也收非所以為井而井之權在收夫苟幕之則下雖有寒泉而不達上雖有汲者而不獲故勿幕則有孚元吉離下兌上革已曰乃孚元亨利貞悔亡彖曰革水火相息二女同居其志不相得曰革已日乃孚革而信之文眀以說大亨以正革而當其悔乃亡水火則有男女之象然後能相生此非水火也二女同居而已二女同居則暌所以不暌者兌欲下而遇離離欲上而遇兌雖欲相違而不能也既不相得又不相違則不能無相攻攻而不已必有一勝勝者斯革之矣火能革金離革兌者也故曰革火者金之所畏也而金非火則無以就器用器成而後知火之利也故夫革不信於革之日而信於已革之日以其始之不信是以知悔者革之所不能免也特有以亡之爾天地革而四時成湯武革命順乎天而應乎人革之時大矣哉象曰澤中有火革君子以治歷明時歷者天事也時者人事也初九鞏用黃牛之革象曰鞏用黃牛不可以有為也以卦言之則離革兌者也以爻言之則陽革隂者也六爻皆以陽革隂故初九九三九四九五四者所以革人而六二上六者人革之初九九三所以為革者火也而六二者火之所附初九九三之所欲革者也火以有所附為利而所附者以得火為災故初九九三常願六二之留而不去也夫六二苟留而不去其見革也無日矣六二之欲去如遁之九三之欲遁也故初九當用遁之六二所以執九三者固而留之六二之所以去者以我有革之之意也故不可以有為有為則革之之意見矣六二已日乃革之征吉無咎象曰已日革之行有嘉也初九之所以固我非愛我也畏我去之故未見其革爾徒見其今之固我而不我革以為可信而與之處則及矣君子見幾而作彼今日不革已日必革之故征吉為初九計則宜留自為計則宜征六二之所謂嘉者五也五之所以為革者與初異矣捨初從五其吉也豈復有咎哉九三征凶貞厲革言三就有孚象曰革言三就又何之矣九三有應於上故其意常欲征也六二之所以不得去者以我乘之也捨之而征則二去矣二苟去之則我與初九無所施其革二陽相灼而喪其所附則窮之道也故征凶貞厲貞者不征之謂也不征則與六二處而不相得以相革者也故危雖危而不凶言者以也革言三就猶曰革以三成三者相持而成革眀二之不可去也二存則初與三相信二去則初與三相疑此必然之勢也故曰革言三就有孚九四悔亡有孚改命吉象曰改命之吉信志也下之二陽以火為革者也故見革者惟欲去之此德不足者也德不足而革則所革者亡革者亦凶故初九九三皆以六二之留為吉也上之二陽則不然其革也以說革而人莫不說非有德者其孰能之九四未當位者也未當位而革故悔革而說故悔亡有孚也改命者始受命也雖未當位而志自信矣九五大人虎變未占有孚象曰大人虎變其文炳也易曰雲從龍風從虎虎有文而能神者也豹有文而不能神者也故大人為虎君子為豹非大人而革者皆毁人以自成廢人以自興故人之從之也必占其可從而後信若大人之革也則在我而已炳然日新天下之所謂文者自廢矣此豈待占而後信者哉上六君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚也小人革面順以從君也上六見革於大人者也此見革者君子也則其向之未革乃其避世之遇爾豹生而有文豈其無素而能為之哉若小人也則革面而已朝為寇讎莫為腹心無足怪者下之二陽德不足者也故六二以征為吉上之二陽大人也故上六以征為凶巽下離上鼎元吉亨彖曰鼎象也象者可見之謂也天之生物不可見既生而剛强之者可見也聖人之創業其所以創之者不可見其成就熟好使之堅凝而不壞者可見也故象曰君子以正位凝命革所以改命而鼎所以凝之也知革而不知鼎則上下之分不眀而位不正雖其所受於天者流泛而不可知矣以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢大器非器也大亨非亨也取鼎之用而施之天下謂之大亨鼎之用極於亨帝而已以其道養聖賢則亨之大者也國有聖賢則君位定而天命固矣巽而耳目聰眀柔進而上行得中而應乎剛是以元亨元亨所謂元吉亨也柔進而上行者五也五得中而應乎剛則所以為耳目者巽也象曰木上有火鼎君子以正位凝命初六鼎顚趾利出否得妾以其子無咎象曰鼎顚趾未悖也利出否以從貴也六爻皆鼎也當其處者有其象故以初為趾二與三四為腹而實在焉五與上為耳初六上應九四顛趾之象也夫鼎聖人將以正位凝命亨而熟之至於可食而後已苟有不善者在焉則善與不善皆亨而竝熟而善者棄矣鼎於是未有實也故及其未有實而顚之以出其不善如待其有實則夫不善已汙之矣實非吾之所欲棄也於是焉而顚之以其所欲棄出其所不欲棄則天下之亂或自是起矣故曰鼎顚趾未悖也顛趾而出否盡去之道也盡去之則患鼎無實聖人之於人也責其身不問其所從論其今不考其素苟騂且角犂牛之子可也鼎雖以出否為利而擇之太詳求之太備天下無完人故曰得妾以其子無咎從其子之為貴則其出於妾者可忘也九二鼎有實我仇有疾不我能即吉象曰鼎有實慎所之也我仇有疾終無尤也九二始有實者仇者六五也所謂耳也九二之實六五之所舉也故其象曰鼎黃耳中以為實也仇有疾而不能即我畏九四也鼎以耳行故耳能即之則食不能即之則不食之道也始有實者以不食為吉惡其未足而輕用之也故曰鼎有實慎所之也九三鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也耳上九也九三之實上九之所舉也熟物之謂革鼎之熟物以腹不以耳而上九離之極火之所炎以耳革者也耳之受炎也足以廢塞其行而不足以革故曰鼎耳革失其義也九三實之將盈者也於是可食矣而其行廢故雖有雉膏而不食也耳以兩舉者也六五之耳可鉉而上九之耳不可鉉則六五雖欲獨舉得乎隂欲行而陽欲留其為悔也大矣故至於雨然後悔虧而終吉雨者隂陽之和玉鉉之功也九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也鼎之量極於四其上則耳矣受實必有餘量以為溢地也故九三以不食為憂眀不可復加也至於九四溢則覆矣故孔子曰德薄而位尊知小而謀大力少而任重鮮不及矣方其未及也必有告之者而不信及其已信則無如之何矣六五鼎黃耳金鉉利貞象曰鼎黃耳中以為實也上九鼎玉鉉大吉無不利象曰玉鉉在上剛柔節也六五上九皆所謂耳也上九之耳見於九三故不復出也在炎而不灼者玉也金則廢矣六五之為耳也中而不亢柔而有容故曰黃耳則其所以為鉉者以金足矣上九之為耳也炎而灼不可以迫故曰耳革則其所以為鉉者玉而後可金鉉可以及五而不可以及上玉鉉則可以兩及矣可以兩及則上九之剛六五之柔我為之節也九二之實利在於不食故六五之耳利在於貞而不行九三之實以不食為憂故上九之耳得玉鉉則大吉無不利無不利者上與五與三之所利也以鼎熟物人皆能之至於鼎盈而憂溢耳炎而不可舉非玉鉉不能此鼎之所以養聖賢也震下震上震亨震來虩虩笑言啞啞震驚百里不喪匕鬯彖曰震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚遠而懼邇也出可以守宗廟社稷以為祭主也震者陽德之先震隂而達陽者也故亨震驚百里言其及遠也不喪匕鬯言其和也若震而不和則必有僵仆隕墜者矣匕鬯祭器也必取祭器者以見震長子也若威而不猛則可以為祭主矣出之為言見也象曰洊雷震君子以恐懼修省初九震來虩虩後笑言啞啞吉二陽震物者也四隂見震者也震之為道以威達德者也故可試而不可遂試則養而無窮遂則玩而不終初九試而不遂者也以虩虩之震而繼之以啞啞之笑明其不常用也惟其不常用故二隂莫敢犯其鋒皆以逃避而後免也象曰震來虩虩恐致福也笑言啞啞後有則也以其威之不常用故知其所以震物者非以害之欲其恐而致福也有則者言其不遂也六二震來厲億喪貝躋於九陵勿逐七日得象曰震來厲乘剛也初九之威不可犯也來則危往則安故雖喪貝而勿逐躋於九陵以避之以初九之不遂其震而繼之以笑言也故七日可以得所喪也喪貝以眀初九之威七日得以眀初九之不以威窮物也六三震蘇蘇震行無眚象曰震蘇蘇位不當也六三不鄰於震矣而猶蘇蘇然懼也行而避之然後無眚以眀初九之威能及逺也九四震遂泥象曰震遂泥未光也震於已震之後遂而不知止者也故泥泥者以言其不能及逺也故二隂皆以處而不避為吉六五震往來厲億無喪有事象曰震往來厲危行也其事在中大無喪也九四以其遂泥之威加於六五非六五之所當畏其衰可坐而待也夫九四雖未可乘然往而避之則過矣故曰往來厲往來皆危則以處為安矣九四之威既已泥矣豈復能如初九一震而喪六二之貝哉以六五居中處而待之非獨無喪億將有功故曰億無喪有事上六震索索視矍矍征凶震不於其躬於其鄰無咎婚媾有言象曰震索索中未得也雖凶無咎畏鄰戒也九四至此其實不能為徒襲其餘威以加上六上六未得其已衰之情故猶索索矍矍而畏之苟畏之不已而征以避之則四張而不可止矣故凶聖人知其不足避也故告之曰震不於其躬於其鄰言九四之威僅可以及五而不及上可以戒而無咎無庸征也九四始欲以威加物及其泥而物莫之畏也則其及於上六者有言而已衰之甚也六爻皆無應故九四兼有二隂得稱婚媾也六二喪貝而五無喪六三震行無眚而上六征凶九四之不及初也逺矣艮下艮上艮其背不獲其身行其庭不見其人無咎彖曰艮止也時止則止時行則行動靜不失其時其道光眀艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也所貴於聖人者非貴其靜而不交於物貴其與物皆入於吉凶之域而不亂也故夫艮聖人將有所施之艮止也止與靜相近而不同方其動而止之則靜之始也方其靜而止之則動之先也故曰時止則止時行則行動靜不失其時其道光眀此言艮之得其所施者也施之於天下之至動是以為頥施之於天下之至健是以為大畜今夫兼山艮是施之於背而已背固已止矣艮何加焉所以為柅者為輪也所以為防者為水也今也不然為輿為柅為山為防不亦近於固歟故曰艮其止止其所也此所以不獲其身也上下敵應不相與也此所以行其庭不見其人也物各止於其所是果能止也哉背止於身身與之動而背不知也今我施止於物之所止有大於是物者則挾而與之趨矣我焉得知之故曰艮其背不獲其身其庭未嘗無人也有六人焉敵應而不相與則如無人是道也非向之所謂光眀者也以為無咎而已象曰兼山艮君子以思不出其位初六艮其趾無咎利永貞象曰艮其趾未失正也六二艮其腓不拯其隨其心不快象曰不拯其隨未退聽也自趾而上至於輔當其處者有其德與咸一也咸以上六為輔而五為脢艮之輔在五而脢不取何也脢則背也艮皆取於動者而已艮則何為皆取於動者也曰卦合而觀之見兩艮焉見其施艮於止故取其體之靜者而配之曰艮其背爻别而觀之不見艮之所施而各見其所遇之位位有不同而吉凶悔吝生焉故取其體之動者而不取其靜以為其靜者已見於卦矣上止而用下下止而聽於上此艮之正也趾能動而聽於腓者也艮其趾不害於腓之動也趾不自動而已止而聽其上上止則止上行則行此艮之正者也故利永貞腓能動而不聽於股者也或曰咸其股執其隨隨者股之德也故謂股為隨艮其腓則股雖欲行而不能矣下止而不聽於上上雖有憂患而莫之救則上之所不快也以是為失其正矣故曰艮其趾未失正也九三艮其限列其夤厲薰心象曰艮其限危薰心也三不艮於股而艮於限亦取諸動者也限者上下之際所以俯仰之節也夤者自上而屬於下者也艮於下之極則其自上而下者絶矣上下絶心之憂也心在六四故憂之及心也謂之薰六四艮其身無咎象曰艮其身止諸躬也咸之九四曰朋從爾思則四者心之所在也施之於一體則艮止於所施所不施者不及也施之於心則無所不及矣故曰艮其身艮得其要故無咎六五艮其輔言有序悔亡象曰艮其輔以中正也口欲止言欲寡上九敦艮吉象曰敦艮之吉以厚終也敦益也艮至於輔極矣而又止之故曰敦艮梏者不忘釋痿者不忘起物之情也在止之極而不忘於動非天下之至厚其孰能之艮下巽上漸女歸吉利貞彖曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也此文轉以次相釋也漸之中有進者則女歸之吉也而利於正正者孰謂謂得位而有功可以正邦者也其得位者何也剛中者也由此觀之女則二與四所歸則五也止而巽動不窮也止而巽有所觀望而後進者故不窮象曰山上有木漸君子以居賢德善俗雲上於天天所不能居故君子不以居德木生於山山能居之山以有木為髙故君子以是居德業善風俗初六鴻漸於干小子厲有言無咎象曰小子之厲義無咎也鴻陽鳥而水居在水則以得陸為安在陸則以得水為樂者也故六爻雖有隂陽之異而皆取於鴻也初六鴻之在水者也逺則無應近則遇二以隂適隂故曰鴻漸於干干水涯也兩隂不能相容故為小子之所厲以至於有言雖然其所適非志於利也則未至於六三之凶無咎可也六二鴻漸於磐飲食衎衎吉象曰飲食衎衎不素飽也六二鴻之在水者也近則遇三逺則遇五無適而不得其欲故擇其尤可恃者從之二之從三也雖近而難信其從五也雖逺而可恃二陽皆陸也在陸而尤可恃以安者磐也九五之謂磐六二知五之可恃不漸於三而漸於五則食且樂如是衎衎樂也素飽徒飽也夫飲食何為若是樂也豈非以五之足恃而不徒飽歟苟為徒飽而已則雖三可從夫苟從三則飲食未終而憂繼之矣九三鴻漸於陸夫征不復婦孕不育凶利禦寇象曰夫征不復離羣醜也婦孕不育失其道也利用禦寇順相保也九三鴻之在陸者也而上九非其應故曰鴻漸於陸無應於上而近於四見四之可欲則離類絶朋而趨之故曰夫征不復六二之從我非正也將視我而進退者也上之所為下必有甚者九三適四而不反則難以令於二矣故曰婦孕不育凶四順於五者而三寇之言禦寇之利以明三之不利也六四鴻漸於木或得其桷無咎象曰或得其桷順以巽也六四鴻之在水者也近於五而非其應故曰鴻漸於木木生於陸而非鴻之所安也鴻之為物也足不能握其漸於木而無咎蓋得其大而有容如桷者焉九五之謂也或者幸而得之之辭也無應而從非其配非巽順何以相保乎九五鴻漸於陵婦三歲不孕終莫之勝吉象曰終莫之勝吉得所願也九五鴻之在陸者也進而遇上九上九陵也陵者陸之又髙者也進而之陵動乎無嫌故六二之為婦也三歲不孕而終莫之勝夫以陸之陵以為不得其願矣而婦為之貞如此則願孰大焉故曰進以正可以正邦也不求之人而求之身雖服天下可也上九鴻漸於陸其羽可用為儀吉象曰其羽可用為儀吉不可亂也上九鴻之在逵者也上無所適而三非其應故曰鴻漸於逵漸有三陽其二為隂之所溷非其有應則近而慕之惟上九不然夫無纍於物則其進退之際雍容而可觀矣兑下震上歸妹征凶無攸利彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也說以動所歸妹也說少者人之情也故說以動其所歸者妹也天地之所以交必天降也男女之所以合必男下也若女長而男少則大過之所謂老婦士夫烏肯下之夫苟不下則天地不交男女不合矣故歸妹者女少而男長女用事而男下之之謂也夫所以下之者豈一日之故哉將相與終始故也征凶位不當也無攸利柔乘剛也歸妹之爻男女皆易位柔皆乘剛此男所以說女而致其情者權以濟事一用而止可也以此而征則凶且男女皆不利也象曰澤上有雷歸妹君子以永終知敝歸妹女之方盛者也凡物之有敝者必自其方盛而慮之逮其衰則無及矣初九歸妹以娣跛能履征吉象曰歸妹以娣以恆也跛能履吉相承也九二眇能視利幽人之貞象曰利幽人之貞未變常也歸妹以隂為君在兑則六三是也而初與二其娣也在震則六五是也而四其娣也所以為兑者三也故權在君所以為震者四也故權在娣權之在君也則君雖不才而娣常為之用權之在娣也則娣雖無能為損益猶要其君六三不中而居非其位跛眇者也其所以能履且視者以初與二屈而為之娣也二者各致其能於六三故初九曰歸妹以娣跛能履征吉已有能履之才不以自行而安為娣使跛者得之以征何哉豈非上下之常分有不可易者邪故其象曰歸妹以娣以恆也而九二之象亦曰未變常也九二亦娣也其不言娣何也因初九之辭也且跛眇者一人而為之視履者二人是二人者豈可以廢一歟故其象曰跛能履吉相承也是以知其皆娣也已有其能而不自用使無能者亨其名則九二非幽人而何哉六三歸妹以須反歸以娣象曰歸妹以須未當也古者謂賤妾為須故天文有須女六三不知其託行於初九而自以為能履不知其借明於几二而自以為能視是以棄娣而用須未足以當娣也失二娣之助則以跛眇見黜而歸矣歸然後知用娣故曰反歸以娣九四歸妹愆期遲歸有時象曰愆期之志有待而行也九四六五之娣也以為權在己故愆期不行以要其君君猶待之有時焉而後歸此其志以為吾君必有所待而後能行者也六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也歸妹未有如六五之貴者也故曰帝乙歸妹以帝乙之妹而履得其中則其袂之良否不足以為損益非若跛者之託行眇者之借眀也而九四欲以袂之良而加之夫袂之良豈足以加其君哉月幾望者隂疑於陽易之所惡也然至於娣之欲加其君則以月幾望為吉以為寧月之幾望而無寧娣之加其君也上六女承筐無實士刲羊無血無攸利象曰上六無實承虛筐也歸妹男女皆易位柔皆乘剛此豈永終無敝者哉上六則敝之所終也天地之情正大而已大者不正非其至情其終必有名存實亡之禍女承筐無實食不績之蠶也士刲羊無血用已死之牲也皆實亡之禍也彖曰歸妹征凶無攸利上六處其終故受其凶之全也東坡易傳卷五
